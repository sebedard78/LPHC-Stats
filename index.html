<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond Master Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        
        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLES */
        .micro-container { width: 100vw; margin-left: -0.5rem; overflow-x: hidden; background: #000; border-top: 1px solid #333; }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { font-size: 0.45rem; padding: 8px 0; color: #7dd3fc; background: #111; border: 0.5px solid #333; text-transform: uppercase; }
        .micro-table td { font-size: 1.1rem; padding: 16px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        .edit-cell { color: #fcd34d !important; font-weight: 900; cursor: pointer; }
        .sh-cell { background: #000; color: #0ea5e9; font-weight: 900; border-right: 1.5px solid #0ea5e9 !important; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* PITCHING HIGHLIGHT */
        .pitching-team-card { border: 5px solid #0ea5e9 !important; background: #f0f9ff !important; position: relative; }
        .pitching-team-card::after { content: 'PITCHING'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: #0ea5e9; color: white; font-size: 10px; padding: 2px 12px; font-weight: 900; z-index: 60; }

        /* DATA TABLES */
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.55rem; padding: 12px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 12px 1px; text-align: center; font-size: 0.95rem; font-weight: bold; vertical-align: middle; }
        
        .stats-name-col { width: 160px; min-width: 160px; text-align: left !important; padding-left: 15px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; position: sticky; left: 0; background: #000; z-index: 10; color: #fff !important; font-size: 0.9rem !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-name-col { width: 52%; text-align: left !important; padding-left: 10px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; color: #fff !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-num-col { width: 9%; color: #fff; }
        .pts-col { width: 12%; background: #0a0a0a; color: #0ea5e9 !important; font-size: 1.1rem !important; }

        .sum-stats-table { width: 100%; border-collapse: collapse; table-layout: auto; background: #000; color: #fff; }
        .sum-stats-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.65rem; padding: 12px 10px; border: 1px solid #333; text-transform: uppercase; text-align: left; }
        .sum-stats-table td { border-bottom: 1px solid #222; padding: 12px 10px; text-align: left; font-size: 0.95rem; font-weight: bold; vertical-align: middle; white-space: normal !important; overflow-wrap: break-word; }
        .sum-stats-table .val-col { text-align: center; background: #0a0a0a; color: #0ea5e9; width: 60px; border-left: 1px solid #333; font-size: 1.1rem; }

        #printZone { display: none; }
        @media print {
            .no-print, header, nav, main, #exitModal, button { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            #printZone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; z-index: 99999; background: white !important; }
            #printZone * { position: static !important; overflow: visible !important; color: black !important; background: transparent !important; border-color: black !important; border-radius: 0 !important; }
            .std-table, .sum-stats-table { width: 100% !important; border: 1px solid black !important; table-layout: auto !important; }
            .std-table th, .std-table td, .sum-stats-table th, .sum-stats-table td { border: 1px solid black !important; padding: 4px !important; font-size: 9px !important; }
            .stats-name-col, .st-name-col { border-right: 2px solid black !important; font-weight: 900 !important; width: auto !important; min-width: 120px !important; text-align: left !important; }
            .pts-col, .val-col { font-weight: 900 !important; background: #eee !important; border-left: 2px solid black !important; }
        }

        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-score .num { font-size: 2.8rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.8rem; color: #94a3b8; font-weight: bold; }
        .sum-row-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 10px; }
        .sum-row-table th { color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding: 5px; font-size: 8px; text-align: center; }
        .sum-row-table td { padding: 10px 2px; border-bottom: 1px solid #f1f5f9; font-weight: 900; text-align: center; vertical-align: middle; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="printZone"></div>

    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] items-center justify-center p-6 text-white no-print" style="display:none;">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-[90%] max-w-md p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <div class="space-y-4 mt-6">
                <button onclick="window.confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 font-black uppercase text-sm">Submit & Save Results</button>
                <button onclick="window.confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 font-black uppercase text-sm">Discard & Delete Series</button>
                <button onclick="window.closeExitModal()" class="w-full bg-zinc-800 text-white p-4 font-bold uppercase text-xs">Back to Match</button>
            </div>
        </div>
    </div>

    <!-- UI HEADER -->
    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Loon Pond</h1>
        </div>
        <div class="flex gap-1 bg-zinc-900 p-1">
            <button id="modeS" onclick="window.setMode('SINGLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="window.setMode('DOUBLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav id="navBar" class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="window.setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Standings</button>
        <button onclick="window.setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Club Stats</button>
        <button onclick="window.setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-red-500 text-nowrap">Scorer</button>
        <button onclick="window.setTab('HISTORY')" id="tabHISTORY" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">History</button>
        <button onclick="window.setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">NHPA</button>
        <button onclick="window.setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");

        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: {SINGLES:true, DOUBLES:true}, nhpa: { SINGLES: {}, DOUBLES: {} }, weeklyHoa: { SINGLES: [], DOUBLES: [] }, fourDeads: { SINGLES: {}, DOUBLES: {} }, scorerEnabled: true };
        let mode = 'DOUBLES';
        let view = 'STANDINGS';
        let isUnlocked = false;

        let match = { active: false, step: 'TEAMS', gameNum: 1, sessionId: null, t1Name: '', t2Name: '', p1:'', p2:'', p3:'', p4:'', h1:0, h2:0, h3:0, h4:0, games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1:null, p2:null, p3:null, p4:null }, seriesBuffer: [], fourDeadLog: {} };

        onSnapshot(docRef, (snapshot) => { 
            if (snapshot.exists()) { 
                state = snapshot.data(); 
                if(!state.managePin) state.managePin = '1234';
                if(!state.nhpa) state.nhpa = {SINGLES:{}, DOUBLES:{}};
                if(!state.hcpLocked) state.hcpLocked = {SINGLES:true, DOUBLES:true};
                if(!state.weeklyHoa) state.weeklyHoa = { SINGLES: [], DOUBLES: [] };
                if(!state.fourDeads) state.fourDeads = { SINGLES: {}, DOUBLES: {} };
                if(state.scorerEnabled === undefined) state.scorerEnabled = true;
                render(); 
            } else { save(); } 
        });

        async function save() { await setDoc(docRef, state); }

        const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';
        const getSym = (pts, oppPts = 0) => { 
            if(pts===null||pts===undefined) return '--'; 
            if(Number(pts) === 6 && Number(oppPts) === 6) return 'XX';
            if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return '--'; 
        };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        function getPlyrAvg(pName) {
            const n = cleanN(pName); if(!pName || ['bye','dummy'].includes(n)) return 0;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            return hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : (p ? Number(p.startAvg) : 0);
        }

        function getH(pName) {
            const n = cleanN(pName); if(!pName || n === 'bye') return 0; if(n === 'dummy') return 54;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            if (state.hcpLocked && state.hcpLocked[mode]) return Number(p ? (p.currentHcp || 0) : 0);
            const avg = getPlyrAvg(pName);
            return Math.max(0, Math.floor(((mode==='DOUBLES'?90:150) - avg) * 0.9));
        }

        window.confirmExit = (choice) => { window.closeExitModal(); if (choice === 'SUBMIT') finalizeFullSeries(); else { match.active = false; match.seriesBuffer = []; match.fourDeadLog = {}; render(); } };
        window.closeExitModal = () => { document.getElementById('exitModal').style.display = 'none'; };
        window.openExitModal = () => { document.getElementById('exitModal').style.display = 'flex'; };
        window.setMode = (m) => { mode = m; render(); };
        window.setTab = (t) => { 
            const lockedTabs = ['MANAGE', 'HISTORY', 'NHPA'];
            if (lockedTabs.includes(t) && !isUnlocked) {
                const pinInput = prompt("Enter PIN:");
                if (pinInput === state.managePin) { isUnlocked = true; view = t; render(); }
                else alert("Incorrect PIN");
            } else { view = t; render(); }
        };

        window.toggleHcpLock = async () => {
            if(!state.hcpLocked) state.hcpLocked = {SINGLES:true, DOUBLES:true};
            state.hcpLocked[mode] = !state.hcpLocked[mode];
            await save(); render();
        };

        window.toggleScorer = async () => {
            state.scorerEnabled = !state.scorerEnabled;
            if(!state.scorerEnabled && view === 'SCORER') view = 'STANDINGS';
            await save(); render();
        };

        window.executePrint = (title, html, isNhpa = false) => {
            const zone = document.getElementById('printZone');
            const clubHeader = isNhpa ? "" : `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #000; padding-bottom:10px; margin-bottom:20px; font-family:Arial;">
                    <div style="width:70px; height:70px; border:2px solid #000; display:flex; align-items:center; justify-content:center;">
                        <img src="logo.jpg" style="width:60px; height:60px; object-fit:contain;">
                    </div>
                    <div style="text-align:center;">
                        <h1 style="font-size:22pt; font-weight:900; margin:0; letter-spacing:-1px;">LOON POND HORSESHOE CLUB</h1>
                        <h2 style="font-size:14pt; margin:0; text-transform:uppercase; color:#555;">${title}</h2>
                    </div>
                    <div style="text-align:right; font-size:10pt; font-weight:bold;">DATE: ${new Date().toLocaleDateString()}<br>MODE: ${mode}</div>
                </div>
            `;
            zone.innerHTML = clubHeader + html;
            setTimeout(() => { window.print(); }, 1200);
        };

        window.printActive = (t) => {
            const el = document.getElementById('viewContent').cloneNode(true);
            el.querySelectorAll('button, .no-print, .action-bar, select, textarea').forEach(x => x.remove());
            window.executePrint(t, el.innerHTML);
        };

        window.printHistoryEntry = (sId) => {
            const s = state.sessions.find(x => x.id === sId);
            if(!s) return;
            let html = `<div style="font-family: Arial; color:black; background:white;">`;
            s.fullData.forEach(g => {
                html += `<div style="margin-bottom:50px; page-break-inside: avoid; border: 1px solid #000; padding: 10px;">`;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold; text-transform:uppercase; font-size:14px;"><span>Game ${g.gameNum}</span><span>Score: ${g.s1} - ${g.s2}</span></div>`;
                html += `<table style="width:100%; border-collapse:collapse; text-align:center; border:2px solid #000; font-size:11px;">`;
                html += `<thead><tr style="background:#eee; border-bottom:1px solid #000;"><th rowspan="2" style="border-right:1px solid #000; width:35px;">SH</th><th colspan="3" style="border-right:1px solid #000; text-transform:uppercase;">${g.p1}</th><th colspan="3" style="border-right:1px solid #000; text-transform:uppercase;">${g.p2}</th><th rowspan="2" style="border-right:2px solid #000; width:45px; background:#f9f9f9;">T1</th><th colspan="3" style="border-right:1px solid #000; text-transform:uppercase;">${g.p3}</th><th colspan="3" style="border-right:1px solid #000; text-transform:uppercase;">${g.p4}</th><th rowspan="2" style="width:45px; background:#f9f9f9;">T2</th></tr><tr style="background:#eee; border-bottom:2px solid #000;"><th style="border-right:1px solid #000;">R</th><th style="border-right:1px solid #000;">P</th><th style="border-right:1px solid #000;">S</th><th style="border-right:1px solid #000;">R</th><th style="border-right:1px solid #000;">P</th><th style="border-right:1px solid #000;">S</th><th style="border-right:1px solid #000;">R</th><th style="border-right:1px solid #000;">P</th><th style="border-right:1px solid #000;">S</th><th style="border-right:1px solid #000;">R</th><th style="border-right:1px solid #000;">P</th><th style="border-right:1px solid #000;">S</th></tr></thead><tbody>`;
                let p1s=0, p2s=0, p3s=0, p4s=0;
                g.frames.forEach(f => {
                    p1s += Number(f.p1||0); p2s += Number(f.p2||0); p3s += Number(f.p3||0); p4s += Number(f.p4||0);
                    html += `<tr><td style="border:1px solid #000; font-weight:bold;">${f.sh}</td><td style="border:1px solid #ccc;">${getSym(f.p1, f.p3)}</td><td style="border:1px solid #ccc;">${f.p1||0}</td><td style="border:1px solid #ccc;">${p1s}</td><td style="border:1px solid #ccc;">${getSym(f.p2, f.p4)}</td><td style="border:1px solid #ccc;">${f.p2||0}</td><td style="border:1px solid #ccc;">${p2s}</td><td style="border-left:1px solid #000; border-right:2px solid #000; background:#f9f9f9; font-weight:bold;">${p1s+p2s+g.h1+g.h2}</td><td style="border:1px solid #ccc;">${getSym(f.p3, f.p1)}</td><td style="border:1px solid #ccc;">${f.p3||0}</td><td style="border:1px solid #ccc;">${p3s}</td><td style="border:1px solid #ccc;">${getSym(f.p4, f.p2)}</td><td style="border:1px solid #ccc;">${f.p4||0}</td><td style="border:1px solid #ccc;">${p4s}</td><td style="border-left:1px solid #000; background:#f9f9f9; font-weight:bold;">${p3s+p4s+g.h3+g.h4}</td></tr>`;
                });
                html += `</tbody></table></div>`;
            });
            html += `</div>`;
            window.executePrint("Session Score Sheets", html);
        };

        window.printSanctionSheet = () => {
            const cfg = state.nhpa[mode] || {};
            const shoesPerGame = Number(cfg.shoesPerGame) || (mode === 'DOUBLES' ? 30 : 50);
            const hList = state.history.filter(h => h.mode === mode);
            const pNames = [...new Set(hList.map(h => h.player))];
            let rowsHtml = "";
            pNames.forEach(pN => {
                const pHist = hList.filter(h => cleanN(h.player) === cleanN(pN));
                const rRec = (mode === 'SINGLES' ? state.roster.SINGLES : state.roster.DOUBLES.flatMap(t=>t.members)).find(r => cleanN(r.name) === cleanN(pN)) || {};
                const totalPts = pHist.reduce((s, h) => s + h.score, 0), highGame = pHist.length ? Math.max(...pHist.map(h => h.score)) : 0;
                const totalShoes = pHist.length * shoesPerGame, totalRingers = pHist.reduce((s, h) => s + h.ringers, 0);
                const prevHiRinger = Number(rRec.prevHighRinger || 0), curSeasonHiPct = pHist.length ? Math.max(...pHist.map(h => (h.ringers/shoesPerGame)*100)) : 0;
                const finalRingerPct = totalShoes > 0 ? (totalRingers / totalShoes) * 100 : 0;
                const [last, first] = pN.includes(',') ? pN.split(',').map(x=>x.trim()) : [pN, ""];
                const elig = curSeasonHiPct > prevHiRinger ? "Y" : "";
                
                // Alignment logic fixed: Data rows map exactly to header structure
                rowsHtml += `<tr style="height:25px; border-bottom:1px solid #000;">
                    <td style="border:1px solid #000; padding-left:4px;">${last}</td>
                    <td style="border:1px solid #000; padding-left:4px;">${first}</td>
                    <td style="border:1px solid #000; text-align:center;">${rRec.category||''}</td>
                    <td style="border:1px solid #000; text-align:center;">${rRec.cardNo||''}</td>
                    <td style="border:1px solid #000; text-align:center;">${totalPts}</td>
                    <td style="border:1px solid #000; text-align:center;">${highGame}</td>
                    <td style="border:1px solid #000; text-align:center;">${totalShoes}</td>
                    <td style="border:1px solid #000; text-align:center;">${totalRingers}</td>
                    <td style="border:1px solid #000; text-align:center;">${prevHiRinger.toFixed(1)}</td>
                    <td style="border:1px solid #000; text-align:center;">${curSeasonHiPct.toFixed(1)}</td>
                    <td style="border:1px solid #000; text-align:center;">${finalRingerPct.toFixed(1)}</td>
                    <td style="border:1px solid #000; text-align:center;">${elig}</td>
                </tr>`;
            });
            for(let i=pNames.length; i<25; i++) { 
                rowsHtml += `<tr style="height:25px; border-bottom:1px solid #000;"><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td><td style="border:1px solid #000;"></td></tr>`; 
            }

            const template = `
            <div style="font-family: Arial, sans-serif; font-size: 11px; width: 7.8in; margin: auto; padding: 20px; color: black; line-height: 1.2; background: white;">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div style="width:75px; height:90px; border:2px solid #000; display:flex; align-items:center; justify-content:center;">
                        <img src="nhpa_logo.png" style="max-width:100%; object-fit:contain;">
                    </div>
                    <div style="flex:1; text-align:center;">
                        <h1 style="font-size:22pt; font-weight:bold; margin:0;">National Horseshoe Pitchers Association</h1>
                        <h2 style="font-size:16pt; font-weight:bold; margin:2px 0;">Sanctioned Club/League Program - FINAL Stat Sheet</h2>
                        <p style="font-size:10px; margin:4px 0;">This form should include all league members. Verify NATSTATS. Scratch scores only.</p>
                        <p style="font-size:10px; font-weight:bold; margin:0;">mail to: Barbara Carson, 7618 Willow Woods Dr., N. Olmsted, OH 44070 Bcarson848@gmail.com</p>
                    </div>
                </div>

        function finalizeFrame() {
            const isFourDead = (pA, pB) => {
                if(!pA || !pB || ['bye','dummy'].includes(cleanN(pA)) || ['bye','dummy'].includes(cleanN(pB))) return false;
                return (match.currF['p'+pA] === 6 && match.currF['p'+pB] === 6);
            };
            if (mode === 'SINGLES') { if (isFourDead('1', '3')) { match.fourDeadLog[match.p1] = (match.fourDeadLog[match.p1] || 0) + 1; match.fourDeadLog[match.p3] = (match.fourDeadLog[match.p3] || 0) + 1; } }
            else {
                if (isFourDead('1', '3')) { match.fourDeadLog[match.p1] = (match.fourDeadLog[match.p1] || 0) + 1; match.fourDeadLog[match.p3] = (match.fourDeadLog[match.p3] || 0) + 1; }
                if (isFourDead('2', '4')) { match.fourDeadLog[match.p2] = (match.fourDeadLog[match.p2] || 0) + 1; match.fourDeadLog[match.p4] = (match.fourDeadLog[match.p4] || 0) + 1; }
            }
            match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
            match.currF = { p1:null, p2:null, p3:null, p4:null }; match.pitcherIdx = 0;
            if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) showInterSummary();

        function getPitcher() {
            if (!match.active || match.step !== 'LIVE') return '---';
            const fNum = match.currGameFrames.length + 1;
            let t1Lead = (fNum % 2 !== 0);
            if (match.gameNum === 2) t1Lead = !t1Lead;
            const turn = t1Lead ? (mode === 'SINGLES' ? [match.p1, match.p3] : [match.p1, match.p3, match.p2, match.p4]) : (mode === 'SINGLES' ? [match.p3, match.p1] : [match.p3, match.p1, match.p4, match.p2]);
            let s = 0; while (s < 10) {
                let p = turn[match.pitcherIdx];
                if (!p || cleanN(p) === 'bye' || cleanN(p) === 'dummy') {
                    match.pitcherIdx++; const limit = mode === 'DOUBLES' ? 4 : 2;
                    if (match.pitcherIdx >= limit) { finalizeFrame(); if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) return 'END'; return getPitcher(); }
                    s++; continue;
                } return p;
            } return 'END';
        }

        function showInterSummary() {
            const d1 = cleanN(match.p1) === 'dummy' ? 30 : 0, d2 = cleanN(match.p2) === 'dummy' ? 30 : 0, d3 = cleanN(match.p3) === 'dummy' ? 30 : 0, d4 = cleanN(match.p4) === 'dummy' ? 30 : 0;
            const sc1 = Number(match.currGameFrames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0)), sc2 = Number(match.currGameFrames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0));
            const g1 = sc1 + d1 + d2 + match.h1 + match.h2, g2 = sc2 + d3 + d4 + match.h3 + match.h4;
            match.sessionAgg.t1 += g1; match.sessionAgg.t2 += g2;
            let res1 = g1 > g2 ? 'W' : (g1 < g2 ? 'L' : 'T'), res2 = g2 > g1 ? 'W' : (g2 < g1 ? 'L' : 'T');
            const plrs = [{n:match.p1,p:'p1',r:res1,d:d1},{n:match.p2,p:'p2',r:res1,d:d2},{n:match.p3,p:'p3',r:res2,d:d3},{n:match.p4,p:'p4',r:res2,d:d4}];
            plrs.forEach(pl => { if(pl.n && !['bye','dummy'].includes(cleanN(pl.n))) { match.seriesBuffer.push({ player: pl.n, score: match.currGameFrames.reduce((s,f)=>s+Number(f[pl.p]||0), 0) + pl.d, ringers: match.currGameFrames.reduce((s,f)=>s+getR(f[pl.p]), 0), result: pl.r, sessionId: match.sessionId, gameNum: match.gameNum, mode, date: new Date().toLocaleDateString(), timestamp: Date.now() }); } });
            match.games.push({ gameNum: match.gameNum, p1: match.p1, p2: match.p2, p3: match.p3, p4: match.p4, h1: match.h1, h2: match.h2, h3: match.h3, h4: match.h4, s1: g1, s2: g2, frames: [...match.currGameFrames] });
            match.step = (match.gameNum >= 3) ? 'MATCH_SUMMARY' : 'GAME_SUMMARY';
            render();
        }

        window.finalizeFullSeries = () => {
            const mW = match.sessionAgg.t1 > match.sessionAgg.t2 ? match.t1Name : (match.sessionAgg.t1 < match.sessionAgg.t2 ? match.t2Name : 'Tie'), today = new Date().toLocaleDateString();
            let bestSessionHoa = -999, sessionHoaPlayer = '';
            match.seriesBuffer.forEach(entry => {
                const playerAvg = getPlyrAvg(entry.player), hoaVal = Number((entry.score - playerAvg).toFixed(1));
                if (hoaVal > bestSessionHoa) { bestSessionHoa = hoaVal; sessionHoaPlayer = entry.player; }
            });
            const existingIdx = state.weeklyHoa[mode].findIndex(x => x.date === today);
            if (existingIdx !== -1) { if (bestSessionHoa > state.weeklyHoa[mode][existingIdx].hoa) { state.weeklyHoa[mode][existingIdx] = { date: today, player: sessionHoaPlayer, hoa: bestSessionHoa }; } } 
            else { state.weeklyHoa[mode].push({ date: today, player: sessionHoaPlayer, hoa: bestSessionHoa }); }
            state.history.push(...match.seriesBuffer);
            state.sessions.push({ id: match.sessionId, name: `${match.t1Name} vs ${match.t2Name}`, date: today, mode, matchWinner: mW, agg1: match.sessionAgg.t1, agg2: match.sessionAgg.t2, fullData: [...match.games], timestamp: Date.now() });

            match.active = false; view = 'STANDINGS'; save();

        window.editPastGame = (sId, gIdx) => {

            const g = sess.fullData[gIdx];

            };
            const d1 = editP(g.p1, g.frames.reduce((s,f)=>s+Number(f.p1||0),0), g.frames.reduce((s,f)=>s+getR(f.p1),0), g.h1);
            const d2 = (mode==='DOUBLES') ? editP(g.p2, g.frames.reduce((s,f)=>s+Number(f.p2||0),0), g.frames.reduce((s,f)=>s+getR(f.p2),0), g.h2) : {s:0, r:0, h:0};
            const d3 = editP(g.p3, g.frames.reduce((s,f)=>s+Number(f.p3||0),0), g.frames.reduce((s,f)=>s+getR(f.p3),0), g.h3);

                        tableHtml += `<tr><td class="text-left uppercase font-black text-[9px]">${p}</td><td>${pGames[0]}</td><td>${pGames[1]}</td><td>${pGames[2]}</td><td class="text-sky-500 font-black">${sTot}</td><td class="bg-gray-100 font-black text-black">${statAvg.toFixed(1)}</td></tr>`; 
                    });
                    content.innerHTML = `<div class="p-4 bg-white shadow-2xl max-w-xl mx-auto mt-4 text-center"><h2 class="text-sky-500 font-black italic uppercase">${isMatch ? 'Series Final' : 'Game Summary'}</h2><p class="text-4xl font-black my-4">${match.games[match.gameNum-1].s1} - ${match.games[match.gameNum-1].s2}</p>${tableHtml}<button onclick="${isMatch ? 'window.finalizeFullSeries()' : 'window.nextGame()'}" class="w-full bg-sky-500 text-black p-5 rounded-2xl font-black uppercase shadow-lg mt-6">${isMatch ? 'Save & Close' : 'Next Game'}</button></div>`;
                } else {
                    const d1 = cleanN(match.p1) === 'dummy' ? 30 : 0, d2 = cleanN(match.p2) === 'dummy' ? 30 : 0, d3 = cleanN(match.p3) === 'dummy' ? 30 : 0, d4 = cleanN(match.p4) === 'dummy' ? 30 : 0;
                    const sc1 = Number(match.currGameFrames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0)), sc2 = Number(match.currGameFrames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0));
                    const s1C = sc1 + match.h1 + match.h2 + d1 + d2 + Number(match.currF.p1||0) + Number(match.currF.p2||0); 
                    const s2C = sc2 + match.h3 + match.h4 + d3 + d4 + Number(match.currF.p3||0) + Number(match.currF.p4||0);
                    content.innerHTML = `<div class="bg-black text-white p-3 flex justify-between px-6 text-[11px] font-black uppercase"><span>Agg: ${match.sessionAgg.t1+s1C}</span><span>G${match.gameNum}</span><span>Agg: ${match.sessionAgg.t2+s2C}</span></div><div class="grid grid-cols-2 gap-1 mb-2"><div class="p-6 bg-white text-center shadow-inner ${isT1Active?'pitching-team-card':''}"><p class="text-[10px] font-black opacity-40 uppercase truncate">${match.t1Name}</p><p class="text-7xl font-black tracking-tighter">${s1C}</p><p class="text-[9px] font-black text-sky-600 mt-1 uppercase">+${match.h1+match.h2} HC</p></div><div class="p-6 bg-white text-center shadow-inner ${isT2Active?'pitching-team-card':''}"><p class="text-[10px] font-black opacity-40 uppercase truncate">${match.t2Name}</p><p class="text-7xl font-black tracking-tighter">${s2C}</p><p class="text-[9px] font-black text-sky-600 mt-1 uppercase">+${match.h3+match.h4} HC</p></div></div><div class="flex items-stretch gap-1 mb-2"><div class="bg-sky-500 text-white p-3 flex-1 text-center text-[12px] font-black uppercase italic tracking-widest shadow-lg">UP: ${upP}</div><button onclick="window.openExitModal()" class="bg-red-600 text-white px-6 font-black text-[10px] uppercase rounded">Exit</button></div><div class="btn-score-grid">${[0,1,2,3,4,6].map(s=>`<button onclick="window.addScore(${s})" class="btn-score"><span class="num ${s>=3?'text-sky-500':''}">${s}</span><span class="sym">${getSym(s)}</span></button>`).join('')}</div><div class="micro-container mt-4"><table class="micro-table"><thead>${mode==='SINGLES'?'<tr><th>SH</th><th>R</th><th>P</th><th>SC</th><th>R</th><th>P</th><th>SC</th></tr>':'<tr><th>SH</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th>T1</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th>T2</th></tr>'}</thead><tbody><tr class="curr-row"><td class="sh-cell">${(match.currGameFrames.length+1)*2}</td>${mode==='SINGLES' ? `<td>${getSym(match.currF.p1, match.currF.p3)}</td><td>${match.currF.p1??''}</td><td></td><td>${getSym(match.currF.p3, match.currF.p1)}</td><td>${match.currF.p3??''}</td><td></td>` : `<td>${getSym(match.currF.p1, match.currF.p3)}</td><td>${match.currF.p1??''}</td><td></td><td>${getSym(match.currF.p2, match.currF.p4)}</td><td>${match.currF.p2??''}</td><td></td><td></td><td>${getSym(match.currF.p3, match.currF.p1)}</td><td>${match.currF.p3??''}</td><td></td><td>${getSym(match.currF.p4, match.currF.p2)}</td><td>${match.currF.p4??''}</td><td></td><td></td>`}</tr>${match.currGameFrames.map((f,i)=>{ const sl=match.currGameFrames.slice(0,i+1), p1s=sl.reduce((s,x)=>s+Number(x.p1||0),0), p2s=sl.reduce((s,x)=>s+Number(x.p2||0),0), p3s=sl.reduce((s,x)=>s+Number(x.p3||0),0), p4s=sl.reduce((s,x)=>s+Number(x.p4||0),0); if(mode==='SINGLES') return `<tr><td class="sh-cell">${f.sh}</td><td>${getSym(f.p1,f.p3)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},1)">${f.p1}</td><td>${p1s+match.h1}</td><td>${getSym(f.p3,f.p1)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},3)">${f.p3}</td><td>${p3s+match.h3}</td></tr>`; return `<tr><td class="sh-cell">${f.sh}</td><td>${getSym(f.p1,f.p3)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},1)">${f.p1}</td><td>${p1s}</td><td>${getSym(f.p2,f.p4)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},2)">${f.p2}</td><td>${p2s}</td><td>${p1s+p2s+match.h1+match.h2+d1+d2}</td><td>${getSym(f.p3,f.p1)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},3)">${f.p3}</td><td>${p3s}</td><td>${getSym(f.p4,f.p2)}</td><td class="edit-cell" onclick="window.editLiveScoreCell(${i},4)">${f.p4}</td><td>${p2s}</td><td>${p3s+p4s+match.h3+match.h4+d3+d4}</td></tr>`; }).reverse().join('')}</tbody></table></div>`;
                }
            } else if (view === 'STANDINGS') {
                const rows = (state.roster[mode]||[]).map(t => { 
                    const name = t.teamName || t.name, tPs = mode==='DOUBLES'?t.members.map(m=>cleanN(m.name)):[cleanN(t.name)], gS = new Set(); let w=0, l=0, ti=0; 
                    hList.forEach(h => { if(tPs.includes(cleanN(h.player))){ const k=`${h.sessionId}-${h.gameNum}`; if(!gS.has(k)){ gS.add(k); if(h.result==='W') w++; else if(h.result==='L') l++; else if(h.result==='T') ti++; } } }); 
                    const mp = (state.sessions || []).filter(s => s.mode === mode && cleanN(s.matchWinner) === cleanN(name)).length; 
                    return { name, w, l, ti, mp, pts: (w*2)+ti+(mode==='DOUBLES'?mp:0) }; 
                }).sort((a,b)=>b.pts-a.pts).map(d => `<tr><td class="st-name-col font-black">${d.name}</td><td class="st-num-col text-white">${d.w}</td><td class="st-num-col text-white">${d.l}</td><td class="st-num-col text-white">${d.ti}</td>${mode==='DOUBLES'?`<td class="st-num-col text-white">${d.mp}</td>`:''} <td class="pts-col font-black">${d.pts}</td></tr>`).join('');
                content.innerHTML = `<div class="action-bar flex justify-end p-2 no-print"><button onclick="window.printActive('Standings')" class="bg-black text-white px-4 py-2 font-black uppercase shadow-lg border border-zinc-700">Print</button></div><div class="shadow overflow-x-auto"><table class="std-table"><thead><tr><th class="st-name-col">Team</th><th class="st-num-col">W</th><th class="st-num-col">L</th><th class="st-num-col">T</th>${mode==='DOUBLES'?'<th class="st-num-col">MP</th>':''} <th class="pts-col">Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } else if (view === 'STATS') {
                const shoes = mode === 'DOUBLES' ? 30 : 50, pNames = [...new Set(hList.map(h => h.player))];
                const rows = pNames.map(pN => { 
                    const g = hList.filter(h => cleanN(h.player) === cleanN(pN)), playerAvg = getPlyrAvg(pN), totP = g.reduce((s,x)=>s+x.score,0), totR = g.reduce((s,x)=>s+x.ringers,0);
                    const rPct = g.length ? (totR / (g.length * shoes)) * 100 : 0, hiR = g.length ? Math.max(...g.map(x => (x.ringers / shoes) * 100)) : 0, rRec = (mode === 'SINGLES' ? state.roster.SINGLES : state.roster.DOUBLES.flatMap(t=>t.members)).find(p => cleanN(p.name) === cleanN(pN)) || {startAvg:0};
                    const scPct = g.length ? ((10/3) * (totP - (2 * totR))) / g.length : 0, hiOA = g.length ? Math.max(...g.map(x => x.score - playerAvg)) : 0, imp = (playerAvg - rRec.startAvg);
                    return `<tr><td class="stats-name-col font-black uppercase">${pN}</td><td>${getH(pN)}</td><td class="text-white">${playerAvg.toFixed(1)}</td><td>${rPct.toFixed(1)}%</td><td>${hiR.toFixed(1)}%</td><td style="font-size:9px;">${scPct.toFixed(1)}%</td><td>${totP}</td><td style="color:#fb923c;">${hiOA.toFixed(1)}</td><td>${rRec.startAvg}</td><td class="pts-col" style="color:${imp>=0?'#4ade80':'#f87171'}">${imp >= 0 ? '+' : ''}${imp.toFixed(1)}</td></tr>`; 
                }).sort((a,b)=>b.totP-a.totP).join('');
                const hoaRows = (state.weeklyHoa[mode] || []).map(h => `<tr><td style="color:#7dd3fc; border-right: 1px solid #333; width:80px;">${h.date}</td><td class="font-black uppercase">${h.player}</td><td class="val-col">${h.hoa}</td></tr>`).reverse().join('');
                const deadsData = Object.keys(state.fourDeads[mode] || {}).map(p => ({ n: p, c: state.fourDeads[mode][p] })).sort((a,b) => b.c - a.c);
                const deadsRows = deadsData.map(d => `<tr><td class="font-black uppercase">${d.n}</td><td class="val-col" style="color:white;">${d.c}</td></tr>`).join('');
                content.innerHTML = `<div class="action-bar flex justify-end pt-2 no-print"><button onclick="window.printActive('Club Stats')" class="bg-black text-white px-4 py-2 font-black uppercase shadow-lg border border-zinc-700">Print Stats</button></div><div class="relative shadow-2xl rounded-none border border-zinc-800 bg-black overflow-x-auto mt-2"><table class="std-table w-full" style="min-width: 1100px; table-layout: auto;"><thead><tr class="bg-zinc-900"><th class="stats-name-col">Player</th><th>Hcp</th><th>Avg</th><th>R%</th><th>Hi R%</th><th>Scr %</th><th>Tot P</th><th>HOA</th><th>S.Avg</th><th class="pts-col">Imp</th></tr></thead><tbody>${rows}</tbody></table></div><div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10"><div><h2 class="text-sky-500 font-black italic uppercase mb-2 tracking-tighter">Weekly High Game Over Average</h2><table class="sum-stats-table"><thead><tr><th style="width:80px;">Date</th><th>Player</th><th class="val-col">HOA</th></tr></thead><tbody>${hoaRows}</tbody></table></div><div><h2 class="text-sky-500 font-black italic uppercase mb-2 tracking-tighter">Four Deads</h2><table class="sum-stats-table"><thead><tr><th>Player</th><th class="val-col">Total</th></tr></thead><tbody>${deadsRows}</tbody></table></div></div>`;
            } else if (view === 'HISTORY') {
                const sessionHtml = (state.sessions || []).filter(s => s.mode === mode).reverse().map(s => {
                    let gHtml = (s.fullData || []).map((g, idx) => `<div class="flex justify-between items-center bg-gray-100 p-2 mb-1 text-[10px] font-bold uppercase"><span>G${g.gameNum}: ${g.s1}-${g.s2}</span><button onclick="window.editPastGame(${s.id}, ${idx})" class="text-sky-600 font-black no-print">Edit</button></div>`).join('');
                    return `<div class="bg-white p-3 shadow mb-3 font-black uppercase text-xs"><span>${s.date} - ${s.name}</span><button onclick="window.printHistoryEntry(${s.id})" class="text-sky-600 float-right no-print">Print Sheets</button>${gHtml}</div>`;
                }).join('') || `<p class="p-10 text-center opacity-40 italic">No history found</p>`;
                content.innerHTML = `<div class="p-4"><h2 class="text-sky-500 font-black italic uppercase mb-4">Series History</h2>${sessionHtml}</div>`;
            } else if (view === 'NHPA') {
                const cfg = state.nhpa[mode] || {};
                content.innerHTML = `<div class="p-4 space-y-4 no-print"><div class="bg-white p-6 shadow"><h2 class="text-sky-500 font-black italic uppercase mb-4">NHPA Form Settings</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-[10px] font-black uppercase">Club Name</label><input id="f-clubName" class="w-full p-2 border mb-2" value="${cfg.clubName||''}"></div><div><label class="block text-[10px] font-black uppercase">Phone</label><input id="f-phone" class="w-full p-2 border mb-2" value="${cfg.phone||''}"></div><div><label class="block text-[10px] font-black uppercase">Sanction #</label><input id="f-sanctionNum" class="w-full p-2 border mb-2" value="${cfg.sanctionNum||''}"></div><div><label class="block text-[10px] font-black uppercase">Director</label><input id="f-director" class="w-full p-2 border mb-2" value="${cfg.director||''}"></div><div><label class="block text-[10px] font-black uppercase">Address</label><input id="f-address" class="w-full p-2 border mb-2" value="${cfg.address||''}"></div><div><label class="block text-[10px] font-black uppercase">City</label><input id="f-city" class="w-full p-2 border mb-2" value="${cfg.city||''}"></div><div><label class="block text-[10px] font-black uppercase">State</label><input id="f-state" class="w-full p-2 border mb-2" value="${cfg.state||''}"></div><div><label class="block text-[10px] font-black uppercase">Shoes Per Game</label><input id="f-shoesPerGame" type="number" class="w-full p-2 border mb-2" value="${cfg.shoesPerGame||(mode==='DOUBLES'?30:50)}"></div><div><label class="block text-[10px] font-black uppercase">League Start</label><input id="f-startDate" class="w-full p-2 border mb-2" value="${cfg.startDate||''}"></div><div><label class="block text-[10px] font-black uppercase">League End</label><input id="f-endDate" class="w-full p-2 border mb-2" value="${cfg.endDate||''}"></div><div><label class="block text-[10px] font-black uppercase">Date Submitted</label><input id="f-dateSubmitted" class="w-full p-2 border mb-2" value="${cfg.dateSubmitted||''}"></div><div><label class="block text-[10px] font-black uppercase">Cancellation</label><input id="f-cancellation" class="w-full p-2 border mb-2" value="${cfg.cancellation||''}"></div><div><label class="block text-[10px] font-black uppercase">Count All</label><input id="f-countAll" class="w-full p-2 border mb-2" value="${cfg.countAll||''}"></div></div><div class="mt-6 flex gap-2"><button onclick="window.saveNhpaForm()" class="flex-1 bg-black text-white p-4 font-black uppercase">Save</button><button onclick="window.printSanctionSheet()" class="flex-1 bg-sky-500 text-white p-4 font-black uppercase">Print NHPA Form</button></div></div></div>`;
            } else if (view === 'MANAGE') {
                const rH = (state.roster[mode]||[]).map((t, i) => `<div class="bg-white p-3 shadow mb-2 flex justify-between items-center text-xs font-bold uppercase"><span>${t.teamName||t.name}</span><div class="flex gap-2"><button onclick="window.editRosterItem(${i})" class="text-sky-500 font-black">EDIT</button><button onclick="window.delR(${i})" class="text-red-500 font-black">DEL</button></div></div>`).join('');
                content.innerHTML = `<div class="p-4 space-y-4 no-print"><div class="bg-white p-4 shadow flex justify-between items-center"><span class="text-[10px] font-black uppercase tracking-widest">PIN: ${state.managePin}</span><button onclick="window.updatePin()" class="bg-sky-500 text-white px-4 py-2 text-[10px] font-black">CHANGE PIN</button></div><div class="grid grid-cols-3 gap-2"><button onclick="window.resetSystem()" class="bg-red-600 text-white p-4 rounded-none font-black uppercase text-[10px] shadow-lg">Wipe Data</button><button onclick="window.backupData()" class="bg-zinc-800 text-white p-4 font-bold uppercase text-[10px]">Backup</button><button onclick="document.getElementById('restoreInput').click()" class="bg-white border-2 border-zinc-800 text-zinc-800 p-4 rounded-none font-bold uppercase text-[10px]">Restore</button></div><input type="file" id="restoreInput" class="hidden" onchange="window.handleRestore(event)"><div class="grid grid-cols-1 md:grid-cols-2 gap-2"><button onclick="window.toggleHcpLock()" class="w-full p-4 font-black uppercase text-xs shadow-md transition ${state.hcpLocked[mode] ? 'bg-orange-500 text-white' : 'bg-green-500 text-white'}">${state.hcpLocked[mode] ? 'HCP: Manual Locked' : 'HCP: Rolling Auto'}</button><button onclick="window.toggleScorer()" class="w-full p-4 font-black uppercase text-xs shadow-md transition ${state.scorerEnabled ? 'bg-sky-500 text-white' : 'bg-zinc-500 text-white'}">Scorekeeper: ${state.scorerEnabled ? 'ON' : 'OFF'}</button></div><button onclick="window.resetDeads()" class="w-full bg-red-900 text-white p-4 text-[10px] font-black uppercase">Clear Four Deads (${mode})</button><textarea id="rosterInput" class="w-full h-24 border p-3 rounded-none text-xs" placeholder="Import Roster..."></textarea><button onclick="window.importRoster()" class="w-full bg-black text-white p-4 rounded-none font-black uppercase shadow-lg">Sync Cloud</button><div class="mt-4"><h3 class="text-[10px] font-black uppercase mb-2">Roster Management</h3>${rH}</div></div>`;
            }
        }
    </script>
</body>
</html>
