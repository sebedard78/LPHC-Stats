<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond Stat Master Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }

        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLES */
        .micro-container { 
            width: 100vw; 
            margin-left: -0.5rem; 
            background: #000; 
            border-top: 1px solid #333;
            height: calc(100vh - 460px); /* ADJUSTED HEIGHT TO SHOW MORE FRAMES */
            overflow-y: auto;
        }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { 
            font-size: 0.45rem; 
            padding: 6px 0; /* COMPRESSED HEADERS */
            color: #7dd3fc; 
            background: #111; 
            border: 0.5px solid #333; 
            text-transform: uppercase;
        }
        .micro-table td { font-size: 1.1rem; padding: 12px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        .edit-cell { color: #fcd34d !important; font-weight: 900; cursor: pointer; }
        .sh-cell { background: #000; color: #0ea5e9; font-weight: 900; border-right: 1.5px solid #0ea5e9 !important; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* PITCHING HIGHLIGHT */
        .pitch-active { border: 4px solid #0ea5e9 !important; background: #f0f9ff !important; position: relative; }
        .pitch-active::after { content: 'PITCHING'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #0ea5e9; color: white; font-size: 9px; padding: 1px 10px; font-weight: 900; z-index: 60; }

        /* DATA TABLES */
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.55rem; padding: 12px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 12px 1px; text-align: center; font-size: 0.95rem; font-weight: bold; vertical-align: middle; }

        .stats-name-col { width: 160px; min-width: 160px; text-align: left !important; padding-left: 15px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; position: sticky; left: 0; background: #000; z-index: 10; color: #fff !important; font-size: 0.9rem !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-name-col { width: 52%; text-align: left !important; padding-left: 10px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; color: #fff !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-num-col { width: 9%; color: #fff; }
        .pts-col { width: 12%; background: #0a0a0a; color: #0ea5e9 !important; font-size: 1.1rem !important; }

        .sum-stats-table { width: 100%; border-collapse: collapse; table-layout: auto; background: #000; color: #fff; }
        .sum-stats-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.65rem; padding: 12px 10px; border: 1px solid #333; text-transform: uppercase; text-align: left; }
        .sum-stats-table td { border-bottom: 1px solid #222; padding: 12px 10px; text-align: left; font-size: 0.95rem; font-weight: bold; vertical-align: middle; white-space: normal !important; overflow-wrap: break-word; }
        .sum-stats-table .val-col { text-align: center; background: #0a0a0a; color: #0ea5e9; width: 60px; border-left: 1px solid #333; font-size: 1.1rem; }

        #printZone { display: none; }

        @media print {
            @page { margin: 1cm; size: portrait; }
            .no-print, header, nav, main, #exitModal, button { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            #printZone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; z-index: 99999; background: white !important; }
            #printZone * { position: static !important; overflow: visible !important; color: black !important; background: transparent !important; border-color: black !important; border-radius: 0 !important; }
            
            .std-table, .sum-stats-table { 
                width: 100% !important; 
                border: 1px solid black !important; 
                border-collapse: collapse !important;
                table-layout: fixed !important; 
                margin-bottom: 20px !important;
            }
            .std-table th, .std-table td, .sum-stats-table th, .sum-stats-table td { 
                border: 1px solid black !important; 
                padding: 4px 2px !important; 
                font-size: 8pt !important;
                color: black !important;
                line-height: 1.1 !important;
            }
            .stats-name-col { 
                width: 20% !important;
                border-right: 1px solid black !important;
                text-align: left !important;
                padding-left: 4px !important;
            }
            .pts-col, .val-col { 
                background: #f0f0f0 !important; 
                font-weight: bold !important; 
            }
            .grid { display: flex !important; gap: 10px !important; align-items: flex-start !important; }
            .grid > div { flex: 1 !important; }
        }

        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; height: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-score .num { font-size: 2.2rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.7rem; color: #94a3b8; font-weight: bold; }
        .sum-row-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 10px; }
        .sum-row-table th { color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding: 5px; font-size: 8px; text-align: center; }
        .sum-row-table td { padding: 10px 2px; border-bottom: 1px solid #f1f5f9; font-weight: 900; text-align: center; vertical-align: middle; }

        /* TOURNAMENT SPECIFIC CSS */
        .t-btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: #000; }
        .t-btn-score { background: #1e293b; border-radius: 16px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 5px solid #0f172a; }
        .t-btn-score .num { font-size: 3.2rem; font-weight: 900; line-height: 1; color: white; }
        .t-btn-score .sym { font-size: 0.8rem; color: #38bdf8; font-weight: 900; margin-top: 4px; }

        .t-micro-container { width: 100vw; background: #000; overflow-x: hidden; border-top: 1px solid #1e293b; }
        .t-micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .t-micro-table th { font-size: 0.35rem; padding: 4px 0; color: #7dd3fc; background: #0f172a; border: 0.1px solid #1e293b; text-transform: uppercase; }
        .t-micro-table td { font-size: 0.8rem; padding: 8px 0; text-align: center; border: 0.1px solid #0f172a; color: #fff; line-height: 1; }

        .c-sh { width: 22px !important; font-weight: 900; color: #0ea5e9 !important; border-right: 1px solid #0ea5e9 !important; background: #000; position: sticky; left: 0; z-index: 10; }
        .c-r { width: 22px !important; color: #38bdf8; font-weight: bold; } 
        .c-p { width: 22px !important; font-weight: bold; color: #facc15; } 
        .c-s { width: 24px !important; font-weight: bold; color: #fff; opacity: 0.8; }
        .c-t { width: 38px !important; background: #0c4a6e; font-weight: 900; font-size: 0.9rem !important; border-left: 1px solid #38bdf8 !important; }
        .c-t2 { width: 38px !important; background: #1e293b; font-weight: 900; color: #0ea5e9 !important; font-size: 0.9rem !important; border-left: 1px solid #0ea5e9 !important; }

        .active-team-card { background-color: #0ea5e9 !important; color: #000 !important; }
        .active-team-card p { color: #000 !important; opacity: 1 !important; font-weight: 900; }
        .active-team-card .score-val { color: #000 !important; }

        /* BRACKET STACKED VIEW STYLES */
        .bracket-outer { width: 100%; overflow: auto; background: #020617; height: calc(100vh - 200px); position: relative; }
        .bracket-scale-layer { transform-origin: 0 0; transition: transform 0.2s ease-out; display: inline-flex; flex-direction: column; width: max-content; min-width: 100%; }
        
        .bracket-section-header { background: #0ea5e9; color: black; font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; padding: 8px; font-size: 14px; letter-spacing: 1px; width: 100%; z-index: 10; }
        
        .bracket-row-scroll { display: flex; gap: 25px; padding: 20px; align-items: flex-start; width: max-content; }
        .finals-center-box { display: flex; justify-content: center; padding: 40px 20px; border-bottom: 1px solid #1e293b; }

        .round-col { display: flex; flex-direction: column; gap: 20px; min-width: 180px; }
        .round-title { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; border-bottom: 1px solid #1e293b; margin-bottom: 8px; }
        .match-card { background: #111827; border: 1.5px solid #1e293b; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .match-card:hover { border-color: #0ea5e9; }
        .team-line { display: flex; justify-content: space-between; padding: 12px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #020617; color: white; }
        .team-line.win { background: #083344; color: #22d3ee; }
        .score-box { background: #000; color: #fff; padding: 4px 8px; border-radius: 6px; min-width: 30px; text-align: center; }
        .t-select { background: #1e293b; border: 2px solid #334155; padding: 18px; border-radius: 12px; width: 100%; color: white; font-weight: 900; font-size: 18px; margin-top: 6px; }
        .rot-btn { flex: 1; background: #1e293b; padding: 20px; border-radius: 12px; font-weight: 900; border: 2px solid transparent; color: white; }
        .rot-active { background: #0ea5e9; color: black; }
        #modal { display: none; position: fixed; inset: 0; background: #020617; z-index: 1000; overflow-y: auto; color: white; }

        /* CUSTOM DIALOG STYLES */
        #customDialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .dialog-box { background: #18181b; border: 2px solid #3f3f46; width: 100%; max-width: 400px; padding: 24px; color: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen pb-40 text-black">

    <div id="printZone"></div>
    <div id="modal"></div>
    <div id="customDialog"></div>

    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] items-center justify-center p-6 text-white no-print" style="display:none;">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-[90%] max-w-md p-8 shadow-2xl text-center text-white">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <div class="space-y-4 mt-6 text-white">
                <button onclick="window.confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 font-black uppercase text-sm">Submit & Save Results</button>
                <button onclick="window.confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 font-black uppercase text-sm">Discard & Delete Series</button>
                <button onclick="window.closeExitModal()" class="w-full bg-zinc-800 text-white p-4 font-bold uppercase text-xs">Back to Match</button>
            </div>
        </div>
    </div>

    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Loon Pond Stat Master</h1>
        </div>
        <div id="leagueModes" class="flex gap-1 bg-zinc-900 p-1 text-white">
            <button id="modeS" onclick="window.setMode('SINGLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="window.setMode('DOUBLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav id="navBar" class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="window.setTab('NEWS')" id="tabNEWS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">News</button>
        <button onclick="window.setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Standings</button>
        <button onclick="window.setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Club Stats</button>
        <button onclick="window.setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap text-red-500">Scorer</button>
        <button onclick="window.setTab('TOURNAMENT')" id="tabTOURNAMENT" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-sky-500 text-nowrap" style="display:none;">Tournament</button>
        <button onclick="window.setTab('HISTORY')" id="tabHISTORY" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">History</button>
        <button onclick="window.setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">NHPA</button>
        <button onclick="window.setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");
        const docRefTourney = doc(db, "tournament_final_v1", "data");

        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: {SINGLES:true, DOUBLES:true}, nhpa: { SINGLES: {}, DOUBLES: {} }, weeklyHoa: { SINGLES: [], DOUBLES: [] }, fourDeads: { SINGLES: {}, DOUBLES: {} }, news: '', scorerEnabled: true, tournamentEnabled: false, activeMatches: [] };
        let mode = 'DOUBLES';
        let view = 'NEWS';
        let isUnlocked = false;

        let tState = { roster: [], bracket: null, bracketHistory: {}, matchHistory: [], tActiveMatches: [] };
        let tView = 'BRACKET';
        let scoring = { active: false, mid: null, t1: null, t2: null, p1n: '', p2n: '', p3n: '', p4n: '', h1: 0, h2: 0, rotation: 'T1_FIRST', frames: [], currF: { p1: null, p2: null, p3: null, p4: null }, pitcherIdx: 0 };
        let bScale = 1.0;

        let match = { active: false, step: 'TEAMS', gameNum: 1, sessionId: null, t1Name: '', t2Name: '', p1: '', p2: '', p3: '', p4: '', h1: 0, h2: 0, h3: 0, h4: 0, games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1: null, p2: null, p3: null, p4: null }, seriesBuffer: [], fourDeadLog: {} };

        // --- CUSTOM MODAL SYSTEM ---
        const dBox = document.getElementById('customDialog');
        window.smAlert = (msg) => {
            return new Promise(res => {
                dBox.style.display = 'flex';
                dBox.innerHTML = `<div class="dialog-box text-center"><p class="font-bold mb-6 text-lg text-white">${msg}</p><button id="smOk" class="w-full bg-sky-500 text-black p-4 font-black uppercase">OK</button></div>`;
                document.getElementById('smOk').onclick = () => { dBox.style.display = 'none'; res(); };
            });
        };

        window.smConfirm = (msg) => {
            return new Promise(res => {
                dBox.style.display = 'flex';
                dBox.innerHTML = `<div class="dialog-box text-center"><p class="font-bold mb-6 text-lg uppercase italic text-sky-400">${msg}</p><div class="flex gap-2"><button id="smNo" class="flex-1 bg-zinc-800 p-4 font-black uppercase text-xs text-white">Cancel</button><button id="smYes" class="flex-1 bg-red-600 p-4 font-black uppercase text-xs text-white">Confirm</button></div></div>`;
                document.getElementById('smNo').onclick = () => { dBox.style.display = 'none'; res(false); };
                document.getElementById('smYes').onclick = () => { dBox.style.display = 'none'; res(true); };
            });
        };

        window.smPrompt = (msg, def = "") => {
            return new Promise(res => {
                dBox.style.display = 'flex';
                dBox.innerHTML = `<div class="dialog-box"><p class="font-bold mb-4 uppercase text-xs text-zinc-400">${msg}</p><input id="smIn" type="text" value="${def}" class="w-full bg-zinc-900 border border-zinc-700 p-4 mb-4 text-white font-bold outline-none"><button id="smGo" class="w-full bg-sky-500 text-black p-4 font-black uppercase">Submit</button><button id="smCancel" class="w-full mt-2 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button></div>`;
                const input = document.getElementById('smIn');
                input.focus();
                document.getElementById('smGo').onclick = () => { dBox.style.display = 'none'; res(input.value); };
                document.getElementById('smCancel').onclick = () => { dBox.style.display = 'none'; res(null); };
            });
        };

        window.smKeypad = (msg) => {
            return new Promise(res => {
                dBox.style.display = 'flex';
                dBox.innerHTML = `<div class="dialog-box text-center"><p class="font-black italic uppercase text-sky-500 mb-4">${msg}</p><div class="grid grid-cols-3 gap-2">${[0,1,2,3,4,6].map(n => `<button class="kp-btn bg-zinc-800 text-white p-6 font-black text-2xl hover:bg-sky-500 hover:text-black" data-val="${n}">${n}</button>`).join('')}</div><button id="smCancel" class="w-full mt-4 text-zinc-500 font-bold uppercase text-[10px]">Cancel</button></div>`;
                document.querySelectorAll('.kp-btn').forEach(btn => {
                    btn.onclick = () => { dBox.style.display = 'none'; res(btn.dataset.val); };
                });
                document.getElementById('smCancel').onclick = () => { dBox.style.display = 'none'; res(null); };
            });
        };

        // PREVENT ACCIDENTAL REFRESH DURING MATCH
        window.addEventListener('beforeunload', (e) => {
            if ((match && match.active) || (scoring && scoring.active)) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        onSnapshot(docRef, (snapshot) => { 
            if (snapshot.exists()) { 
                const incoming = snapshot.data();
                state = incoming;
                if(!state.managePin) state.managePin = '1234';
                if(!state.nhpa) state.nhpa = {SINGLES:{}, DOUBLES:{}};
                if(!state.hcpLocked) state.hcpLocked = {SINGLES:true, DOUBLES:true};
                if(!state.weeklyHoa) state.weeklyHoa = { SINGLES: [], DOUBLES: [] };
                if(!state.fourDeads) state.fourDeads = { SINGLES: {}, DOUBLES: {} };
                if(state.news === undefined) state.news = '';
                if(state.scorerEnabled === undefined) state.scorerEnabled = true;
                if(state.tournamentEnabled === undefined) state.tournamentEnabled = false;
                if(!state.activeMatches) state.activeMatches = [];
                render(); 
            } 
        });

        onSnapshot(docRefTourney, (snap) => { 
            if (snap.exists()) { 
                tState = snap.data(); 
                if(!tState.matchHistory) tState.matchHistory = [];
                if(!tState.tActiveMatches) tState.tActiveMatches = [];
                render(); 
            } 
        });

        async function save() { await setDoc(docRef, state); }
        async function tSave() { await setDoc(docRefTourney, tState); }

        const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';
        const getSym = (pts, oppPts = 0) => { 
            if(pts===null||pts===undefined) return '--'; 
            if(Number(pts) === 6 && Number(oppPts) === 6) return 'XX';
            if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return '--'; 
        };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        const getFirst = (n) => {
            if(!n) return '---';
            if(n.includes(',')) return n.split(',')[1].trim().split(' ')[0];
            return n.split(' ')[0];
        };

        function getPlyrAvg(pName) {
            const n = cleanN(pName); if(!pName || ['bye','dummy'].includes(n)) return 0;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            const rawAvg = hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : (p ? Number(p.startAvg) : 0);
            return Math.round(rawAvg);
        }

        function getH(pName) {
            const n = cleanN(pName); if(!pName || n === 'bye') return 0; if(n === 'dummy') return 54;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            if (state.hcpLocked && state.hcpLocked[mode]) return Number(p ? (p.currentHcp || 0) : 0);
            const avg = getPlyrAvg(pName);
            return Math.max(0, Math.floor(((mode==='DOUBLES'?90:150) - avg) * 0.9));
        }

        window.zoomB = (delta) => {
            if (delta === 'reset') bScale = 1.0;
            else bScale = Math.max(0.1, Math.min(2.0, bScale + delta));
            render();
        };

        window.confirmExit = (choice) => { 
            window.closeExitModal(); 
            if (choice === 'SUBMIT') {

            const getSeedOrder = (n) => { let order = [0, 1]; for (let i = 2; i < n; i <<= 1) { let next = []; for (let j = 0; j < order.length; j++) { next.push(order[j]); next.push(i * 2 - 1 - order[j]); } order = next; } return order; };

        function tAdvance(mid, winner, loser) {
            const b = tState.bracket; const parts = mid.split('-'); const prefix = parts[0][0]; const r = parseInt(parts[0].substring(1)) || 0; const mIdx = parseInt(parts[1].substring(1));
            const wRounds = Math.log2(Math.pow(2, Math.ceil(Math.log2(tState.roster.length))));

bmitted" class="w-full p-2 border mb-2" value="${cfg.dateSubmitted||''}"></div><div><label class="block text-[10px] font-black uppercase">Cancellation</label><input id="f-cancellation" class="w-full p-2 border mb-2" value="${cfg.cancellation||''}"></div><div><label class="block text-[10px] font-black uppercase">Count All</label><input id="f-countAll" class="w-full p-2 border mb-2" value="${cfg.countAll||''}"></div></div><div class="mt-6 flex gap-2"><button onclick="window.smAlert('Settings Saved'); window.saveNhpaForm()" class="flex-1 bg-black text-white p-4 font-black uppercase">Save</button><button onclick="window.printSanctionSheet()" class="flex-1 bg-sky-500 text-white p-4 font-black uppercase">Print NHPA Form</button></div></div></div>`;

 News Editor</h3><textarea id="newsInput" class="w-full h-40 border p-3 rounded-none text-sm mb-2" placeholder="Write club news here...">${state.news || ''}</textarea><button onclick="window.saveNews()" class="w-full bg-sky-500 text-white p-4 font-black uppercase shadow-lg">Save News Update</button></div><textarea id="rosterInput" class="w-full h-24 border p-3 rounded-none text-xs" placeholder="Import Roster..."></textarea><button onclick="window.importRoster()" class="w-full bg-black text-white p-4 rounded-none font-black uppercase shadow-lg">Sync Cloud</button><div class="mt-4"><h3 class="text-[10px] font-black uppercase mb-2">Roster Management</h3>${rH}</div></div>`;
            } else if (view === 'TOURNAMENT') {
                let navHtml = `<nav class="flex flex-col bg-zinc-950 border-b border-zinc-900 sticky top-0 z-50"><div class="flex"><button onclick="setTView('BRACKET')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'BRACKET' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Bracket</button><button onclick="setTView('ROSTER')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'ROSTER' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Roster</button><button onclick="setTView('MANAGE')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'MANAGE' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Manage</button></div>${tView === 'BRACKET' && tState.bracket ? `<div class="flex gap-2 p-3 bg-zinc-900 border-t border-zinc-800 no-print justify-center items-center"><button onclick="window.zoomB(0.1)" class="bg-zinc-800 text-white px-5 py-2 text-sm font-black border border-zinc-700 hover:bg-zinc-700">+</button><button onclick="window.zoomB(-0.1)" class="bg-zinc-800 text-white px-5 py-2 text-sm font-black border border-zinc-700 hover:bg-zinc-700">-</button><button onclick="window.zoomB('reset')" class="bg-zinc-800 text-white px-5 py-2 text-[10px] uppercase font-black border border-zinc-700 hover:bg-zinc-700">Reset</button><button onclick="window.printBracket()" class="bg-sky-700 text-white px-5 py-2 text-[10px] uppercase font-black border border-sky-800 hover:bg-sky-600 ml-2">Print Bracket</button></div>` : ''}</nav>`;
                if (tView === 'ROSTER') {

                } else if (tView === 'BRACKET') {
                    const activeMatchHtml = tState.tActiveMatches.map(m => `<div class="bg-sky-900/50 border-2 border-sky-500/50 p-3 mb-2 flex justify-between items-center rounded-xl mx-4 mt-2 text-white"><div class="text-left"><p class="text-[10px] font-black uppercase text-sky-400">Match in Progress</p><p class="text-sm font-black uppercase text-white">${m.t1.name} vs ${m.t2.name}</p></div><div class="flex gap-2"><button onclick="resumeTMatch(${m.sessionId})" class="bg-sky-500 text-black px-3 py-2 text-[10px] font-black uppercase rounded-lg">Resume</button><button onclick="deleteTMatch(${m.sessionId})" class="bg-red-500 text-white px-3 py-2 text-[10px] font-black uppercase rounded-lg">Del</button></div></div>`).join('');
                    if (!tState.bracket) content.innerHTML = navHtml + `<div class="mt-20 text-center"><button onclick="initBracket()" class="bg-sky-500 text-black px-12 py-5 rounded-2xl font-black text-sm uppercase">Initialize Bracket</button></div>`;

        function renderCard(m) { return `<div class="match-card" onclick="openMatch('${m.id}')"><div class="team-line ${m.win === m.t1?.name ? 'win' : (m.win ? 'loss' : '')}"><span>${m.t1?.name || '?'} ${m.t1?.isBye ? '' : '(S' + (m.t1?.id || '?') + ')'}</span><span class="score-box">${m.s1}</span></div><div class="team-line ${m.win === m.t2?.name ? 'win' : (m.win ? 'loss' : '')}"><span>${m.t2?.name || '?'} ${m.t2?.isBye ? '' : '(S' + (m.t2?.id || '?') + ')'}</span><span class="score-box">${m.s2}</span></div></div>`; }

        function renderScorer() {
            const mod = document.getElementById('modal'); mod.style.display = 'block';
            const fNum = scoring.frames.length + 1;
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            const upKey = turn[scoring.pitcherIdx]; const isT1Turn = ['p1', 'p2'].includes(upKey);
            const t1s = scoring.frames.reduce((a, b) => a + (Number(b.p1) || 0) + (Number(b.p2) || 0), 0) + scoring.h1;
            const t2s = scoring.frames.reduce((a, b) => a + (Number(b.p3) || 0) + (Number(b.p4) || 0), 0) + scoring.h2;
            const rp1 = scoring.frames.reduce((s,f)=>s+getR(f.p1),0) + getR(scoring.currF.p1), rp2 = scoring.frames.reduce((s,f)=>s+getR(f.p2),0) + getR(scoring.currF.p2), rp3 = scoring.frames.reduce((s,f)=>s+getR(f.p3),0) + getR(scoring.currF.p3), rp4 = scoring.frames.reduce((s,f)=>s+getR(f.p4),0) + getR(scoring.currF.p4);
            const getSymT = (pts, oppPts) => { if (pts === null) return '--'; if (pts === 6 && oppPts === 6) return 'XX'; if (pts >= 6) return 'OO'; if (pts === 4) return "O'"; if (pts === 3) return 'O'; return '--'; };
            
            mod.innerHTML = `
            <div class="sticky top-0 z-[100] bg-black text-white">
                <div class="bg-black p-3 flex justify-between items-center border-b border-zinc-800"><button onclick="document.getElementById('modal').style.display='none'; scoring.active=false;" class="text-[10px] font-black uppercase text-zinc-500">Back</button><span class="text-sky-400 font-black text-xs uppercase">Frame ${fNum} ${fNum > 15 ? '(Tie-Break)' : ''}</span><div class="w-8"></div></div>
                <div class="grid grid-cols-2 bg-zinc-900 border-b border-zinc-800">
                    <div class="p-10 text-center transition-colors duration-300 ${isT1Turn ? 'active-team-card' : ''}"><p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t1.name}</p><div class="flex justify-center gap-1 mt-1 mb-2"><span class="bg-zinc-800/50 text-[8px] px-2 py-0.5 font-black uppercase border border-zinc-700">${getFirst(scoring.p1n)}: ${rp1}R</span><span class="bg-zinc-800/50 text-[8px] px-2 py-0.5 font-black uppercase border border-zinc-700">${getFirst(scoring.p2n)}: ${rp2}R</span></div><p class="text-5xl font-black score-val">${t1s}</p></div>
                    <div class="p-10 text-center transition-colors duration-300 ${!isT1Turn ? 'active-team-card' : ''}"><p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t2.name}</p><div class="flex justify-center gap-1 mt-1 mb-2"><span class="bg-zinc-800/50 text-[8px] px-2 py-0.5 font-black uppercase border border-zinc-700">${getFirst(scoring.p3n)}: ${rp3}R</span><span class="bg-zinc-800/50 text-[8px] px-2 py-0.5 font-black uppercase border border-zinc-700">${getFirst(scoring.p4n)}: ${rp4}R</span></div><p class="text-5xl font-black score-val">${t2s}</p></div>
                </div>
                <div class="bg-sky-500 text-black text-center p-4 font-black uppercase text-[12px] italic">UP: ${getFirst(upKey === 'p1' ? scoring.p1n : upKey === 'p2' ? scoring.p2n : upKey === 'p3' ? scoring.p3n : scoring.p4n)}</div>
                <div class="t-btn-score-grid">${[0, 1, 2, 3, 4, 6].map(s => `<button onclick="tAddScore(${s})" class="t-btn-score"><span class="num">${s}</span><span class="sym">${getSym(s)}</span></button>`).join('')}</div>
            </div>
            <div class="t-micro-container">
                <table class="t-micro-table">
                    <thead><tr><th class="c-sh">SH</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t">T1</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t2">T2</th></tr></thead>
                    <tbody><tr class="bg-zinc-950"><td class="c-sh">${fNum * 2}</td><td class="c-r">${getSymT(scoring.currF.p1, scoring.currF.p3)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p1 ?? ''}</td><td class="c-s"></td><td class="c-r">${getSymT(scoring.currF.p2, scoring.currF.p4)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p2 ?? ''}</td><td class="c-s"></td><td></td><td class="c-r">${getSymT(scoring.currF.p3, scoring.currF.p1)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p3 ?? ''}</td><td class="c-s"></td><td class="c-r">${getSymT(scoring.currF.p4, scoring.currF.p2)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p4 ?? ''}</td><td class="c-s"></td><td></td></tr>${scoring.frames.map((f, i) => { const sl = scoring.frames.slice(0, i + 1); const s1 = sl.reduce((a, b) => a + (Number(b.p1) || 0), 0); const s2 = sl.reduce((a, b) => a + (Number(b.p2) || 0), 0); const s3 = sl.reduce((a, b) => a + (Number(b.p3) || 0), 0); const s4 = sl.reduce((a, b) => a + (Number(b.p4) || 0), 0); return `<tr><td class="c-sh">${f.sh}</td><td class="c-r">${getSymT(f.p1, f.p3)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 1)">${f.p1}</td><td class="c-s">${s1}</td><td class="c-r">${getSymT(f.p2, f.p4)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 2)">${f.p2}</td><td class="c-s">${s2}</td><td class="c-t">${s1 + s2 + scoring.h1}</td><td class="c-r">${getSymT(f.p3, f.p1)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 3)">${f.p3}</td><td class="c-s">${s3}</td><td class="c-r">${getSymT(f.p4, f.p2)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 4)">${f.p4}</td><td class="c-s">${s4}</td><td class="c-t2">${s3 + s4 + scoring.h2}</td></tr>`; }).reverse().join('')}</tbody>
                </table>
            </div>`;
        }

        window.printSanctionSheet = () => {
            const cfg = state.nhpa[mode] || {};
            const shoesPerG = Number(cfg.shoesPerGame) || (mode === 'DOUBLES' ? 30 : 50);
            const pNames = [...new Set(state.history.filter(h => h.mode === mode).map(h => h.player))];
            const pData = pNames.map(pN => {
                const g = state.history.filter(h => cleanN(h.player) === cleanN(pN) && h.mode === mode);
                const rList = mode === 'SINGLES' ? state.roster.SINGLES : state.roster.DOUBLES.flatMap(t => t.members);
                const rRec = rList.find(p => cleanN(p.name) === cleanN(pN)) || {cardNo:'---', category: '---', prevHighRinger: 0};
                const totalPts = g.reduce((s,x)=>s+x.score,0);
                const highPts = g.length ? Math.max(...g.map(x=>x.score)) : 0;
                const totalShoes = g.length * shoesPerG;
                const totalRingers = g.reduce((s,x)=>s+x.ringers,0);
                const prevHighR = Number(rRec.prevHighRinger || 0);
                const currSeasonHiR = g.length ? Math.max(...g.map(x=>(x.ringers/shoesPerG)*100)) : 0;
                const finalRingerPct = totalShoes > 0 ? (totalRingers / totalShoes) * 100 : 0;
                const np = pN.includes(',') ? pN.split(',') : [pN, ''];
                return { 
                    last: np[0].trim(), 
                    first: np[1]?.trim() || '', 
                    div: rRec.category || '---', 
                    card: rRec.cardNo || '---', 
                    c1: totalPts, 
                    c2: highPts, 
                    c3: totalShoes, 
                    c4: totalRingers, 
                    c5: prevHighR.toFixed(1), 
                    c6: currSeasonHiR.toFixed(1), 
                    c7: finalRingerPct.toFixed(1), 
                    elig: Math.floor(currSeasonHiR / 10) > Math.floor(prevHighR / 10) ? 'Y' : '' 
                };
            }).sort((a,b) => a.last.localeCompare(b.last));
            let rows = pData.map(d => `<tr style="text-align:center; font-size: 7.5pt; height: 18px;"><td style="border:1.5px solid black; text-align:left; padding-left:3px;">${d.last}</td><td style="border:1.5px solid black; text-align:left; padding-left:3px;">${d.first}</td><td style="border:1.5px solid black;">${d.div}</td><td style="border:1.5px solid black;">${d.card}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c1}</td><td style="border:1.5px solid black;">${d.c2}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c3}</td><td style="border:1.5px solid black;">${d.c4}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c5}</td><td style="border:1.5px solid black;">${d.c6}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c7}</td><td style="border:1.5px solid black;">${d.elig}</td></tr>`).join('');
            for(let i=0; i<5; i++) rows += `<tr style="height: 18px;"><td style="border:1.5px solid black;" colspan="12"></td></tr>`;
