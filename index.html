<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond Stat Master Cloud</title>
    <!-- 1. PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="apple-touch-icon" href="logo.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }

        /* FULLSCREEN HIDE HEADER/NAV */
        :fullscreen header, :fullscreen nav { display: none !important; }
        :-webkit-full-screen header, :-webkit-full-screen nav { display: none !important; }
        :fullscreen .sticky-scorer { top: 0 !important; }

        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLES - FIXED WIDTH FOR MOBILE FIT */
        .scorer-max-width { max-width: 900px; margin: 0 auto; width: 100%; }
        
        .micro-container { 
            width: 100%; 
            background: #000; 
            border-top: 1px solid #333;
            height: calc(100vh - 540px);
            overflow-y: auto;
        }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { 
            font-size: 0.5rem;
            padding: 8px 0; 
            color: #7dd3fc; 
            background: #111; 
            border: 0.5px solid #222; 
            text-transform: uppercase;
        }
        .micro-table td { font-size: 1.1rem; padding: 12px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        
        /* SCORER COLUMN WIDTH PERCENTAGES (Total = 100%) */
        .c-sh { width: 8% !important; font-weight: 900; color: #0ea5e9 !important; border-right: 1.5px solid #0ea5e9 !important; background: #000; position: sticky; left: 0; z-index: 10; }
        .c-r { width: 5% !important; color: #38bdf8; font-weight: bold; font-size: 0.6rem !important; } 
        .c-p { width: 5% !important; font-weight: bold; color: #facc15; } 
        .c-s { width: 6% !important; font-weight: bold; color: #fff; opacity: 0.5; }
        /* T1 and T2 - Highlight Removed */
        .c-t { width: 13.5% !important; background: #000 !important; color: #fff !important; font-weight: 900; font-size: 1.1rem !important; border-left: 1px solid #333 !important; border-right: 1px solid #333 !important; }
        .c-t2 { width: 13.5% !important; background: #000 !important; color: #0ea5e9 !important; font-weight: 900; font-size: 1.1rem !important; border-left: 1px solid #333 !important; }

        .edit-cell { color: #fcd34d !important; font-weight: 900; cursor: pointer; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* PITCHING HIGHLIGHT */
        .slot-selected { border: 6px solid #0ea5e9 !important; background: #e0f2fe !important; }
        .slot-filled { opacity: 0.4; pointer-events: none; }

        /* DATA TABLES */
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.55rem; padding: 12px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 12px 1px; text-align: center; font-size: 0.95rem; font-weight: bold; vertical-align: middle; }

        .stats-name-col { width: 160px; min-width: 160px; text-align: left !important; padding-left: 15px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; position: sticky; left: 0; background: #000; z-index: 10; color: #fff !important; font-size: 0.9rem !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-name-col { width: 52%; text-align: left !important; padding-left: 10px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; color: #fff !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-num-col { width: 9%; color: #fff; }
        .pts-col { width: 12%; background: #0a0a0a; color: #0ea5e9 !important; font-size: 1.1rem !important; }

        .sum-stats-table { width: 100%; border-collapse: collapse; table-layout: auto; background: #000; color: #fff; }
        .sum-stats-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.65rem; padding: 12px 10px; border: 1px solid #333; text-transform: uppercase; text-align: left; }
        .sum-stats-table td { border-bottom: 1px solid #222; padding: 12px 10px; text-align: left; font-size: 0.95rem; font-weight: bold; vertical-align: middle; white-space: normal !important; overflow-wrap: break-word; }
        .sum-stats-table .val-col { text-align: center; background: #0a0a0a; color: #0ea5e9; width: 60px; border-left: 1px solid #333; font-size: 1.1rem; }

        /* WEEKLY LINEUP TABLE STYLING - FIXING COURT BOX SIZE */
        .lineup-table { width: 100%; border-collapse: collapse; background: white; border: 4px solid #000; margin-top: 10px; table-layout: fixed; }
        .lineup-header-bg { background-color: #0ea5e9 !important; color: #000 !important; }
        .lineup-table th { padding: 15px; font-weight: 900; font-size: 1.4rem; border-bottom: 4px solid #000; text-align: center; text-transform: uppercase; font-style: italic; }
        
        /* ADJUSTED: FIT WORD "COURT" IN THE BOX */
        .lineup-table th.lineup-court-col { font-size: 1rem !important; padding: 5px 2px; }

        .lineup-table td { padding: 12px; border: 1px solid #e2e8f0; font-weight: 800; text-align: center; font-size: 1.1rem; color: #1e293b; overflow-wrap: break-word; vertical-align: middle; }
        .lineup-row-even { background-color: #f8fafc; }
        .lineup-row-odd { background-color: #ffffff; }
        /* IMPORTANT: PRE-LINE RESPECTS THE NEWLINES IN OUR PROCESSED DATA */
        .lineup-matchup-col { text-align: center !important; line-height: 1.4; white-space: pre-line; letter-spacing: -0.5px; }
        .lineup-court-col { width: 80px; background: #1e293b; color: #38bdf8 !important; border-right: 4px solid #000 !important; font-size: 1.5rem; font-weight: 900; }

        #printZone { display: none; }

        @media print {
            @page { margin: 1cm; size: portrait; }
            .no-print, header, nav, main, #exitModal, button { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            #printZone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; z-index: 99999; background: white !important; }
            #printZone * { position: static !important; overflow: visible !important; color: black !important; background: transparent !important; border-color: black !important; border-radius: 0 !important; box-shadow: none !important; text-shadow: none !important; }
            .std-table, .sum-stats-table { width: 100% !important; border: 1px solid black !important; border-collapse: collapse !important; table-layout: fixed !important; margin-bottom: 20px !important; }
            .std-table th, .std-table td, .sum-stats-table th, .sum-stats-table td { border: 1px solid black !important; padding: 6px 3px !important; font-size: 11pt !important; color: black !important; line-height: 1.2 !important; }
            .stats-name-col { width: 25% !important; border-right: 1px solid black !important; text-align: left !important; padding-left: 6px !important; font-size: 10pt !important; }
            .pts-col, .val-col { background: #f0f0f0 !important; font-weight: bold !important; border-left: 1px solid black !important; }
            .grid { display: flex !important; gap: 10px !important; align-items: flex-start !important; }
            .grid > div { flex: 1 !important; }
            .lineup-table { width: 100% !important; border: 2px solid black !important; box-shadow: none !important; }
            .lineup-header-bg { background-color: #0ea5e9 !important; -webkit-print-color-adjust: exact; }
            .lineup-court-col { background-color: #eee !important; color: black !important; border-right: 2px solid black !important; }
        }

        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; background: #000; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; height: 72px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-score .num { font-size: 2.2rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.7rem; color: #94a3b8; font-weight: bold; }

        /* BUTTON SCORER STYLES */
        .manual-entry-btn { background: white; border: 2px solid #e2e8f0; height: 44px; width: 100%; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #000; border-radius: 6px !important; transition: background 0.2s; }
        .manual-entry-btn.active { border-color: #0ea5e9; background: #f0f9ff; }

        .sum-row-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 10px; }
        .sum-row-table th { color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding: 5px; font-size: 8px; text-align: center; }
        .sum-row-table td { padding: 10px 2px; border-bottom: 1px solid #f1f5f9; font-weight: 900; text-align: center; vertical-align: middle; }

        /* TOURNAMENT SPECIFIC CSS */
        .t-btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: #000; }
        .t-btn-score { background: #1e293b; border-radius: 16px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 5px solid #0f172a; }
        .t-btn-score .num { font-size: 3.2rem; font-weight: 900; line-height: 1; color: white; }
        .t-btn-score .sym { font-size: 0.8rem; color: #38bdf8; font-weight: 900; margin-top: 4px; }

        .t-micro-container { width: 100%; background: #000; overflow-x: hidden; border-top: 1px solid #1e293b; height: 40vh; overflow-y: auto; }
        .t-micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .t-micro-table th { font-size: 0.35rem; padding: 4px 0; color: #7dd3fc; background: #0f172a; border: 0.1px solid #1e293b; text-transform: uppercase; }
        .t-micro-table td { font-size: 0.8rem; padding: 8px 0; text-align: center; border: 0.1px solid #0f172a; color: #fff; line-height: 1; }

        .active-team-card { background-color: #0ea5e9 !important; color: #000 !important; }
        .active-team-card p { color: #000 !important; opacity: 1 !important; font-weight: 900; }
        .active-team-card .score-val { color: #000 !important; }

        /* BRACKET STACKED VIEW STYLES */
        .bracket-outer { width: 100%; overflow: auto; background: #020617; height: calc(100vh - 200px); position: relative; }
        .bracket-scale-layer { transform-origin: 0 0; transition: transform 0.2s ease-out; display: inline-flex; flex-direction: column; width: max-content; min-width: 100%; }
        
        .bracket-section-header { background: #0ea5e9; color: black; font-weight: 900; font-style: italic; text-transform: uppercase; text-align: center; padding: 8px; font-size: 14px; letter-spacing: 1px; width: 100%; z-index: 10; }
        
        .bracket-row-scroll { display: flex; gap: 25px; padding: 20px; align-items: flex-start; width: max-content; }
        .finals-center-box { display: flex; justify-content: center; padding: 40px 20px; border-bottom: 1px solid #1e293b; }

        .round-col { display: flex; flex-direction: column; gap: 20px; min-width: 180px; }
        .round-title { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; border-bottom: 1px solid #1e293b; margin-bottom: 8px; }
        .match-card { background: #111827; border: 1.5 solid #1e293b; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .match-card:hover { border-color: #0ea5e9; }
        .team-line { display: flex; justify-content: space-between; padding: 12px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #020617; color: white; }
        .team-line.win { background: #083344; color: #22d3ee; }
        .score-box { background: #000; color: #fff; padding: 4px 8px; border-radius: 6px; min-width: 30px; text-align: center; }
        .t-select { background: #1e293b; border: 2px solid #334155; padding: 18px; border-radius: 12px; width: 100%; color: white; font-weight: 900; font-size: 18px; margin-top: 6px; }
        .rot-btn { flex: 1; background: #1e293b; padding: 20px; border-radius: 12px; font-weight: 900; border: 2px solid transparent; color: white; }
        .rot-active { background: #0ea5e9; color: black; }
        #modal { display: none; position: fixed; inset: 0; background: #020617; z-index: 1000; overflow-y: auto; color: white; }

        /* CUSTOM DIALOG STYLES */
        #customDialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .dialog-box { background: #18181b; border: 2px solid #3f3f46; width: 100%; max-width: 400px; padding: 24px; color: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

        /* LANDSCAPE SPECIFIC ADJUSTMENTS - HUGE SCORE RESTORED */
        @media (orientation: landscape) {
            .sticky-scorer { position: relative !important; top: 0 !important; width: 100% !important; max-width: none !important; }
            
            /* INCREASE TEXT OF FRAMED SCORES */
            .micro-container { height: auto !important; min-height: 250px; overflow-y: visible !important; }
            .micro-table td { font-size: 1.6rem !important; padding: 15px 0 !important; }
            .micro-table th { font-size: 0.8rem !important; }
            
            .t-micro-container { height: auto !important; min-height: 200px; }
            .t-micro-table td { font-size: 1.4rem !important; padding: 12px 0 !important; }
            .t-micro-table th { font-size: 0.7rem !important; }

            /* INCREASE TEXT OF END GAME SUMMARY */
            .sum-row-table { font-size: 1.4rem !important; }
            .sum-row-table th { font-size: 1rem !important; }
            .sum-row-table td { font-size: 1.4rem !important; padding: 15px 5px !important; }

            .btn-score-grid { grid-template-columns: repeat(6, 1fr) !important; padding: 5px !important; }
            .btn-score { height: 90px !important; background: #fff !important; }
            .btn-score .num { font-size: 3rem !important; }
            .btn-score .sym { display: block; font-size: 0.8rem; }
            .sticky-scorer .text-8xl { font-size: 12rem !important; line-height: 0.8 !important; }
            .sticky-scorer .py-4 { padding: 1.5rem !important; }
            .sticky-scorer .text-[12px] { font-size: 1.2rem !important; }
            .sticky-scorer .text-[11px] { font-size: 1rem !important; }
            
            /* MAKE NAME CLICK TARGETS EVEN BIGGER IN LANDSCAPE */
            .sticky-scorer button[onclick*="setScoringSlot"] { font-size: 1.8rem !important; padding: 12px 20px !important; }

            .t-btn-score-grid { grid-template-columns: repeat(6, 1fr) !important; padding: 8px !important; }
            .t-btn-score { height: 100px !important; }
            .t-btn-score .num { font-size: 3rem !important; }
            .c-t, .c-t2 { width: 15% !important; }
        }

        /* REPORT STYLES */
        .report-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 5px; background: white; color: black; }
        .report-card { border: 1px solid #ccc; font-family: 'Roboto Condensed', sans-serif; }
        .report-header { background: #f3f4f6; padding: 4px; border-bottom: 1px solid #ccc; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 12px; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .report-table td { border: 1px solid #eee; padding: 4px; }
        .report-table tr td:nth-child(2) { text-align: center; width: 40px; font-weight: bold; }
        .report-table tr td:nth-child(1) { width: 40px; color: #666; text-align: center; }
    </style>
</head>
<body class="min-h-screen pb-40 text-black">

    <div id="printZone"></div>
    <div id="modal"></div>
    <div id="customDialog"></div>

    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] items-center justify-center p-6 text-white no-print" style="display:none;">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-[90%] max-w-md p-8 shadow-2xl text-center text-white">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <div class="space-y-4 mt-6 text-white">
                <button onclick="window.confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 font-black uppercase text-sm">Submit & Save Results</button>
                <button onclick="window.confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 font-black uppercase text-sm">Discard & Delete Series</button>
                <button onclick="window.closeExitModal()" class="w-full bg-zinc-800 text-white p-4 font-bold uppercase text-xs">Back to Match</button>
            </div>
        </div>
    </div>

    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Loon Pond Stat Master</h1>
        </div>
        <div id="leagueModes" class="flex gap-1 bg-zinc-900 p-1 text-white">
            <button id="modeS" onclick="window.setMode('SINGLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="window.setMode('DOUBLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav id="navBar" class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="window.setTab('NEWS')" id="tabNEWS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">News</button>
        <button onclick="window.setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Standings</button>
        <button onclick="window.setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Club Stats</button>
        <button onclick="window.setTab('LINEUP')" id="tabLINEUP" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Lineup</button>
        <button onclick="window.setTab('REPORT')" id="tabREPORT" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Report</button>
        <button onclick="window.setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap text-red-500">Scorer</button>
        <button onclick="window.setTab('TOURNAMENT')" id="tabTOURNAMENT" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-sky-500 text-nowrap" style="display:none;">Tournament</button>
        <button onclick="window.setTab('HISTORY')" id="tabHISTORY" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">History</button>
        <button onclick="window.setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">NHPA</button>
        <button onclick="window.setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        // 1. PWA Logic: Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {

            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",

            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");
        const docRefTourney = doc(db, "tournament_final_v1", "data");

        // state updated to include 4. Singles Half logic storage
        // LOGGING FIX: Ensure fourDeads DOUBLES is initialized as an object {}
        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: {SINGLES:true, DOUBLES:true}, manualEntryEnabled: true, nhpa: { SINGLES: {}, DOUBLES: {} }, weeklyHoa: { SINGLES: [], DOUBLES: [] }, fourDeads: { SINGLES: {}, DOUBLES: {} }, news: '', scorerEnabled: true, tournamentEnabled: false, reportEnabled: true, historyEnabled: true, nhpaEnabled: true, winners: {champ:'', runner:'', season:''}, activeMatches: [], singlesHalfWinner: null, singlesHalfHcp: null, singlesHalfArchive: [], singlesPlayoffActive: false, singlesStandingsResetDate: null, weeklyLineup: { SINGLES: { weekTitle: 'Singles Week 1', rawPaste: '' }, DOUBLES: { weekTitle: 'Doubles Week 1', rawPaste: '' } } };
        let mode = 'DOUBLES';
        let view = 'NEWS';
        let scorerMode = 'LIVE'; 
        let isUnlocked = false;

        let tState = { roster: [], bracket: null, bracketHistory: {}, matchHistory: [], tActiveMatches: [] };
        let tView = 'BRACKET';
        let scoring = { active: false, step: 'LIVE', mid: null, t1: null, t2: null, p1n: '', p2n: '', p3n: '', p4n: '', h1: 0, h2: 0, rotation: 'T1_FIRST', frames: [], currF: { p1: null, p2: null, p3: null, p4: null }, pitcherIdx: 0 };
        let bScale = 1.0;

        let match = { active: false, step: 'TEAMS', gameNum: 1, sessionId: null, t1Name: '', t2Name: '', p1: '', p2: '', p3: '', p4: '', h1: 0, h2: 0, h3: 0, h4: 0, games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1: null, p2: null, p3: null, p4: null }, seriesBuffer: [], fourDeadLog: {}, isPlayoff: false, selectedSlot: null };

        const dBox = document.getElementById('customDialog');
        window.smAlert = (msg) => {

        const getSym = (pts, oppPts = 0) => { 
            if(pts===null||pts===undefined) return '--'; 
            if(Number(pts) === 6 && Number(oppPts) === 6) return 'XX';
            if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return '--'; 
        };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        const getFirst = (n) => {
            if(!n) return '---';
            if(n.includes(',')) return n.split(',')[1].trim().split(' ')[0];

        function getPlyrAvg(pName) {
            const n = cleanN(pName); if(!pName || ['bye','dummy'].includes(n)) return 0;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            const rawAvg = hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : (p ? Number(p.startAvg) : 0);
            return Math.round(rawAvg);
        }

        // 4. Update Handicap Logic for 2-Half System
        function getH(pName) {
            const n = cleanN(pName); if(!pName || n === 'bye') return 0; if(n === 'dummy') return 54;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            
            let currentCalc = 0;
            if (state.hcpLocked && state.hcpLocked[mode]) {
                currentCalc = Number(p ? (p.currentHcp || 0) : 0);
            } else {
                const avg = getPlyrAvg(pName);
                currentCalc = Math.max(0, Math.floor(((mode==='DOUBLES'?90:150) - avg) * 0.9));
            }

            // Logic: Winner uses the "Better" (Lower) handicap for the playoff
            if (mode === 'SINGLES' && state.singlesHalfWinner && cleanN(state.singlesHalfWinner) === n) {
                return Math.min(currentCalc, state.singlesHalfHcp || currentCalc);
            }
            return currentCalc;
        }

        window.tAddScore = (pts) => {
            const fNum = scoring.frames.length + 1; 
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            scoring.currF[turn[scoring.pitcherIdx]] = pts; scoring.pitcherIdx++;

            if(scoring.pitcherIdx > 3) { 
                scoring.frames.push({ ...scoring.currF, sh: fNum * 2 }); 
                scoring.currF = { p1: null, p2: null, p3: null, p4: null }; scoring.pitcherIdx = 0; 
                const t1s = scoring.frames.reduce((a,b)=>a+(Number(b.p1)||0)+(Number(b.p2)||0),0) + scoring.h1; 
                const t2s = scoring.frames.reduce((a,b)=>a+(Number(b.p3)||0)+(Number(b.p4)||0),0) + scoring.h2; 
                const frameCount = scoring.frames.length;
                if (frameCount >= 15) {
                    const extra = frameCount - 15;
                    if (extra % 2 === 0 && t1s !== t2s) { 
                        scoring.step = 'SUMMARY'; 
                        scoring.final1 = t1s;
                        scoring.final2 = t2s;
                        renderScorer();
                        return; 
                    }
                }
            }
            const idx = tState.tActiveMatches.findIndex(m => m.sessionId === scoring.sessionId);
            if(idx !== -1) { tState.tActiveMatches[idx] = JSON.parse(JSON.stringify(scoring)); tSave(); }
            renderScorer();
        };

            m.win = winT.name; 
            m.s1 = scoring.final1; 
            m.s2 = scoring.final2; 
            tState.bracketHistory[scoring.mid] = { ...scoring, s1: scoring.final1, s2: scoring.final2 }; 
            tState.matchHistory.push({ id: scoring.mid, date: new Date().toLocaleDateString(), timestamp: Date.now(), t1Name: scoring.t1.name, t2Name: scoring.t2.name, s1: scoring.final1, s2: scoring.final2, frames: JSON.parse(JSON.stringify(scoring.frames)), p1n: scoring.p1n, p2n: scoring.p2n, p3n: scoring.p3n, p4n: scoring.p4n, h1: scoring.h1, h2: scoring.h2 });

            const [t1n, t2n] = sess.name.split(' vs '); const target = sess.mode === 'SINGLES' ? 135 : 162;

            else if (cleanN(t1n) === 'bye') { g.s2 = s2raw; g.s1 = (s2raw >= target) ? target - 1 : target; }
            else { g.s1 = s1raw; g.s2 = s2raw; }
            const r1 = g.s1 > g.s2 ? 'W' : (g.s1 < g.s2 ? 'L' : 'T'), r2 = g.s2 > g.s1 ? 'W' : (g.s2 < g.s1 ? 'L' : 'T');

            if(tState.roster.length < 2) return window.smAlert("Add teams first");
            const teams = [...tState.roster]; const size = Math.pow(2, Math.ceil(Math.log2(teams.length)));
            const getSeedOrder = (n) => { let order = [0, 1]; for (let i = 2; i < n; i <<= 1) { let next = []; for (let j = 0; j < order.length; j++) { next.push(order[j]); next.push(i * 2 - 1 - order[j]); } order = next; } return order; };
            const seedSequence = getSeedOrder(size);
            const seeded = seedSequence.map(idx => teams[idx] || { name: 'BYE', isBye: true, id: idx+1, members: [{name:'BYE', hcp:0}, {name:'BYE', hcp:0}] });
            tState.bracket = { winners: [], losers: [] }; const wRounds = Math.log2(size);
            for (let i = 0; i < seeded.length; i += 2) tState.bracket.winners.push({ id: 'W1-M'+(i/2+1), t1: seeded[i], t2: seeded[i+1], win: null, s1: 0, s2: 0 });
            for (let r = 2; r <= wRounds; r++) { let count = size / Math.pow(2, r); for (let m = 1; m <= count; m++) tState.bracket.winners.push({ id: `W${r}-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 }); }
            let lMatches = size / 4; for (let r = 1; r <= (wRounds - 1) * 2; r++) { for (let m = 1; m <= lMatches; m++) { tState.bracket.losers.push({ id: `L${r}-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 }); } if (r % 2 === 0) lMatches /= 2; }

        function tAdvance(mid, winner, loser) {
            const b = tState.bracket; const parts = mid.split('-'); const prefix = parts[0][0]; const r = parseInt(parts[0].substring(1)) || 0; const mIdx = parseInt(parts[1].substring(1));
            const wRounds = Math.log2(Math.pow(2, Math.ceil(Math.log2(tState.roster.length))));
            if(prefix === 'W'){
                const nextW = b.winners.find(x => x.id === `W${r+1}-M${Math.ceil(mIdx/2)}`);
                if(nextW) { if(mIdx % 2 !== 0) nextW.t1 = winner; else nextW.t2 = winner; }
                else if (r === wRounds) { const gf = b.winners.find(x => x.id === 'GF-M1'); if(gf) gf.t1 = winner; }
                if (loser) {
                    if (r === 1) { const targetL = b.losers.find(x => x.id === `L1-M${Math.ceil(mIdx/2)}`); if (targetL) { if (mIdx % 2 !== 0) targetL.t1 = loser; else targetL.t2 = loser; } }
                    else { const targetL = b.losers.find(x => x.id === `L${(r - 1) * 2}-M${mIdx}`); if (targetL) targetL.t2 = loser; }
                }
            } else if (prefix === 'L') {
                const maxLR = (wRounds - 1) * 2;
                if (r < maxLR) {
                    const nextR = r + 1, nextMIdx = (r % 2 === 0) ? Math.ceil(mIdx/2) : mIdx;
                    const nextL = b.losers.find(x => x.id === `L${nextR}-M${nextMIdx}`);
                    if (nextL) { if (r % 2 !== 0) nextL.t1 = winner; else { if (mIdx % 2 !== 0) nextL.t1 = winner; else nextL.t2 = winner; } }
                } else { const gf = b.winners.find(x => x.id === 'GF-M1'); if(gf) gf.t2 = winner; }
            }
            let changed = true; while(changed) {
                changed = false; [...b.winners, ...b.losers].forEach(m => {
                    if(!m.win && m.t1 && m.t2) {
                        if(m.t1.isBye) { m.win = m.t2.name; m.s1 = 'BYE'; tAdvance(m.id, m.t2, {isBye:true, name:'BYE'}); changed = true; }
                        else if(m.t2.isBye) { m.win = m.t1.name; m.s2 = 'BYE'; tAdvance(m.id, m.t1, {isBye:true, name:'BYE'}); changed = true; }
                    }

            }
        }

                [{n: scoring.p1n, p: 'p1'}, {n: scoring.p2n, p: 'p2'}, {n: scoring.p3n, p: 'p3'}, {n: scoring.p4n, p: 'p4'}].forEach(pl => {

                });
                mod.innerHTML = `<div class="p-6 bg-zinc-950 min-h-screen text-white"><h2 class="text-center text-sky-500 font-black uppercase italic text-2xl mb-2">Series Final</h2><p class="text-center text-5xl font-black mb-8">${scoring.final1} - ${scoring.final2}</p><div class="bg-zinc-900 border border-zinc-800 mb-8"><table class="w-full text-center border-collapse"><thead><tr class="bg-zinc-800 text-[9px] font-black uppercase text-zinc-400"><th class="text-left p-4">Player</th><th class="p-4">Pts</th><th class="p-4">Rng</th><th class="p-4">Stat Avg</th></tr></thead><tbody>${rowsHtml}</tbody></table></div><button onclick="saveTMatch()" class="w-full bg-sky-500 text-black p-6 rounded-2xl font-black uppercase text-lg shadow-2xl">Finish & Close</button><button onclick="scoring.step='LIVE'; renderScorer();" class="w-full mt-4 text-zinc-500 font-bold uppercase text-xs">Back to Match</button></div>`;
                return;
            }
            const fNum = scoring.frames.length + 1;
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            const upKey = turn[scoring.pitcherIdx]; const iST1Turn = ['p1', 'p2'].includes(upKey);
            const t1s = scoring.frames.reduce((a, b) => a + (Number(b.p1) || 0) + (Number(b.p2) || 0), 0) + scoring.h1;
            const t2s = scoring.frames.reduce((a, b) => a + (Number(b.p3) || 0) + (Number(b.p4) || 0), 0) + scoring.h2;
            const rp1 = scoring.frames.reduce((sum, f)=>sum+getR(f.p1),0) + getR(scoring.currF.p1);
            const rp2 = scoring.frames.reduce((sum, f)=>sum+getR(f.p2),0) + getR(scoring.currF.p2);
            const rp3 = scoring.frames.reduce((sum, f)=>sum+getR(f.p3),0) + getR(scoring.currF.p3);
            const rp4 = scoring.frames.reduce((sum, f)=>sum+getR(f.p4),0) + getR(scoring.currF.p4);
            const getSymT = (pts, oppPts) => { if (pts === null) return '--'; if (pts === 6 && oppPts === 6) return 'XX'; if (pts >= 6) return 'OO'; if (pts === 4) return "O'"; if (pts === 3) return 'O'; return '--'; };
            mod.innerHTML = `<div class="sticky top-0 z-[100] bg-black text-white"><div class="bg-black p-3 flex justify-between items-center border-b border-zinc-800"><button onclick="document.getElementById('modal').style.display='none'; scoring.active=false; if(document.fullscreenElement) document.exitFullscreen();" class="text-[10px] font-black uppercase text-zinc-500">Back</button><span class="text-sky-400 font-black text-xs uppercase">Frame ${fNum} ${fNum > 15 ? '(Tie-Break)' : ''}</span><div class="w-8"></div></div><div class="grid grid-cols-2 bg-zinc-900 border-b border-zinc-800"><div class="p-8 text-center transition-colors duration-300 ${iST1Turn ? 'active-team-card' : ''}"><p class="text-[8px] font-black opacity-30 truncate uppercase pointer-events-none">${scoring.t1.name}</p><div class="flex justify-center gap-1 mt-1 mb-2 relative z-20"><span class="bg-zinc-800/50 text-base px-2 py-1 font-black uppercase border border-zinc-700">${getFirst(scoring.p1n)}: ${rp1}R</span><span class="bg-zinc-800/50 text-base px-2 py-1 font-black uppercase border border-zinc-700">${getFirst(scoring.p2n)}: ${rp2}R</span></div><p class="text-7xl font-black score-val pointer-events-none">${t1s}</p></div><div class="p-8 text-center transition-colors duration-300 ${!iST1Turn ? 'active-team-card' : ''}"><p class="text-[8px] font-black opacity-30 truncate uppercase pointer-events-none">${scoring.t2.name}</p><div class="flex justify-center gap-1 mt-1 mb-2 relative z-20"><span class="bg-zinc-800/50 text-base px-2 py-1 font-black uppercase border border-zinc-700">${getFirst(scoring.p3n)}: ${rp3}R</span><span class="bg-zinc-800/50 text-base px-2 py-1 font-black uppercase border border-zinc-700">${getFirst(scoring.p4n)}: ${rp4}R</span></div><p class="text-7xl font-black score-val pointer-events-none">${t2s}</p></div></div><div class="bg-sky-500 text-black text-center p-3 font-black uppercase text-[11px] italic">UP: ${getFirst(upKey === 'p1' ? scoring.p1n : upKey === 'p2' ? scoring.p2n : upKey === 'p3' ? scoring.p3n : scoring.p4n)}</div><div class="t-btn-score-grid">${[0, 1, 2, 3, 4, 6].map(s => `<button onclick="tAddScore(${s})" class="t-btn-score"><span class="num" style="font-size:2rem;">${s}</span><span class="sym" style="font-size:0.6rem;">${getSym(s)}</span></button>`).join('')}</div><table class="t-micro-table border-b border-sky-500"><thead><tr><th class="c-sh">SH</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t">T1</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t2">T2</th></tr></thead></table></div><div class="t-micro-container" style="height: calc(100vh - 540px);"><table class="t-micro-table"><tbody><tr class="bg-zinc-950"><td class="c-sh">${fNum * 2}</td><td class="c-r">${getSymT(scoring.currF.p1, scoring.currF.p3)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p1 ?? ''}</td><td class="c-s"></td><td class="c-r">${getSymT(scoring.currF.p2, scoring.currF.p4)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p2 ?? ''}</td><td class="c-s"></td><td></td><td class="c-r">${getSymT(scoring.currF.p3, scoring.currF.p1)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p3 ?? ''}</td><td class="c-s"></td><td class="c-r">${getSymT(scoring.currF.p4, scoring.currF.p2)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p4 ?? ''}</td><td class="c-s"></td><td></td></tr>${scoring.frames.map((f, i) => { const sl = scoring.frames.slice(0, i + 1); const s1 = sl.reduce((a, b) => a + (Number(b.p1) || 0), 0); const s2 = sl.reduce((a, b) => a + (Number(b.p2) || 0), 0); const s3 = sl.reduce((a, b) => a + (Number(b.p3) || 0), 0); const s4 = sl.reduce((a, b) => a + (Number(b.p4) || 0), 0); return `<tr><td class="c-sh">${f.sh}</td><td class="c-r">${getSymT(f.p1, f.p3)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 1)">${f.p1}</td><td class="c-s">${s1}</td><td class="c-r">${getSymT(f.p2, f.p4)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 2)">${f.p2}</td><td class="c-s">${s2}</td><td class="c-t">${s1 + s2 + scoring.h1}</td><td class="c-r">${getSymT(f.p3, f.p1)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 3)">${f.p3}</td><td class="c-s">${s3}</td><td class="c-r">${getSymT(f.p4, f.p2)}</td><td class="edit-cell" onclick="window.editTScoreCell(${i}, 4)">${f.p4}</td><td class="c-s">${s4}</td><td class="c-t2">${s3 + s4 + scoring.h2}</td></tr>`; }).reverse().join('')}</tbody></table></div>`;
        }

        window.printSanctionSheet = () => {
            const cfg = state.nhpa[mode] || {};
            const shoesPerG = Number(cfg.shoesPerGame) || (mode === 'DOUBLES' ? 30 : 50);
            const pNames = [...new Set(state.history.filter(h => h.mode === mode).map(h => h.player))];
            const pData = pNames.map(pN => {
                const g = state.history.filter(h => cleanN(h.player) === cleanN(pN) && h.mode === mode);
                const rList = mode === 'SINGLES' ? state.roster.SINGLES : state.roster.DOUBLES.flatMap(t => t.members);
                const rRec = rList.find(p => cleanN(p.name) === cleanN(pN)) || {cardNo:'---', category: '---', prevHighRinger: 0};
                const totalPts = g.reduce((s,x)=>s+x.score,0);
                const highPts = g.length ? Math.max(...g.map(x=>x.score)) : 0;
                const totalShoes = g.length * shoesPerG;
                const totalRingers = g.reduce((s,x)=>s+x.ringers,0);
                const prevHighR = Number(rRec.prevHighRinger || 0);
                const currSeasonHiR = g.length ? Math.max(...g.map(x=>(x.ringers/shoesPerG)*100)) : 0;
                const finalRingerPct = totalShoes > 0 ? (totalRingers / totalShoes) * 100 : 0;
                const np = pN.includes(',') ? pN.split(',') : [pN, ''];
                return { last: np[0].trim(), first: np[1]?.trim() || '', div: rRec.category || '---', card: rRec.cardNo || '---', c1: totalPts, c2: highPts, c3: totalShoes, c4: totalRingers, c5: prevHighR.toFixed(1), c6: currSeasonHiR.toFixed(1), c7: finalRingerPct.toFixed(1), elig: Math.floor(currSeasonHiR / 10) > Math.floor(prevHighR / 10) ? 'Y' : '' };
            }).sort((a,b) => a.last.localeCompare(b.last));
            let rows = pData.map(d => `<tr style="text-align:center; font-size: 7.5pt; height: 18px;"><td style="border:1.5px solid black; text-align:left; padding-left:3px;">${d.last}</td><td style="border:1.5px solid black; text-align:left; padding-left:3px;">${d.first}</td><td style="border:1.5px solid black;">${d.div}</td><td style="border:1.5px solid black;">${d.card}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c1}</td><td style="border:1.5px solid black;">${d.c2}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c3}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c4}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c5}</td><td style="border:1.5px solid black;">${d.c6}</td><td style="border:1.5px solid black; background: #f0f0f0;">${d.c7}</td><td style="border:1.5px solid black;">${d.elig}</td></tr>`).join('');
            for(let i=0; i<5; i++) rows += `<tr style="height: 18px;"><td style="border:1.5px solid black;" colspan="12"></td></tr>`;
            const html = `<div style="font-family: 'Arial Narrow', Arial, sans-serif; padding: 10px; color: black; background: white; width: 7.5in; margin: auto;"><div style="display:flex; justify-content:center; align-items:center; position: relative; margin-bottom: 5px;"><div style="position: absolute; left: 0; top: 0; width: 60px; height: 60px; border: 1.5px solid black; display: flex; align-items: center; justify-content: center;"><img src="nhpa_logo.png" style="max-width: 50px; max-height: 50px;"></div><div style="text-align:center;"><h1 style="margin:0; font-size:16pt; font-weight:900; font-style:italic;">National Horseshoe Pitchers Association</h1><h2 style="margin:0; font-size:11pt; font-weight:900; text-transform:uppercase;">Sanctioned Club/League Program - FINAL Stat Sheet</h2><p style="margin:0; font-size: 7.5pt;">This form should include all league members. Verify NATSTATS. Scratch scores only.</p><p style="margin:0; font-size: 7.5pt; font-weight: bold;">mail to: Barbara Carson, 7618 Willow Woods Dr., N. Olmsted, OH  Ohio 44070 Bcarson848@gmail.com</p></div></div><div style="border-top: 2.5px solid black; border-bottom: 2.5px solid black; padding: 5px 0; margin-bottom: 10px;"><div style="display: grid; grid-template-columns: 1.5fr 1fr; font-size: 9pt; margin-bottom: 5px;"><div><b>Club Name:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.clubName || ''}</span></div><div><b>Phone#:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.phone || ''}</span></div></div><div style="display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 9pt; margin-bottom: 5px;"><div><b>Sanction Number:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.sanctionNum || ''}</span></div><div><b>Director:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.director || ''}</span></div><div><b>Date Submitted:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.dateSubmitted || ''}</span></div></div><div style="display: grid; grid-template-columns: 0.8fr 1.2fr 1fr; font-size: 9pt; margin-bottom: 5px;"><div><b>State:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.state || ''}</span></div><div><b>Address:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.address || ''}</span></div><div><b>City:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.city || ''}</span></div></div><div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; font-size: 9pt;"><div><b>Dates: Start</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.startDate || ''}</span></div><div><b>End</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.endDate || ''}</span></div><div><b>Cancellation:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.cancellation || ''}</span></div><div><b>Count All:</b> <span style="border-bottom: 1px solid black; padding: 0 10px;">${cfg.countAll || ''}</span></div></div></div><div style="display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 6.5pt; font-weight: bold; margin-bottom: 5px; line-height: 1.1;"><div>Column Number:<br>1. Total League Pts, No Handicap<br>2. High Game Points, No Handicap<br>3. Total League Shoes</div><div><br>4. Total League Ringers<br>5. Previous High Game Ringer %<br>6. Current Season High Game Ringer %</div><div><br>7. Final Ringer %<br>Elig.If higher patch earned indicate with " Y "</div></div><table style="width:100%; border-collapse: collapse; border: 2.5px solid black;"><thead><tr style="font-size: 6.5pt; background: #eee;"><th colspan="2" style="border:1.5px solid black;">Player Name</th><th rowspan="2" style="border:1.5px solid black; width: 30px;">Div.</th><th rowspan="2" style="border:1.5px solid black; width: 60px;">NHPA<br>Card No.</th><th style="border:1.5px solid black;">1</th><th style="border:1.5px solid black;">2</th><th style="border:1.5px solid black;">3</th><th style="border:1.5px solid black;">4</th><th style="border:1.5px solid black;">5</th><th style="border:1.5px solid black;">6</th><th style="border:1.5px solid black;">7</th><th rowspan="2" style="border:1.5px solid black; width: 25px;">Elig</th></tr><tr style="font-size: 5pt; background: #eee;"><th style="border:1.5px solid black; width: 70px;">Last</th><th style="border:1.5px solid black; width: 60px;">First</th><th colspan="7" style="border:1.5px solid black;">NHPA COLUMNS</th></tr></thead><tbody>${rows}</tbody></table><div style="margin-top:10px; font-size: 8pt; font-weight: bold; display: flex; justify-content: space-between; align-items: flex-end;"><div style="width: 60%;">Signed <span style="border-bottom: 2px solid black; display: inline-block; width: 80%;"></span></div><div style="text-align: center; font-size: 6pt; width: 30%;">Club Officer / League Director</div></div></div>`;
            window.executePrint("NHPA Final Stat Sheet", html, true);
        };

        window.addEventListener('resize', () => {
            if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
            render();
        });

        render();
    </script>
