<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond HC Stat Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; border-radius: 0 !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        
        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLES */
        .micro-container { width: 100vw; margin-left: -0.5rem; overflow-x: hidden; background: #000; border-top: 1px solid #333; }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { font-size: 0.45rem; padding: 8px 0; color: #7dd3fc; background: #111; border: 0.5px solid #333; text-transform: uppercase; }
        .micro-table td { font-size: 1.1rem; padding: 16px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        .edit-cell { color: #fcd34d !important; font-weight: 900; cursor: pointer; }
        .sh-cell { background: #000; color: #0ea5e9; font-weight: 900; border-right: 1.5px solid #0ea5e9 !important; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* PITCHING HIGHLIGHT */
        .pitch-active { border: 5px solid #0ea5e9 !important; background: #f0f9ff !important; position: relative; }
        .pitch-active::after { content: 'PITCHING'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: #0ea5e9; color: white; font-size: 10px; padding: 2px 12px; font-weight: 900; z-index: 60; }

        /* DATA TABLES */
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.55rem; padding: 12px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 12px 1px; text-align: center; font-size: 0.95rem; font-weight: bold; vertical-align: middle; }
        
        .stats-name-col { width: 160px; min-width: 160px; text-align: left !important; padding-left: 15px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; position: sticky; left: 0; background: #000; z-index: 10; color: #fff !important; font-size: 0.9rem !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-name-col { width: 52%; text-align: left !important; padding-left: 10px !important; border-right: 3px solid #0ea5e9 !important; text-transform: uppercase; color: #fff !important; white-space: normal !important; overflow-wrap: break-word; line-height: 1.2; }
        .st-num-col { width: 9%; color: #fff; }
        .pts-col { width: 12%; background: #0a0a0a; color: #0ea5e9 !important; font-size: 1.1rem !important; }

        .sum-stats-table { width: 100%; border-collapse: collapse; table-layout: auto; background: #000; color: #fff; }
        .sum-stats-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.65rem; padding: 12px 10px; border: 1px solid #333; text-transform: uppercase; text-align: left; }
        .sum-stats-table td { border-bottom: 1px solid #222; padding: 12px 10px; text-align: left; font-size: 0.95rem; font-weight: bold; vertical-align: middle; white-space: normal !important; overflow-wrap: break-word; }
        .sum-stats-table .val-col { text-align: center; background: #0a0a0a; color: #0ea5e9; width: 60px; border-left: 1px solid #333; font-size: 1.1rem; }

        #printZone { display: none; }
        @media print {
            .no-print, header, nav, main, #exitModal, button { display: none !important; }
            body { background: white !important; color: black !important; overflow: visible !important; }
            #printZone { display: block !important; position: absolute; top: 0; left: 0; width: 100%; z-index: 99999; background: white !important; }
            #printZone * { position: static !important; overflow: visible !important; color: black !important; background: transparent !important; border-color: black !important; border-radius: 0 !important; }
            .std-table, .sum-stats-table { width: 100% !important; border: 1px solid black !important; table-layout: auto !important; }
            .std-table th, .std-table td, .sum-stats-table th, .sum-stats-table td { border: 1px solid black !important; padding: 4px !important; font-size: 9px !important; }
            .stats-name-col, .st-name-col { border-right: 2px solid black !important; font-weight: 900 !important; width: auto !important; min-width: 120px !important; text-align: left !important; }
            .pts-col, .val-col { font-weight: 900 !important; background: #eee !important; border-left: 2px solid black !important; }
            .round-col { min-width: 150px !important; border: 1px solid #ddd !important; }
            .match-card { border: 1px solid black !important; margin-bottom: 10px !important; }
        }

        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-score .num { font-size: 2.8rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.8rem; color: #94a3b8; font-weight: bold; }
        .sum-row-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 10px; }
        .sum-row-table th { color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; padding: 5px; font-size: 8px; text-align: center; }
        .sum-row-table td { padding: 10px 2px; border-bottom: 1px solid #f1f5f9; font-weight: 900; text-align: center; vertical-align: middle; }

        /* TOURNAMENT SPECIFIC CSS */
        .t-btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: #000; }
        .t-btn-score { background: #1e293b; border-radius: 16px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 5px solid #0f172a; }
        .t-btn-score .num { font-size: 3.2rem; font-weight: 900; line-height: 1; color: white; }
        .t-btn-score .sym { font-size: 0.8rem; color: #38bdf8; font-weight: 900; margin-top: 4px; }
        
        .t-micro-container { width: 100vw; background: #000; overflow-x: hidden; border-top: 1px solid #1e293b; }
        .t-micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .t-micro-table th { font-size: 0.35rem; padding: 4px 0; color: #7dd3fc; background: #0f172a; border: 0.1px solid #1e293b; text-transform: uppercase; }
        .t-micro-table td { font-size: 0.8rem; padding: 8px 0; text-align: center; border: 0.1px solid #0f172a; color: #fff; line-height: 1; }
        
        .c-sh { width: 22px !important; font-weight: 900; color: #0ea5e9 !important; border-right: 1px solid #0ea5e9 !important; background: #000; position: sticky; left: 0; z-index: 10; }
        .c-r { width: 22px !important; color: #38bdf8; font-weight: bold; } 
        .c-p { width: 22px !important; font-weight: bold; color: #facc15; } 
        .c-s { width: 24px !important; font-weight: bold; color: #fff; opacity: 0.8; }
        .c-t { width: 38px !important; background: #0c4a6e; font-weight: 900; font-size: 0.9rem !important; border-left: 1px solid #38bdf8 !important; }
        .c-t2 { width: 38px !important; background: #1e293b; font-weight: 900; color: #0ea5e9 !important; font-size: 0.9rem !important; border-left: 1px solid #0ea5e9 !important; }
        
        .active-team-card { background-color: #0ea5e9 !important; color: #000 !important; }
        .active-team-card p { color: #000 !important; opacity: 1 !important; font-weight: 900; }
        .active-team-card .score-val { color: #000 !important; }

        /* BRACKET ZOOM STYLES */
        .bracket-outer { width: 100%; overflow: auto; background: #020617; min-height: 85vh; position: relative; }
        .bracket-scale-layer { transform-origin: 0 0; transition: transform 0.2s ease-out; display: inline-flex; }
        .bracket-scroll { display: flex; gap: 25px; padding: 20px; align-items: flex-start; }

        .round-col { display: flex; flex-direction: column; gap: 20px; min-width: 180px; }
        .round-title { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; text-align: center; border-bottom: 1px solid #1e293b; margin-bottom: 8px; }
        .match-card { background: #111827; border: 1.5px solid #1e293b; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .match-card:hover { border-color: #0ea5e9; }
        .team-line { display: flex; justify-content: space-between; padding: 12px; font-size: 11px; font-weight: 800; border-bottom: 1px solid #020617; color: white; }
        .team-line.win { background: #083344; color: #22d3ee; }
        .score-box { background: #000; color: #fff; padding: 4px 8px; border-radius: 6px; min-width: 30px; text-align: center; }
        .t-select { background: #1e293b; border: 2px solid #334155; padding: 18px; border-radius: 12px; width: 100%; color: white; font-weight: 900; font-size: 18px; margin-top: 6px; }
        .rot-btn { flex: 1; background: #1e293b; padding: 20px; border-radius: 12px; font-weight: 900; border: 2px solid transparent; color: white; }
        .rot-active { background: #0ea5e9; color: black; }
        #modal { display: none; position: fixed; inset: 0; background: #020617; z-index: 1000; overflow-y: auto; color: white; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="printZone"></div>
    <div id="modal"></div>

    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] items-center justify-center p-6 text-white no-print" style="display:none;">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-[90%] max-w-md p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <div class="space-y-4 mt-6">
                <button onclick="window.confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 font-black uppercase text-sm">Submit & Save Results</button>
                <button onclick="window.confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 font-black uppercase text-sm">Discard & Delete Series</button>
                <button onclick="window.closeExitModal()" class="w-full bg-zinc-800 text-white p-4 font-bold uppercase text-xs">Back to Match</button>
            </div>
        </div>
    </div>

    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="Logo" class="w-10 h-10 object-contain">
            <h1 class="text-xl font-black italic uppercase tracking-tighter text-white">Loon Pond HC Stats</h1>
        </div>
        <div id="leagueModes" class="flex gap-1 bg-zinc-900 p-1">
            <button id="modeS" onclick="window.setMode('SINGLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="window.setMode('DOUBLES')" class="text-[10px] px-4 py-2 transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav id="navBar" class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="window.setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Standings</button>
        <button onclick="window.setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Club Stats</button>
        <button onclick="window.setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-red-500 text-nowrap">Scorer</button>
        <button onclick="window.setTab('TOURNAMENT')" id="tabTOURNAMENT" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-sky-500 text-nowrap" style="display:none;">Tournament</button>
        <button onclick="window.setTab('HISTORY')" id="tabHISTORY" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">History</button>
        <button onclick="window.setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">NHPA</button>
        <button onclick="window.setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-nowrap">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");
        const docRefTourney = doc(db, "tournament_final_v1", "data");

        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: {SINGLES:true, DOUBLES:true}, nhpa: { SINGLES: {}, DOUBLES: {} }, weeklyHoa: { SINGLES: [], DOUBLES: [] }, fourDeads: { SINGLES: {}, DOUBLES: {} }, scorerEnabled: true, tournamentEnabled: false };
        let mode = 'DOUBLES';
        let view = 'STANDINGS';
        let isUnlocked = false;

        let tState = { roster: [], bracket: null, bracketHistory: {}, matchHistory: [] };
        let tView = 'BRACKET';
        let scoring = { active: false, mid: null, t1: null, t2: null, p1n: '', p2n: '', p3n: '', p4n: '', h1: 0, h2: 0, rotation: 'T1_FIRST', frames: [], currF: { p1: null, p2: null, p3: null, p4: null }, pitcherIdx: 0 };
        let bScale = 1.0;

        let match = { active: false, step: 'TEAMS', gameNum: 1, sessionId: null, t1Name: '', t2Name: '', p1: '', p2: '', p3: '', p4: '', h1: 0, h2: 0, h3: 0, h4: 0, games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1: null, p2: null, p3: null, p4: null }, seriesBuffer: [], fourDeadLog: {} };

        onSnapshot(docRef, (snapshot) => { 
            if (snapshot.exists()) { 
                const incoming = snapshot.data();
                state = incoming;
                if(!state.managePin) state.managePin = '1234';
                if(!state.nhpa) state.nhpa = {SINGLES:{}, DOUBLES:{}};
                if(!state.hcpLocked) state.hcpLocked = {SINGLES:true, DOUBLES:true};
                if(!state.weeklyHoa) state.weeklyHoa = { SINGLES: [], DOUBLES: [] };
                if(!state.fourDeads) state.fourDeads = { SINGLES: {}, DOUBLES: {} };
                if(state.scorerEnabled === undefined) state.scorerEnabled = true;
                if(state.tournamentEnabled === undefined) state.tournamentEnabled = false;
                render(); 
            } 
        });

        onSnapshot(docRefTourney, (snap) => { 
            if (snap.exists()) { 
                tState = snap.data(); 
                if(!tState.matchHistory) tState.matchHistory = [];
                render(); 
            } 
        });

        async function save() { await setDoc(docRef, state); }
        async function tSave() { await setDoc(docRefTourney, tState); }

        const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';
        const getSym = (pts, oppPts = 0) => { 
            if(pts===null||pts===undefined) return '--'; 
            if(Number(pts) === 6 && Number(oppPts) === 6) return 'XX';
            if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return '--'; 
        };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        const getFirst = (n) => {
            if(!n) return '---';
            if(n.includes(',')) return n.split(',')[1].trim().split(' ')[0];
            return n.split(' ')[0];
        };

        function getPlyrAvg(pName) {
            const n = cleanN(pName); if(!pName || ['bye','dummy'].includes(n)) return 0;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            const rawAvg = hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : (p ? Number(p.startAvg) : 0);
            return Math.round(rawAvg);
        }

        function getH(pName) {
            const n = cleanN(pName); if(!pName || n === 'bye') return 0; if(n === 'dummy') return 54;
            const rList = mode === 'SINGLES' ? (state.roster.SINGLES||[]) : (state.roster.DOUBLES.flatMap(t => t.members));
            const p = rList.find(x => cleanN(x.name) === n);
            if (state.hcpLocked && state.hcpLocked[mode]) return Number(p ? (p.currentHcp || 0) : 0);
            const avg = getPlyrAvg(pName);
            return Math.max(0, Math.floor(((mode==='DOUBLES'?90:150) - avg) * 0.9));
        }

        window.zoomB = (delta) => {
            if (delta === 'reset') bScale = 1.0;
            else bScale = Math.max(0.1, Math.min(2.0, bScale + delta));
            render();
        };

        window.confirmExit = (choice) => { window.closeExitModal(); if (choice === 'SUBMIT') finalizeFullSeries(); else { match.active = false; match.seriesBuffer = []; match.fourDeadLog = {}; render(); } };
        window.closeExitModal = () => { document.getElementById('exitModal').style.display = 'none'; };
        window.openExitModal = () => { document.getElementById('exitModal').style.display = 'flex'; };
        window.setMode = (m) => { mode = m; render(); };
        window.setTab = (t) => { 
            const lockedTabs = ['MANAGE', 'HISTORY', 'NHPA'];
            if (lockedTabs.includes(t) && !isUnlocked) {
                const pinInput = prompt("Enter PIN:");
                if (pinInput === state.managePin) { isUnlocked = true; view = t; render(); }
                else alert("Incorrect PIN");
            } else { view = t; render(); }
        };

        window.toggleHcpLock = async () => {
            if(!state.hcpLocked) state.hcpLocked = {SINGLES:true, DOUBLES:true};
            state.hcpLocked[mode] = !state.hcpLocked[mode];
            await save(); render();
        };

        window.toggleScorer = async () => {
            state.scorerEnabled = !state.scorerEnabled;
            if(!state.scorerEnabled && view === 'SCORER') view = 'STANDINGS';
            await save(); render();
        };

        window.toggleTournament = async () => {
            state.tournamentEnabled = !state.tournamentEnabled;
            if(!state.tournamentEnabled && view === 'TOURNAMENT') view = 'STANDINGS';
            await save(); render();
        }

        window.executePrint = (title, html, isNhpa = false) => {
            const zone = document.getElementById('printZone');
            const clubHeader = isNhpa ? "" : `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid #000; padding-bottom:10px; margin-bottom:20px; font-family:Arial;">
                    <div style="width:70px; height:70px; border:2px solid #000; display:flex; align-items:center; justify-content:center;">
                        <img src="logo.jpg" style="width:60px; height:60px; object-fit:contain;">
                    </div>
                    <div style="text-align:center;">
                        <h1 style="font-size:22pt; font-weight:900; margin:0; letter-spacing:-1px;">LOON POND HORSESHOE CLUB</h1>
                        <h2 style="font-size:14pt; margin:0; text-transform:uppercase; color:#555;">${title}</h2>
                    </div>
                    <div style="text-align:right; font-size:10pt; font-weight:bold;">DATE: ${new Date().toLocaleDateString()}<br>MODE: ${mode}</div>
                </div>
            `;
            zone.innerHTML = clubHeader + html;
            setTimeout(() => { window.print(); }, 1200);
        };

        window.printActive = (t) => {
            const el = document.getElementById('viewContent').cloneNode(true);
            el.querySelectorAll('button, .no-print, .action-bar, select, textarea').forEach(x => x.remove());
            window.executePrint(t, el.innerHTML);
        };

        window.printHistoryEntry = (sId) => {
            const s = state.sessions.find(x => x.id === sId);
            if(!s) return;
            const isSingles = (s.mode === 'SINGLES');
            let html = `<div style="font-family: Arial; color:black; background:white;">`;

            const sessionPlayers = [...new Set(s.fullData.flatMap(g => [g.p1, g.p2, g.p3, g.p4]))].filter(p => p && !['BYE','DUMMY'].includes(cleanN(p).toUpperCase()));
            html += `<div style="margin-bottom:30px;"><h3 style="text-transform:uppercase; font-size:14px; border-bottom:2px solid #000; margin-bottom:10px;">Series Summary</h3><table style="width:100%; border-collapse:collapse; text-align:center; border:1px solid #000; font-size:11px;"><thead><tr style="background:#eee;"><th>Player</th><th>G1 Score</th><th>G2 Score</th><th>G3 Score</th><th>Series Total</th><th>Series Avg</th></tr></thead><tbody>`;
            sessionPlayers.forEach(p => {
                let pScores = [0,0,0], pRingerArr = [0,0,0];
                s.fullData.forEach((g, i) => {
                    const key = ['p1','p2','p3','p4'].find(k => cleanN(g[k]) === cleanN(p));
                    if(key) {
                        pScores[i] = (g.frames || []).reduce((sum, f) => sum + Number(f[key]||0), 0) + (cleanN(g[key]) === 'dummy' ? 30 : 0);
                        pRingerArr[i] = (g.frames || []).reduce((sum, f) => sum + getR(f[key]), 0);
                    }
                });
                const total = pScores.reduce((a,b)=>a+b,0);
                html += `<tr><td style="border:1px solid #ddd; font-weight:bold; text-align:left; padding-left:5px;">${p}</td><td>${pScores[0]} (${pRingerArr[0]})</td><td>${pScores[1]} (${pRingerArr[1]})</td><td>${pScores[2]} (${pRingerArr[2]})</td><td style="font-weight:bold;">${total}</td><td>${Math.round(total/3)}</td></tr>`;
            });
            html += `</tbody></table></div>`;

            s.fullData.forEach(g => {
                html += `<div style="margin-bottom:50px; page-break-inside: avoid; border: 1px solid #000; padding: 10px;">`;

        function finalizeFrame() {
            const isFourDead = (pA, pB) => {
                if(!pA || !pB || ['bye','dummy'].includes(cleanN(pA)) || ['bye','dummy'].includes(cleanN(pB))) return false;
                return (match.currF['p'+pA] === 6 && match.currF['p'+pB] === 6);
            };
            if (mode === 'SINGLES') { if (isFourDead('1', '3')) { match.fourDeadLog[match.p1] = (match.fourDeadLog[match.p1] || 0) + 1; match.fourDeadLog[match.p3] = (match.fourDeadLog[match.p3] || 0) + 1; } }
            else {
                if (isFourDead('1', '3')) { match.fourDeadLog[match.p1] = (match.fourDeadLog[match.p1] || 0) + 1; match.fourDeadLog[match.p3] = (match.fourDeadLog[match.p3] || 0) + 1; }
                if (isFourDead('2', '4')) { match.fourDeadLog[match.p2] = (match.fourDeadLog[match.p2] || 0) + 1; match.fourDeadLog[match.p4] = (match.fourDeadLog[match.p4] || 0) + 1; }
            }
            match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
            match.currF = { p1: null, p2: null, p3: null, p4: null }; match.pitcherIdx = 0;

        function getPitcher() {

            const fNum = match.currGameFrames.length + 1;
            let t1Lead = (fNum % 2 !== 0);
            if (match.gameNum === 2) t1Lead = !t1Lead;
            const turn = t1Lead ? (mode === 'SINGLES' ? [match.p1, match.p3] : [match.p1, match.p3, match.p2, match.p4]) : (mode === 'SINGLES' ? [match.p3, match.p1] : [match.p3, match.p1, match.p4, match.p2]);
            let s = 0; while (s < 10) {

                if (!p || cleanN(p) === 'bye' || cleanN(p) === 'dummy') {
                    match.pitcherIdx++; const limit = mode === 'DOUBLES' ? 4 : 2;
                    if (match.pitcherIdx >= limit) { finalizeFrame(); if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) return 'END'; return getPitcher(); }

        window.initBracket = () => {
            if(tState.roster.length < 2) return alert("Add teams first");
            const teams = [...tState.roster];
            const size = Math.pow(2, Math.ceil(Math.log2(teams.length)));
            
            const getSeedOrder = (n) => { 
                let order = [0, 1]; 
                for (let i = 2; i < n; i <<= 1) { 
                    let nextOrder = []; 
                    for (let j = 0; j < order.length; j++) { 
                        nextOrder.push(order[j]); 
                        nextOrder.push(i * 2 - 1 - order[j]); 
                    } 
                    order = nextOrder; 
                } 
                return order; 
            };
            
            const seedSequence = getSeedOrder(size);
            const seeded = seedSequence.map(idx => teams[idx] || { name: 'BYE', isBye: true, id: idx+1, members: [{name:'BYE', hcp:0}, {name:'BYE', hcp:0}] });

            tState.bracket = { winners: [], losers: [] };
            const wRounds = Math.log2(size);
            
            // Winners Bracket Generation
            for (let i = 0; i < seeded.length; i += 2) tState.bracket.winners.push({ id: 'W1-M'+(i/2+1), t1: seeded[i], t2: seeded[i+1], win: null, s1: 0, s2: 0 });
            for (let r = 2; r <= wRounds; r++) { 
                let count = size / Math.pow(2, r); 
                for (let m = 1; m <= count; m++) tState.bracket.winners.push({ id: `W${r}-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 }); 
            }
            
            // Losers Bracket Generation
            let lMatchesInRound = size / 4;
            for (let r = 1; r <= (wRounds - 1) * 2; r++) {
                for (let m = 1; m <= lMatchesInRound; m++) {
                    tState.bracket.losers.push({ id: `L${r}-M${m}`, t1: null, t2: null, win: null, s1: 0, s2: 0 });
                }
                if (r % 2 === 0) lMatchesInRound /= 2;

        function finalizeTMatch() {
            const f = scoring.frames; 
            const s1 = f.reduce((a,b)=>a+(b.p1||0)+(b.p2||0),0) + scoring.h1;

                h1: scoring.h1, h2: scoring.h2
            };
            if(!tState.matchHistory) tState.matchHistory = [];
            tState.matchHistory.push(historyEntry);

            // LOG TO CLUB STATS (individual stats only, result = null for standings)
            const tourneySessionId = Date.now();
            const playerList = [
                {n: scoring.p1n, p: 'p1'}, {n: scoring.p2n, p: 'p2'},
                {n: scoring.p3n, p: 'p3'}, {n: scoring.p4n, p: 'p4'}
            ];

            playerList.forEach(pl => {
                if(pl.n && !['BYE','DUMMY'].includes(cleanN(pl.n).toUpperCase())) {
                    const pScore = scoring.frames.reduce((a, b) => a + (Number(b[pl.p]) || 0), 0);
                    const pRingers = scoring.frames.reduce((a, b) => a + getR(b[pl.p]), 0);
                    
                    state.history.push({
                        player: pl.n,
                        score: pScore,
                        ringers: pRingers,
                        result: null, // result: null ensures the Standings logic ignores it
                        mode: mode,
                        date: new Date().toLocaleDateString(),
                        sessionId: tourneySessionId,
                        gameNum: 1,
                        timestamp: Date.now()
                    });
                }
            });

            tAdvance(scoring.mid, winT, loseT);
            scoring.active = false;
            showSummary(scoring.mid); 
            save(); // Save main league state
            tSave(); // Save tournament state
        }

        function tAdvance(mid, winner, loser) {
            const b = tState.bracket; 
            const parts = mid.split('-');
            const prefix = parts[0][0]; 
            const r = parseInt(parts[0].substring(1)) || 0;
            const mIdx = parseInt(parts[1].substring(1));
            const wRounds = Math.log2(Math.pow(2, Math.ceil(Math.log2(tState.roster.length))));
            
            if(prefix === 'W'){
                const nextW = b.winners.find(x => x.id === `W${r+1}-M${Math.ceil(mIdx/2)}`);
                if(nextW) { if(mIdx % 2 !== 0) nextW.t1 = winner; else nextW.t2 = winner; }
                else if (r === wRounds) { 
                    const gf = b.winners.find(x => x.id === 'GF-M1');
                    if(gf) gf.t1 = winner;
                }
                
                if (loser) {
                    if (r === 1) {
                        const targetL = b.losers.find(x => x.id === `L1-M${Math.ceil(mIdx/2)}`);
                        if (targetL) { if (mIdx % 2 !== 0) targetL.t1 = loser; else targetL.t2 = loser; }
                    } else {
                        const targetL = b.losers.find(x => x.id === `L${(r - 1) * 2}-M${mIdx}`);
                        if (targetL) targetL.t2 = loser; 
                    }
                }
            } else if (prefix === 'L') {
                const maxLR = (wRounds - 1) * 2;
                if (r < maxLR) {
                    const nextR = r + 1;
                    const nextMIdx = (r % 2 === 0) ? Math.ceil(mIdx/2) : mIdx;
                    const nextL = b.losers.find(x => x.id === `L${nextR}-M${nextMIdx}`);
                    if (nextL) { 
                        if (r % 2 !== 0) nextL.t1 = winner; 
                        else { if (mIdx % 2 !== 0) nextL.t1 = winner; else nextL.t2 = winner; } 
                    }
                } else {
                    const gf = b.winners.find(x => x.id === 'GF-M1');
                    if(gf) gf.t2 = winner;
                }
            }

            let changed = true;
            while(changed) {
                changed = false;

                    const highGame = g.length ? Math.max(...g.map(x => x.score)) : 0;
                    const hiOA = g.length ? (highGame - playerAvg) : 0;
                    return `<tr><td class="stats-name-col font-black uppercase">${pN}</td><td>${getH(pN)}</td><td class="text-white">${playerAvg}</td><td>${((totR/(g.length*shoes))*100).toFixed(1)}%</td><td>${(Math.max(...g.map(x=>(x.ringers/shoes)*100))).toFixed(1)}%</td><td style="font-size:9px;">${scPct.toFixed(1)}%</td><td>${totP}</td><td>${highGame}</td><td style="color:#fb923c;">${hiOA >= 0 ? '+' : ''}${Math.round(hiOA)}</td><td>${rRec.startAvg}</td><td class="pts-col" style="color:${imp>=0?'#4ade80':'#f87171'}">${imp >= 0 ? '+' : ''}${imp}</td></tr>`; 
                }).sort((a,b)=>b.totP-a.totP).join('');

                const weeklyHoaRows = (state.weeklyHoa[mode] || [])
                    .slice()
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .map(entry => `<tr><td style="font-size: 10px; color: #94a3b8; width: 85px;">${entry.date}</td><td>${entry.player}</td><td class="val-col">${entry.hoa >= 0 ? '+' : ''}${entry.hoa}</td></tr>`).join('');

                const fdSource = state.fourDeads[mode] || {};
                const fourDeadRows = Object.keys(fdSource).map(name => ({ name: name, val: fdSource[name] }))
                    .sort((a,b) => b.val - a.val).map(d => `<tr><td>${d.name}</td><td class="val-col">${d.val}</td></tr>`).join('');

                content.innerHTML = `
                    <div class="action-bar flex justify-end pt-2 no-print"><button onclick="window.printActive('Club Stats')" class="bg-black text-white px-4 py-2 font-black uppercase shadow-lg border border-zinc-700">Print Stats</button></div>
                    <div class="relative shadow-2xl rounded-none border border-zinc-800 bg-black overflow-x-auto mt-2">
                        <table class="std-table w-full" style="min-width: 1100px; table-layout: auto;">
                            <thead><tr class="bg-zinc-900"><th class="stats-name-col">Player</th><th>Hcp</th><th>Avg</th><th>R%</th><th>Hi R%</th><th>Scr %</th><th>Tot P</th><th>Hi G</th><th>HOA</th><th>S.Avg</th><th class="pts-col">Imp</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                        <div>
                            <h3 class="text-sky-500 font-black uppercase italic mb-2 text-sm tracking-widest">Weekly High Over Average</h3>
                            <div class="bg-black border border-zinc-800 shadow-xl">
                                <table class="sum-stats-table"><thead><tr><th>Date</th><th>Player</th><th class="val-col">HOA</th></tr></thead><tbody>${weeklyHoaRows || '<tr><td colspan="3" class="text-center opacity-40">No weekly records found</td></tr>'}</tbody></table>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-sky-500 font-black uppercase italic mb-2 text-sm tracking-widest">Season Four Deads</h3>
                            <div class="bg-black border border-zinc-800 shadow-xl">
                                <table class="sum-stats-table"><thead><tr><th>Player</th><th class="val-col">Count</th></tr></thead><tbody>${fourDeadRows || '<tr><td colspan="2" class="text-center opacity-40">No 4-deads logged</td></tr>'}</tbody></table>
                            </div>
                        </div>
                    </div>`;
            } else if (view === 'HISTORY') {
                const sessionHtml = (state.sessions || []).filter(s => s.mode === mode).reverse().map(s => {
                    let gHtml = (s.fullData || []).map((g, idx) => `<div class="flex justify-between items-center bg-gray-100 p-2 mb-1 text-[10px] font-bold uppercase"><span>G${g.gameNum}: ${g.s1}-${g.s2}</span><button onclick="window.editPastGame(${s.id}, ${idx})" class="text-sky-600 font-black no-print">Edit</button></div>`).join('');
                    return `<div class="bg-white p-3 shadow mb-3 font-black uppercase text-xs"><span>${s.date} - ${s.name}</span><button onclick="window.printHistoryEntry(${s.id})" class="text-sky-600 float-right no-print">Print Sheets</button>${gHtml}</div>`;
                }).join('') || `<p class="p-10 text-center opacity-40 italic text-zinc-500">No league history found</p>`;
                const tHistoryHtml = (tState.matchHistory || []).slice().reverse().map(h => `<div class="bg-zinc-900 text-white p-3 shadow mb-3 font-black uppercase text-xs border-l-4 border-sky-500"><span><span class="text-sky-400">[TOURNAMENT]</span> ${h.date} - ${h.t1Name} vs ${h.t2Name} (${h.s1}-${h.s2})</span><button onclick="window.printTournamentScoreSheet('${h.timestamp}')" class="text-sky-400 float-right no-print ml-2">Print</button><button onclick="window.showSummary('${h.id}')" class="text-zinc-400 float-right no-print">View</button></div>`).join('') || `<p class="p-10 text-center opacity-40 italic text-zinc-500">No tournament matches found</p>`;
                content.innerHTML = `<div class="p-4"><h2 class="text-sky-500 font-black italic uppercase mb-4">Series History</h2>${sessionHtml}<h2 class="text-sky-500 font-black italic uppercase mb-4 mt-8">Tournament Match History</h2>${tHistoryHtml}</div>`;
            } else if (view === 'NHPA') {
                const cfg = state.nhpa[mode] || {};
                content.innerHTML = `<div class="p-4 space-y-4 no-print"><div class="bg-white p-6 shadow"><h2 class="text-sky-500 font-black italic uppercase mb-4">NHPA Form Settings</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-[10px] font-black uppercase">Club Name</label><input id="f-clubName" class="w-full p-2 border mb-2" value="${cfg.clubName||''}"></div><div><label class="block text-[10px] font-black uppercase">Phone</label><input id="f-phone" class="w-full p-2 border mb-2" value="${cfg.phone||''}"></div><div><label class="block text-[10px] font-black uppercase">Sanction #</label><input id="f-sanctionNum" class="w-full p-2 border mb-2" value="${cfg.sanctionNum||''}"></div><div><label class="block text-[10px] font-black uppercase">Director</label><input id="f-director" class="w-full p-2 border mb-2" value="${cfg.director||''}"></div><div><label class="block text-[10px] font-black uppercase">Address</label><input id="f-address" class="w-full p-2 border mb-2" value="${cfg.address||''}"></div><div><label class="block text-[10px] font-black uppercase">City</label><input id="f-city" class="w-full p-2 border mb-2" value="${cfg.city||''}"></div><div><label class="block text-[10px] font-black uppercase">State</label><input id="f-state" class="w-full p-2 border mb-2" value="${cfg.state||''}"></div><div><label class="block text-[10px] font-black uppercase">Shoes Per Game</label><input id="f-shoesPerGame" type="number" class="w-full p-2 border mb-2" value="${cfg.shoesPerGame||(mode==='DOUBLES'?30:50)}"></div><div><label class="block text-[10px] font-black uppercase">League Start</label><input id="f-startDate" class="w-full p-2 border mb-2" value="${cfg.startDate||''}"></div><div><label class="block text-[10px] font-black uppercase">League End</label><input id="f-endDate" class="w-full p-2 border mb-2" value="${cfg.endDate||''}"></div><div><label class="block text-[10px] font-black uppercase">Date Submitted</label><input id="f-dateSubmitted" class="w-full p-2 border mb-2" value="${cfg.dateSubmitted||''}"></div><div><label class="block text-[10px] font-black uppercase">Cancellation</label><input id="f-cancellation" class="w-full p-2 border mb-2" value="${cfg.cancellation||''}"></div><div><label class="block text-[10px] font-black uppercase">Count All</label><input id="f-countAll" class="w-full p-2 border mb-2" value="${cfg.countAll||''}"></div></div><div class="mt-6 flex gap-2"><button onclick="window.saveNhpaForm()" class="flex-1 bg-black text-white p-4 font-black uppercase">Save</button><button onclick="window.printSanctionSheet()" class="flex-1 bg-sky-500 text-white p-4 font-black uppercase">Print NHPA Form</button></div></div></div>`;
            } else if (view === 'MANAGE') {
                const rH = (state.roster[mode]||[]).map((t, i) => `<div class="bg-white p-3 shadow mb-2 flex justify-between items-center text-xs font-bold uppercase"><span>${t.teamName||t.name}</span><div class="flex gap-2"><button onclick="window.editRosterItem(${i})" class="text-sky-500 font-black">EDIT</button><button onclick="window.delR(${i})" class="text-red-500 font-black">DEL</button></div></div>`).join('');
                content.innerHTML = `<div class="p-4 space-y-4 no-print"><div class="bg-white p-4 shadow flex justify-between items-center"><span class="text-[10px] font-black uppercase tracking-widest">PIN: ${state.managePin}</span><button onclick="window.updatePin()" class="bg-sky-500 text-white px-4 py-2 text-[10px] font-black">CHANGE PIN</button></div><div class="grid grid-cols-3 gap-2"><button onclick="window.resetSystem()" class="bg-red-600 text-white p-4 rounded-none font-black uppercase text-[10px] shadow-lg">Wipe Data</button><button onclick="window.backupData()" class="bg-zinc-800 text-white p-4 font-bold uppercase text-[10px]">Backup</button><button onclick="document.getElementById('restoreInput').click()" class="bg-white border-2 border-zinc-800 text-zinc-800 p-4 rounded-none font-bold uppercase text-[10px]">Restore</button></div><input type="file" id="restoreInput" class="hidden" onchange="window.handleRestore(event)"><div class="grid grid-cols-1 md:grid-cols-3 gap-2"><button onclick="window.toggleHcpLock()" class="w-full p-4 font-black uppercase text-[10px] shadow-md transition ${state.hcpLocked[mode] ? 'bg-orange-500 text-white' : 'bg-green-500 text-white'}">${state.hcpLocked[mode] ? 'HCP: Locked' : 'HCP: Auto'}</button><button onclick="window.toggleScorer()" class="w-full p-4 font-black uppercase text-[10px] shadow-md transition ${state.scorerEnabled ? 'bg-sky-500 text-white' : 'bg-zinc-500 text-white'}">Scorer: ${state.scorerEnabled ? 'ON' : 'OFF'}</button><button onclick="window.toggleTournament()" class="w-full p-4 font-black uppercase text-[10px] shadow-md transition ${state.tournamentEnabled ? 'bg-blue-600 text-white' : 'bg-zinc-500 text-white'}">Tourney: ${state.tournamentEnabled ? 'ON' : 'OFF'}</button></div><button onclick="window.resetDeads()" class="w-full bg-red-900 text-white p-4 text-[10px] font-black uppercase">Clear Four Deads (${mode})</button><textarea id="rosterInput" class="w-full h-24 border p-3 rounded-none text-xs" placeholder="Import Roster..."></textarea><button onclick="window.importRoster()" class="w-full bg-black text-white p-4 rounded-none font-black uppercase shadow-lg">Sync Cloud</button><div class="mt-4"><h3 class="text-[10px] font-black uppercase mb-2">Roster Management</h3>${rH}</div></div>`;
            } else if (view === 'TOURNAMENT') {
                let navHtml = `<nav class="flex flex-col bg-zinc-950 border-b border-zinc-900 sticky top-0 z-50">
                    <div class="flex">
                        <button onclick="setTView('BRACKET')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'BRACKET' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Bracket</button>
                        <button onclick="setTView('ROSTER')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'ROSTER' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Roster</button>
                        <button onclick="setTView('MANAGE')" class="flex-1 py-6 text-[11px] font-black uppercase tracking-widest ${tView === 'MANAGE' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-zinc-500'}">Manage</button>
                    </div>`;
                
                if (tView === 'BRACKET' && tState.bracket) {
                    navHtml += `
                    <div class="flex gap-2 p-3 bg-zinc-900 border-t border-zinc-800 no-print justify-center items-center">
                        <button onclick="window.zoomB(0.1)" class="bg-zinc-800 text-white px-5 py-2 text-sm font-black border border-zinc-700 hover:bg-zinc-700">+</button>
                        <button onclick="window.zoomB(-0.1)" class="bg-zinc-800 text-white px-5 py-2 text-sm font-black border border-zinc-700 hover:bg-zinc-700">-</button>
                        <button onclick="window.zoomB('reset')" class="bg-zinc-800 text-white px-5 py-2 text-[10px] uppercase font-black border border-zinc-700 hover:bg-zinc-700">Reset</button>
                        <button onclick="window.printBracket()" class="bg-sky-700 text-white px-5 py-2 text-[10px] uppercase font-black border border-sky-800 hover:bg-sky-600 ml-2">Print Bracket</button>
                        <span class="text-[11px] text-sky-500 ml-4 font-black uppercase tracking-widest">Zoom: ${Math.round(bScale * 100)}%</span>
                    </div>`;
                }
                navHtml += `</nav>`;

                if (tView === 'ROSTER') {
                    content.innerHTML = navHtml + `<div class="p-4"><button onclick="importTFromStandings()" class="w-full bg-sky-700 text-white p-4 mb-4 font-black uppercase text-xs rounded-xl">Import & Seed From Standings</button><textarea id="rosIn" class="w-full h-40 bg-zinc-900 border-2 border-zinc-800 p-4 text-xs text-white rounded-2xl" placeholder="TeamID | Last, First | HCP"></textarea><button onclick="tImportRoster()" class="w-full bg-sky-500 text-black p-5 mt-4 font-black uppercase text-sm rounded-2xl">Sync Roster</button><div class="mt-8 space-y-2 text-white">${tState.roster.map((t, i) => `<div class="p-4 bg-zinc-900 rounded-xl flex justify-between items-center border border-zinc-800"><b>Seed ${i + 1}: ${t.name}</b><button onclick="tDelTeam(${i})" class="text-red-500 font-black uppercase text-[12px]">Del</button></div>`).join('')}</div></div>`;
                } else if (tView === 'BRACKET') {
                    if (!tState.bracket) { content.innerHTML = navHtml + `<div class="mt-20 text-center"><button onclick="initBracket()" class="bg-sky-500 text-black px-12 py-5 rounded-2xl font-black text-sm uppercase">Initialize Bracket</button></div>`; }
                    else {
                        const size = Math.pow(2, Math.ceil(Math.log2(tState.roster.length)));
                        const wRounds = Math.log2(size);
                        
                        let bracketHtml = `<div class="bracket-outer"><div class="bracket-scale-layer" style="transform: scale(${bScale});">`;
                        bracketHtml += `<div class="bracket-scroll">`;
                        
                        for (let r = 1; r <= wRounds; r++) { bracketHtml += `<div class="round-col"><div class="round-title">Winners R${r}</div>${tState.bracket.winners.filter(x => x.id.startsWith('W' + r)).map(m => renderCard(m)).join('')}</div>`; }
                        bracketHtml += `<div class="round-col"><div class="round-title">Finals</div>${tState.bracket.winners.filter(x => x.id.startsWith('GF')).map(m => renderCard(m)).join('')}</div>`;
                        for (let r = 1; r <= (wRounds * 2 - 2); r++) { bracketHtml += `<div class="round-col"><div class="round-title">Losers R${r}</div>${tState.bracket.losers.filter(x => x.id.startsWith('L' + r)).map(m => renderCard(m)).join('')}</div>`; }
                        
                        bracketHtml += `</div></div></div>`;
                        content.innerHTML = navHtml + bracketHtml;
                    }
                } else if (tView === 'MANAGE') { 
                    content.innerHTML = navHtml + `<div class="p-10"><button onclick="wipeTournament()" class="w-full bg-red-600 p-8 rounded-2xl font-black uppercase text-lg shadow-2xl text-white">Wipe All Tournament Data</button></div>`; 
                }
            }
        }

        function renderCard(m) { return `<div class="match-card" onclick="openMatch('${m.id}')"><div class="team-line ${m.win === m.t1?.name ? 'win' : (m.win ? 'loss' : '')}"><span>${m.t1?.name || '?'} ${m.t1?.isBye ? '' : '(S' + (m.t1?.id || '?') + ')'}</span><span class="score-box">${m.s1}</span></div><div class="team-line ${m.win === m.t2?.name ? 'win' : (m.win ? 'loss' : '')}"><span>${m.t2?.name || '?'} ${m.t2?.isBye ? '' : '(S' + (m.t2?.id || '?') + ')'}</span><span class="score-box">${m.s2}</span></div></div>`; }

        function renderScorer() {
            const mod = document.getElementById('modal'); mod.style.display = 'block';
            const fNum = scoring.frames.length + 1;
            let turn = (scoring.rotation === 'T1_FIRST') ? (fNum % 2 !== 0 ? ['p1', 'p3', 'p2', 'p4'] : ['p3', 'p1', 'p4', 'p2']) : (fNum % 2 !== 0 ? ['p3', 'p1', 'p4', 'p2'] : ['p1', 'p3', 'p2', 'p4']);
            const upKey = turn[scoring.pitcherIdx];
            const isT1Turn = ['p1', 'p2'].includes(upKey);
            const t1s = scoring.frames.reduce((a, b) => a + (b.p1 || 0) + (b.p2 || 0), 0) + scoring.h1;
            const t2s = scoring.frames.reduce((a, b) => a + (b.p3 || 0) + (b.p4 || 0), 0) + scoring.h2;

            const getSymTourney = (pts, oppPts) => {
                if (pts === null) return '--';
                if (pts === 6 && oppPts === 6) return 'XX';
                if (pts >= 6) return 'OO';
                if (pts === 4) return "O'";
                if (pts === 3) return 'O';
                return '--';
            };

            mod.innerHTML = `
                <div class="bg-black p-3 flex justify-between items-center border-b border-zinc-800 sticky top-0 z-[100]"><button onclick="document.getElementById('modal').style.display='none'; scoring.active=false;" class="text-[10px] font-black uppercase text-zinc-500">Back</button><span class="text-sky-400 font-black text-xs uppercase">Frame ${fNum} ${fNum > 15 ? '(Tie-Break)' : ''}</span><div class="w-8"></div></div>
                <div class="grid grid-cols-2 bg-zinc-900 border-b border-zinc-800">
                    <div class="p-10 text-center transition-colors duration-300 ${isT1Turn ? 'active-team-card' : ''}">
                        <p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t1.name}</p>
                        <p class="text-5xl font-black score-val">${t1s}</p>
                    </div>
                    <div class="p-10 text-center transition-colors duration-300 ${!isT1Turn ? 'active-team-card' : ''}">
                        <p class="text-[8px] font-black opacity-30 truncate uppercase">${scoring.t2.name}</p>
                        <p class="text-5xl font-black score-val">${t2s}</p>
                    </div>
                </div>
                <div class="bg-sky-500 text-black text-center p-4 font-black uppercase text-[12px] italic">UP: ${getFirst(upKey === 'p1' ? scoring.p1n : upKey === 'p2' ? scoring.p2n : upKey === 'p3' ? scoring.p3n : scoring.p4n)}</div>
                <div class="t-btn-score-grid">${[0, 1, 2, 3, 4, 6].map(s => `<button onclick="tAddScore(${s})" class="t-btn-score"><span class="num">${s}</span><span class="sym">${getSym(s)}</span></button>`).join('')}</div>
                <div class="t-micro-container"><table class="t-micro-table">
                    <thead><tr><th class="c-sh">SH</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t">T1</th><th>R</th><th>P</th><th>S</th><th>R</th><th>P</th><th>S</th><th class="c-t2">T2</th></tr></thead>
                    <tbody>
                    <tr class="bg-zinc-950"><td class="c-sh">${fNum * 2}</td>
                        <td class="c-r">${getSymTourney(scoring.currF.p1, scoring.currF.p3)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p1 ?? ''}</td><td class="c-s"></td>
                        <td class="c-r">${getSymTourney(scoring.currF.p2, scoring.currF.p4)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p2 ?? ''}</td><td class="c-s"></td><td></td>
                        <td class="c-r">${getSymTourney(scoring.currF.p3, scoring.currF.p1)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p3 ?? ''}</td><td class="c-s"></td>
                        <td class="c-r">${getSymTourney(scoring.currF.p4, scoring.currF.p2)}</td><td class="c-p" style="color:#facc15;">${scoring.currF.p4 ?? ''}</td><td class="c-s"></td><td></td>
                    </tr>
                    ${scoring.frames.map((f, i) => {
                        const sl = scoring.frames.slice(0, i + 1);
                        const s1 = sl.reduce((a, b) => a + (b.p1 || 0), 0); const s2 = sl.reduce((a, b) => a + (b.p2 || 0), 0);
                        const s3 = sl.reduce((a, b) => a + (b.p3 || 0), 0); const s4 = sl.reduce((a, b) => a + (b.p4 || 0), 0);
                        return `<tr><td class="c-sh">${f.sh}</td>
                        <td class="c-r">${getSymTourney(f.p1, f.p3)}</td><td class="c-p" onclick="tEditCell(${i},'p1')">${f.p1}</td><td class="c-s">${s1}</td>
                        <td class="c-r">${getSymTourney(f.p2, f.p4)}</td><td class="c-p" onclick="tEditCell(${i},'p2')">${f.p2}</td><td class="c-s">${s2}</td>
                        <td class="c-t">${s1 + s2 + scoring.h1}</td>
                        <td class="c-r">${getSymTourney(f.p3, f.p1)}</td><td class="c-p" onclick="tEditCell(${i},'p3')">${f.p3}</td><td class="c-s">${s3}</td>
                        <td class="c-r">${getSymTourney(f.p4, f.p2)}</td><td class="c-p" onclick="tEditCell(${i},'p4')">${f.p4}</td><td class="c-s">${s4}</td>
                        <td class="c-t2">${s3 + s4 + scoring.h2}</td></tr>`;
                    }).reverse().join('')}</tbody></table></div>`;
        }

        window.showSummary = (id) => {
            const h = tState.bracketHistory[id] || tState.matchHistory.find(x => x.id === id); 
            if(!h) return;
            const mod = document.getElementById('modal'); mod.style.display = 'block';
            const calc = (k) => ({ pts: h.frames.reduce((a, b) => a + (b[k] || 0), 0), rng: h.frames.reduce((a, b) => a + getR(b[k]), 0) });
            const s1 = calc('p1'), s2 = calc('p2'), s3 = calc('p3'), s4 = calc('p4');
            const totalShoes = h.frames.length * 2;
            mod.innerHTML = `<div class="p-8 text-center text-white"><h2 class="text-2xl font-black text-sky-400 uppercase mb-8 italic">Final Match Results</h2>
                <div class="flex justify-between text-2xl font-black border-zinc-800 border-b-4 pb-4 mb-8"><span>${h.t1Name || h.t1.name}: ${h.s1}</span><span>${h.t2Name || h.t2.name}: ${h.s2}</span></div>
                <div class="space-y-4 mb-10 text-left">
                    <div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between text-[11px]"><b>${h.p1n}</b><span>Pts: ${s1.pts} | Ringers: ${s1.rng} | Shoes: ${totalShoes}</span></div>
                    <div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between text-[11px]"><b>${h.p2n}</b><span>Pts: ${s2.pts} | Ringers: ${s2.rng} | Shoes: ${totalShoes}</span></div>
                    <div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between text-[11px]"><b>${h.p3n}</b><span>Pts: ${s3.pts} | Ringers: ${s3.rng} | Shoes: ${totalShoes}</span></div>
                    <div class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between text-[11px]"><b>${h.p4n}</b><span>Pts: ${s4.pts} | Ringers: ${s4.rng} | Shoes: ${totalShoes}</span></div>
                </div>
                <button onclick="document.getElementById('modal').style.display='none'" class="w-full bg-sky-500 text-black p-6 rounded-2xl font-black uppercase text-sm">Close Summary</button></div>`;
        }
    </script>
</body>
</html>
