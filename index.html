<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond Master Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        
        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLES */
        .micro-container { width: 100vw; margin-left: -0.5rem; overflow-x: hidden; background: #000; border-top: 1px solid #333; }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .micro-table th { font-size: 0.45rem; padding: 8px 0; color: #7dd3fc; background: #111; border: 0.5px solid #333; text-transform: uppercase; }
        .micro-table td { font-size: 1.1rem; padding: 16px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        .edit-cell { color: #fcd34d !important; font-weight: 900; cursor: pointer; }
        .sh-cell { background: #000; color: #0ea5e9; font-weight: 900; border-right: 1.5px solid #0ea5e9 !important; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* DATA TABLES */
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.5rem; padding: 10px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 10px 1px; text-align: center; font-size: 0.75rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stats-name-col { width: 22%; text-align: left !important; padding-left: 10px !important; border-right: 1.5px solid #0ea5e9 !important; text-transform: uppercase; font-size: 0.6rem !important; }
        .st-name-col { width: 52%; text-align: left !important; padding-left: 10px !important; border-right: 1.5px solid #0ea5e9 !important; text-transform: uppercase; font-size: 0.75rem !important; }
        .st-num-col { width: 9%; }
        .pts-col { width: 12%; background: #0a0a0a; color: #0ea5e9; font-size: 0.9rem !important; }

        /* BUTTONS */
        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; border-radius: 12px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-score .num { font-size: 2.8rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.8rem; color: #94a3b8; font-weight: bold; }

        .pitching-card { border: 8px solid #0ea5e9 !important; background-color: #f0f9ff !important; position: relative; }
        .pitching-card::after { content: 'UP'; position: absolute; top: -12px; right: 5px; background: #0ea5e9; color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: 900; }

        /* NHPA FORM UI */
        .nhpa-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .nhpa-input { width: 100%; border: 1.5px solid #e2e8f0; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-top: 4px; background: #f8fafc; }
        .nhpa-input:focus { border-color: #0ea5e9; outline: none; background: white; }
        .nhpa-label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.05em; }

        /* PRINTING CORE */
        @media print {
            .no-print { display: none !important; }
            #printZone { display: block !important; position: absolute; top:0; left:0; width:100%; z-index:9999; background: white !important; color: black !important; padding: 0 !important; }
            body { visibility: hidden; }
            #printZone, #printZone * { visibility: visible; }
            .print-table { width: 100% !important; border-collapse: collapse !important; border: 2px solid #000 !important; margin-top: 5px; table-layout: fixed; }
            .print-table th, .print-table td { border: 1px solid #000 !important; padding: 4px; text-align: center; color: black !important; font-size: 10px; background: white !important; font-weight: bold; }
            .nhpa-header-text { font-family: 'Arial Narrow', Arial, sans-serif; }
        }
        #printZone { display: none; }
        #exitModal { display: none; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="printZone"></div>

    <!-- EXIT MENU -->
    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] items-center justify-center p-6 text-white no-print">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-[90%] max-w-md rounded-3xl p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <div class="space-y-4 mt-6">
                <button onclick="window.confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 rounded-2xl font-black uppercase text-sm shadow-lg">Submit & Save Results</button>
                <button onclick="window.confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black uppercase text-sm shadow-lg">Discard & Delete Series</button>
                <button onclick="window.closeExitModal()" class="w-full bg-zinc-800 text-white p-4 rounded-2xl font-bold uppercase text-xs">Back to Match</button>
            </div>
        </div>
    </div>

    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="" class="w-10 h-10 object-contain rounded bg-white p-0.5" onerror="this.style.display='none'">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Loon Pond</h1>
        </div>
        <div class="flex gap-1 bg-zinc-900 p-1 rounded-lg">
            <button id="modeS" onclick="window.setMode('SINGLES')" class="text-[10px] px-4 py-2 rounded transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="window.setMode('DOUBLES')" class="text-[10px] px-4 py-2 rounded transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="window.setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest">Standings</button>
        <button onclick="window.setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">Club Stats</button>
        <button onclick="window.setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-red-500">Scorer</button>
        <button onclick="window.setTab('HISTORY')" id="tabHISTORY" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">History</button>
        <button onclick="window.setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">NHPA</button>
        <button onclick="window.setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[80px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");

        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: true, nhpa: { SINGLES: {}, DOUBLES: {} } };
        let mode = 'DOUBLES';
        let view = 'STANDINGS';
        let isUnlocked = false;

        let match = { active: false, step: 'TEAMS', gameNum: 1, sessionId: null, t1Name: '', t2Name: '', p1:'', p2:'', p3:'', p4:'', h1:0, h2:0, h3:0, h4:0, 
                      games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1:null, p2:null, p3:null, p4:null }, seriesBuffer: [] };

        onSnapshot(docRef, (snapshot) => { if (snapshot.exists()) { state = snapshot.data(); if(!state.nhpa) state.nhpa = {SINGLES:{}, DOUBLES:{}}; render(); } else { save(); } });
        async function save() { await setDoc(docRef, state); }

        const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';
        const getSym = (pts) => { if(pts===null||pts===undefined) return '--'; if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return '--'; };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        function getH(pName) {
            const n = cleanN(pName); if(n === 'bye' || !pName) return 0; if(n === 'dummy') return 54;
            const rList = [...(state.roster.SINGLES||[]), ...(state.roster.DOUBLES ? state.roster.DOUBLES.flatMap(t => t.members) : [])];
            const p = rList.find(x => cleanN(x.name) === n);
            if (state.hcpLocked) return Number(p ? (p.currentHcp || 0) : 0);
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            const avg = hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : (p ? Number(p.startAvg) : 0);
            return Math.max(0, Math.floor(((mode==='DOUBLES'?90:150) - avg) * 0.9));
        }

        window.setMode = (m) => { mode = m; render(); };
        window.setTab = (t) => { 
            const locked = ['MANAGE', 'HISTORY', 'NHPA'];
            if (locked.includes(t) && !isUnlocked) {
                const pinInput = prompt("Enter PIN:");
                if (pinInput === state.managePin) { isUnlocked = true; view = t; render(); }
                else alert("Incorrect PIN");
            } else { view = t; render(); }
        };

        window.pickLiveTeams = () => {
            match.t1Name = document.getElementById('lt1').value; match.t2Name = document.getElementById('lt2').value;
            if(!match.t1Name || !match.t2Name) return alert("Select teams");
            match.active = true; match.gameNum = 1; match.games = []; match.seriesBuffer = []; match.sessionAgg = { t1: 0, t2: 0 };
            match.sessionId = Date.now();
            if (mode === 'SINGLES') { match.p1 = match.t1Name; match.p3 = match.t2Name; window.startTheLiveGame(); }
            else { match.step = 'PLAYERS'; render(); }
        };

        window.startTheLiveGame = () => {
            if (mode === 'DOUBLES') {
                match.p1 = document.getElementById('sp1').value; match.p2 = document.getElementById('sp2').value;
                match.p3 = document.getElementById('sp3').value; match.p4 = document.getElementById('sp4').value;
            } else { match.p1 = match.t1Name; match.p2 = 'BYE'; match.p3 = match.t2Name; match.p4 = 'BYE'; }
            match.h1 = Number(getH(match.p1)); match.h2 = Number(getH(match.p2));
            match.h3 = Number(getH(match.p3)); match.h4 = Number(getH(match.p4));
            match.step = 'LIVE'; match.pitcherIdx = 0; match.currGameFrames = []; match.currF = { p1:null, p2:null, p3:null, p4:null };
            render();
        };

        window.addScore = (pts) => {
            const p = getPitcher(); if (p === 'END') return;
            if (p === match.p1) match.currF.p1 = Number(pts); else if (p === match.p2) match.currF.p2 = Number(pts);
            else if (p === match.p3) match.currF.p3 = Number(pts); else if (p === match.p4) match.currF.p4 = Number(pts);
            match.pitcherIdx++; const limit = mode === 'DOUBLES' ? 4 : 2;
            if (match.pitcherIdx >= limit) {
                match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
                match.currF = { p1:null, p2:null, p3:null, p4:null }; match.pitcherIdx = 0;
                if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) showInterSummary();
            }
            render();
        };

        function showInterSummary() {
            const getSV = (n, raw) => cleanN(n) === 'dummy' ? 0 : ((cleanN(n) === 'bye') ? 0 : Number(raw || 0));
            const getHV = (n, raw) => cleanN(n) === 'dummy' ? 54 : (cleanN(n) === 'bye' ? 0 : Number(raw || 0));
            const sc1 = match.currGameFrames.reduce((s,f)=>s+getSV(match.p1, f.p1)+getSV(match.p2, f.p2),0);
            const sc2 = match.currGameFrames.reduce((s,f)=>s+getSV(match.p3, f.p3)+getSV(match.p4, f.p4),0);
            const d1 = cleanN(match.p1) === 'dummy' ? 30 : 0; const d2 = cleanN(match.p2) === 'dummy' ? 30 : 0;
            const d3 = cleanN(match.p3) === 'dummy' ? 30 : 0; const d4 = cleanN(match.p4) === 'dummy' ? 30 : 0;
            const g1 = Number(sc1 + d1 + d2 + getHV(match.p1, match.h1) + getHV(match.p2, match.h2));
            const g2 = Number(sc2 + d3 + d4 + getHV(match.p3, match.h3) + getHV(match.p4, match.h4));
            match.sessionAgg.t1 = Number(match.sessionAgg.t1) + g1; match.sessionAgg.t2 = Number(match.sessionAgg.t2) + g2;
            const threshold = mode === 'DOUBLES' ? 162 : 135;
            let res1, res2;
            if (cleanN(match.t1Name) === 'bye') { res2 = (g2 >= threshold) ? 'W' : 'L'; res1 = 'L'; }
            else if (cleanN(match.t2Name) === 'bye') { res1 = (g1 >= threshold) ? 'W' : 'L'; res2 = 'L'; }
            else { res1 = g1 > g2 ? 'W' : (g1 < g2 ? 'L' : 'T'); res2 = g2 > g1 ? 'W' : (g2 < g1 ? 'L' : 'T'); }
            const plrs = [{n:match.p1,p:'p1',r:res1,d:d1},{n:match.p2,p:'p2',r:res1,d:d2},{n:match.p3,p:'p3',r:res2,d:d3},{n:match.p4,p:'p4',r:res2,d:d4}];
            plrs.forEach(pl => { if(pl.n && !['bye','dummy'].includes(cleanN(pl.n))) { match.seriesBuffer.push({ player: pl.n, score: match.currGameFrames.reduce((s,f)=>s+getSV(pl.n, f[pl.p]), 0) + pl.d, ringers: match.currGameFrames.reduce((s,f)=>s+getR(f[pl.p]), 0), result: pl.r, sessionId: match.sessionId, gameNum: match.gameNum, mode, date: new Date().toLocaleDateString() }); } });
            match.games.push({ gameNum: match.gameNum, p1: match.p1, p2: match.p2, p3: match.p3, p4: match.p4, h1: Number(match.h1), h2: Number(match.h2), h3: Number(match.h3), h4: Number(match.h4), s1: g1, s2: g2, frames: [...match.currGameFrames] });
            match.step = (match.gameNum >= 3) ? 'MATCH_SUMMARY' : 'GAME_SUMMARY';
            render();
        }

        window.nextGame = () => { match.gameNum++; match.currGameFrames = []; match.pitcherIdx = 0; if (mode === 'SINGLES') window.startTheLiveGame(); else { match.step = 'PLAYERS'; render(); } };

        window.finalizeFullSeries = () => {
            const threshold = mode === 'DOUBLES' ? 162 : 135;
            const aggT = threshold * match.gameNum; let mW;
            if(cleanN(match.t1Name)==='bye') mW = match.sessionAgg.t2 >= aggT ? match.t2Name : 'Bye';
            else if(cleanN(match.t2Name)==='bye') mW = match.sessionAgg.t1 >= aggT ? match.t1Name : 'Bye';
            else mW = match.sessionAgg.t1 > match.sessionAgg.t2 ? match.t1Name : (match.sessionAgg.t1 < match.sessionAgg.t2 ? match.t2Name : 'Tie');
            state.history.push(...match.seriesBuffer);
            state.sessions.push({ id: match.sessionId, name: `${match.t1Name} vs ${match.t2Name}`, date: new Date().toLocaleDateString(), mode, matchWinner: mW, agg1: Number(match.sessionAgg.t1), agg2: Number(match.sessionAgg.t2), fullData: [...match.games] });
            match.active = false; view = 'STANDINGS'; save();
        };

        window.editPastGame = (sId, gIdx) => {
            const sess = state.sessions.find(x => x.id === sId); if(!sess) return;
            const g = sess.fullData[gIdx];
            const editP = (pName, curS, curR, curH) => {
                if(!pName || ['bye','dummy'].includes(cleanN(pName))) return {s:0, r:0, h:curH};
                const ns = Number(prompt(`Edit ${pName} Points:`, curS));
                const nr = Number(prompt(`Edit ${pName} Ringers:`, curR));
                const nh = Number(prompt(`Edit ${pName} Handicap Used:`, curH));
                const hRec = state.history.find(h => h.sessionId === sId && h.gameNum === g.gameNum && cleanN(h.player) === cleanN(pName));
                if(hRec) { hRec.score = ns; hRec.ringers = nr; }
                return {s: ns, r: nr, h: nh};
            };
            const d1 = editP(g.p1, g.frames.reduce((s,f)=>s+Number(f.p1||0),0), g.frames.reduce((s,f)=>s+getR(f.p1),0), g.h1);
            const d2 = (mode==='DOUBLES') ? editP(g.p2, g.frames.reduce((s,f)=>s+Number(f.p2||0),0), g.frames.reduce((s,f)=>s+getR(f.p2),0), g.h2) : {s:0, r:0, h:0};
            const d3 = editP(g.p3, g.frames.reduce((s,f)=>s+Number(f.p3||0),0), g.frames.reduce((s,f)=>s+getR(f.p3),0), g.h3);
            const d4 = (mode==='DOUBLES') ? editP(g.p4, g.frames.reduce((s,f)=>s+Number(f.p4||0),0), g.frames.reduce((s,f)=>s+getR(f.p4),0), g.h4) : {s:0, r:0, h:0};
            g.h1=d1.h; g.h2=d2.h; g.h3=d3.h; g.h4=d4.h;
            const pts1 = (cleanN(g.p1)==='dummy'?30:d1.s) + (cleanN(g.p2)==='dummy'?30:d2.s);
            const pts2 = (cleanN(g.p3)==='dummy'?30:d3.s) + (cleanN(g.p4)==='dummy'?30:d4.s);
            g.s1 = Number(pts1 + g.h1 + g.h2); g.s2 = Number(pts2 + g.h3 + g.h4);
            const threshold = mode === 'DOUBLES' ? 162 : 135;
            let res1, res2;
            const t1N = sess.name.split(' vs ')[0]; const t2N = sess.name.split(' vs ')[1];
            if (cleanN(t1N) === 'bye') { res2 = (g.s2 >= threshold) ? 'W' : 'L'; res1 = 'L'; }
            else if (cleanN(t2N) === 'bye') { res1 = (g.s1 >= threshold) ? 'W' : 'L'; res2 = 'L'; }
            else { res1 = g.s1 > g.s2 ? 'W' : (g.s1 < g.s2 ? 'L' : 'T'); res2 = g.s2 > g.s1 ? 'W' : (g.s2 < g.s1 ? 'L' : 'T'); }
            state.history.forEach(h => { if(h.sessionId === sId && h.gameNum === g.gameNum) { if([cleanN(g.p1), cleanN(g.p2)].includes(cleanN(h.player))) h.result = res1; else if([cleanN(g.p3), cleanN(g.p4)].includes(cleanN(h.player))) h.result = res2; } });
            sess.agg1 = sess.fullData.reduce((s, gm)=> s + gm.s1, 0); sess.agg2 = sess.fullData.reduce((s, gm)=> s + gm.s2, 0);
            const aggT = threshold * sess.fullData.length;
            if(cleanN(t1N)==='bye') sess.matchWinner = sess.agg2 >= aggT ? t2N : 'Bye'; else if(cleanN(t2N)==='bye') sess.matchWinner = sess.agg1 >= aggT ? t1N : 'Bye'; else sess.matchWinner = sess.agg1 > sess.agg2 ? t1N : (sess.agg1 < sess.agg2 ? t2N : 'Tie');
            save(); alert("Standings Updated"); render();
        };

        window.resetSystem = async () => {
            const p = prompt("Enter PIN to WIPE DATA:");
            if(p === state.managePin) {
                if(confirm("Confirm: Wipe all data?")) {
                    state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: state.managePin, hcpLocked: true, nhpa: { SINGLES: {}, DOUBLES: {} } };
                    await save(); location.reload();
                }
            } else alert("Incorrect PIN");
        };

        function getPitcher() {
            const f = match.currGameFrames.length + 1;
            const turn = (f % 2 !== 0) ? (mode==='SINGLES'?[match.p1,match.p3]:[match.p1,match.p3,match.p2,match.p4]) : (mode==='SINGLES'?[match.p3,match.p1]:[match.p3,match.p1,match.p4,match.p2]);
            let p = turn[match.pitcherIdx];
            if (cleanN(p) === 'bye' || cleanN(p) === 'dummy' || !p) {
                match.pitcherIdx++; const limit = mode === 'DOUBLES' ? 4 : 2;
                if (match.pitcherIdx >= limit) {
                    match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
                    match.currF = { p1:null, p2:null, p3:null, p4:null }; match.pitcherIdx = 0;
                    if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) { showInterSummary(); return 'END'; }
                } return getPitcher();
            } return p;
        }

        window.executePrint = (title, html) => {
            const zone = document.getElementById('printZone');
            zone.innerHTML = `<div style="text-align:center; padding-bottom:15px; border-bottom:3px solid #000;"><img src="logo.jpg" style="height:70px;"><h1 style="font-size:24px; font-weight:900;">Loon Pond Horseshoe Club</h1><h2 style="font-size:16px;">${mode} ${title} - ${new Date().toLocaleDateString()}</h2></div><div style="margin-top:20px;">${html}</div>`;
            window.print();
        };

        window.printHistoryReport = (sid) => {
            const s = state.sessions.find(x => x.id === sid); if(!s) return;
            let h = `<h3 style="text-align:center;">MATCH AGGREGATE: ${s.agg1} - ${s.agg2}</h3>`;
            s.fullData.forEach(g => {

            } else if (view === 'NHPA') {
                const cfg = state.nhpa[mode] || {};
                content.innerHTML = `<div class="p-4 space-y-4"><div class="bg-white p-6 rounded-2xl shadow"><h2 class="text-sky-500 font-black italic uppercase mb-4">League Official Data (${mode})</h2><div class="grid grid-cols-2 gap-4"><div><label class="nhpa-label">Club Name</label><input id="f-clubName" class="nhpa-input" value="${cfg.clubName||''}"></div><div><label class="nhpa-label">Phone #</label><input id="f-phone" class="nhpa-input" value="${cfg.phone||''}"></div><div><label class="nhpa-label">Sanction #</label><input id="f-sanctionNum" class="nhpa-input" value="${cfg.sanctionNum||''}"></div><div><label class="nhpa-label">Director</label><input id="f-director" class="nhpa-input" value="${cfg.director||''}"></div><div><label class="nhpa-label">State</label><input id="f-stateCode" class="nhpa-input" value="${cfg.stateCode||''}"></div><div><label class="nhpa-label">City</label><input id="f-city" class="nhpa-input" value="${cfg.city||''}"></div><div><label class="nhpa-label">Address</label><input id="f-address" class="nhpa-input" value="${cfg.address||''}"></div><div><label class="nhpa-label">Start Date</label><input id="f-startDate" class="nhpa-input" value="${cfg.startDate||''}"></div><div><label class="nhpa-label">End Date</label><input id="f-endDate" class="nhpa-input" value="${cfg.endDate||''}"></div></div><div class="mt-6 flex gap-2"><button onclick="window.saveNhpaForm()" class="flex-1 bg-black text-white p-4 rounded-xl font-black uppercase shadow-lg">Save Settings</button><button onclick="window.printSanction()" class="flex-1 bg-sky-500 text-white p-4 rounded-xl font-black uppercase shadow-lg">Print Sheet</button></div></div></div>`;
            } else if (view === 'MANAGE') {
                const rH = (state.roster[mode]||[]).map((t, i) => `<div class="bg-white p-3 rounded shadow mb-2 flex justify-between items-center text-xs font-bold uppercase"><span>${t.teamName||t.name}</span><div class="flex gap-2"><button onclick="window.editRosterItem(${i})" class="text-sky-500 font-black">EDIT</button><button onclick="window.delR(${i})" class="text-red-500 font-black">DEL</button></div></div>`).join('');
                content.innerHTML = `<div class="p-4 space-y-4 no-print"><button onclick="window.resetSystem()" class="w-full bg-red-600 text-white p-4 rounded-xl font-black uppercase text-xs">Wipe Cloud Data</button><button onclick="window.toggleHcpLock()" class="w-full p-4 rounded-xl font-black uppercase text-xs shadow-md transition ${state.hcpLocked ? 'bg-orange-500 text-white' : 'bg-green-500 text-white'}">${state.hcpLocked ? 'HCP: Manual Locked' : 'HCP: Rolling Auto'}</button><div class="grid grid-cols-2 gap-2"><button onclick="window.backupData()" class="bg-zinc-800 text-white p-4 rounded-xl font-bold uppercase text-xs">Backup Cloud</button><button onclick="document.getElementById('restoreInput').click()" class="bg-white border-2 border-zinc-800 text-zinc-800 p-4 rounded-xl font-bold uppercase text-xs">Restore Cloud</button></div><input type="file" id="restoreInput" class="hidden" onchange="window.handleRestore(event)"><textarea id="rosterInput" class="w-full h-24 border p-3 rounded-xl text-xs" placeholder="Import Roster..."></textarea><button onclick="window.importRoster()" class="w-full bg-black text-white p-4 rounded-xl font-black uppercase shadow-lg">Sync Cloud</button><div class="mt-4"><h3 class="text-[10px] font-black uppercase mb-2">Roster Management</h3>${rH}</div></div>`;
            }
        }
    </script>
</body>
</html>
