<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loon Pond Master Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Condensed:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .tab-active { border-bottom: 4px solid #0ea5e9; color: #0ea5e9; font-weight: 900; }
        .mode-btn-active { background-color: #0ea5e9 !important; color: white !important; font-weight: 900; }

        /* SCORER TABLE - 15 COLUMNS TALL */
        .micro-container { width: 100vw; margin-left: -0.5rem; overflow-x: hidden; background: #000; border-top: 1px solid #333; }
        .micro-table { width: 100%; table-layout: fixed; border-collapse: collapse; font-family: 'Roboto Condensed', sans-serif; }
        .c-sh { width: 7%; } .c-r { width: 5%; } .c-p { width: 5%; } .c-s { width: 7.5%; } .c-t { width: 11%; }
        .micro-table th { font-size: 0.45rem; padding: 6px 0; color: #7dd3fc; background: #111; border: 0.5px solid #333; text-transform: uppercase; }
        .micro-table td { font-size: 0.95rem; padding: 15px 0; text-align: center; border: 0.5px solid #1a1a1a; color: #fff; line-height: 1; }
        .sh-cell { background: #000; color: #0ea5e9; font-weight: 900; border-right: 1.5px solid #0ea5e9 !important; font-size: 1.1rem !important; }
        .t1-cell { background: #0c4a6e; color: #fff; font-weight: 900; font-size: 1.05rem !important; border-left: 1px solid #0ea5e9; border-right: 1px solid #0ea5e9; }
        .t2-cell { background: #1e293b; color: #0ea5e9; font-weight: 900; font-size: 1.05rem !important; border-left: 1px solid #0ea5e9; }
        .r-sym { color: #38bdf8; font-size: 0.7rem; font-weight: bold; }
        .curr-row { background: #171717; outline: 1px solid #444; }

        /* BUTTONS */
        .btn-score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
        .btn-score { background: white; border-bottom: 4px solid #cbd5e1; border-radius: 12px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; active:transform: scale(0.95); }
        .btn-score .num { font-size: 2.8rem; font-weight: 900; color: #111; line-height: 1; }
        .btn-score .sym { font-size: 0.8rem; color: #94a3b8; font-weight: bold; }

        .pitching-card { border: 8px solid #0ea5e9 !important; background-color: #f0f9ff !important; position: relative; }
        .pitching-card::after { content: 'UP'; position: absolute; top: -12px; right: 5px; background: #0ea5e9; color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: 900; }
        
        .std-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #000; color: #fff; }
        .std-table th { background: #1a1a1a; color: #7dd3fc; font-size: 0.5rem; padding: 10px 1px; border: 1px solid #333; text-transform: uppercase; }
        .std-table td { border-bottom: 1px solid #222; padding: 10px 1px; text-align: center; font-size: 0.72rem; font-weight: bold; overflow: hidden; }
        .name-col { width: 38%; text-align: left !important; padding-left: 8px !important; border-right: 1.5px solid #0ea5e9 !important; font-size: 0.65rem !important; text-transform: uppercase; white-space: nowrap; }
    </style>
</head>
<body class="min-h-screen pb-40">

    <div id="printArea" class="print-only p-8 bg-white text-black"></div>

    <div id="exitModal" class="fixed inset-0 bg-black/95 z-[999] hidden items-center justify-center p-6 text-white no-print">
        <div class="bg-zinc-900 border-2 border-zinc-700 w-full max-w-md rounded-3xl p-8 shadow-2xl text-center">
            <h2 class="text-2xl font-black italic uppercase text-sky-400 mb-2">Exit Match?</h2>
            <p class="text-sm opacity-60 mb-8 font-bold">Unsaved frames will be lost if you discard.</p>
            <div class="space-y-4">
                <button onclick="confirmExit('SUBMIT')" class="w-full bg-sky-500 text-black p-5 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition">Submit & Save Results</button>
                <button onclick="confirmExit('DISCARD')" class="w-full bg-red-600 text-white p-5 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition">Discard & Delete Series</button>
                <button onclick="closeExitModal()" class="w-full bg-zinc-800 text-white p-4 rounded-2xl font-bold uppercase text-xs active:scale-95 transition">Keep Playing</button>
            </div>
        </div>
    </div>

    <header class="bg-black text-white p-4 shadow-2xl flex justify-between items-center border-b-4 border-sky-500 no-print">
        <div class="flex items-center gap-3">
            <img src="logo.jpg" alt="" class="w-10 h-10 object-contain rounded bg-white p-0.5" onerror="this.style.display='none'">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Loon Pond</h1>
        </div>
        <div class="flex gap-1 bg-zinc-900 p-1 rounded-lg">
            <button id="modeS" onclick="setMode('SINGLES')" class="text-[10px] px-4 py-2 rounded transition font-bold uppercase">Singles</button>
            <button id="modeD" onclick="setMode('DOUBLES')" class="text-[10px] px-4 py-2 rounded transition font-bold uppercase">Doubles</button>
        </div>
    </header>

    <nav class="flex bg-white shadow-sm sticky top-0 z-50 overflow-x-auto border-b no-print">
        <button onclick="setTab('STANDINGS')" id="tabSTANDINGS" class="flex-1 min-w-[85px] py-4 text-[9px] font-black uppercase tracking-widest">Standings</button>
        <button onclick="setTab('STATS')" id="tabSTATS" class="flex-1 min-w-[85px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">Club Stats</button>
        <button onclick="setTab('SCORER')" id="tabSCORER" class="flex-1 min-w-[85px] py-4 text-[9px] font-black uppercase tracking-widest text-red-500">Scorer</button>
        <button onclick="setTab('NHPA')" id="tabNHPA" class="flex-1 min-w-[85px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">NHPA</button>
        <button onclick="setTab('MANAGE')" id="tabMANAGE" class="flex-1 min-w-[85px] py-4 text-[9px] font-black uppercase tracking-widest text-gray-400">Manage</button>
    </nav>

    <main id="viewContent" class="p-2 max-w-6xl mx-auto no-print"></main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1cxDYgc31rIB3MZnlxEt8rHNIFtnPDIA",
            authDomain: "lphc-stats.firebaseapp.com",
            projectId: "lphc-stats",
            storageBucket: "lphc-stats.firebasestorage.app",
            messagingSenderId: "689983014450",
            appId: "1:689983014450:web:3490f5167e00574a985e2b",
            measurementId: "G-P9GD4936KW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "league", "masterData");

        let state = { roster: { SINGLES: [], DOUBLES: [] }, history: [], sessions: [], managePin: '1234', hcpLocked: true };
        let mode = 'DOUBLES';
        let view = 'STANDINGS';
        let isUnlocked = false;

        let match = { active: false, step: 'TEAMS', gameNum: 1, t1Name: '', t2Name: '', p1:'', p2:'', p3:'', p4:'', h1:0, h2:0, h3:0, h4:0, 
                      games: [], pitcherIdx: 0, sessionAgg: { t1: 0, t2: 0 }, currGameFrames: [], currF: { p1:null, p2:null, p3:null, p4:null }, seriesBuffer: [] };

        onSnapshot(docRef, (snapshot) => {
            if (snapshot.exists()) { state = snapshot.data(); render(); }
            else { save(); }
        });

        async function save() { await setDoc(docRef, state); }

        const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';
        const getSym = (pts) => { if(pts===null||pts===undefined) return '--'; if(pts>=6) return 'OO'; if(pts===4) return "O'"; if(pts===3) return 'O'; return pts; };
        const getR = (pts) => pts>=6?2:(pts>=3?1:0);

        function getH(name) {
            const n = cleanN(name);
            if(n === 'bye' || !name) return 0;
            if(n === 'dummy') return 54;
            
            // Search all members across both modes to ensure player is found
            const allPlayers = [...state.roster.SINGLES, ...(state.roster.DOUBLES ? state.roster.DOUBLES.flatMap(t => t.members) : [])];
            const player = allPlayers.find(p => cleanN(p.name) === n);
            
            if (state.hcpLocked) return Number(player ? (player.currentHcp || 0) : 0);
            
            const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === mode).slice(-9);
            const baseAvg = player ? Number(player.startAvg || 0) : 0;
            const avg = hist.length ? hist.reduce((s, g) => s + g.score, 0) / hist.length : baseAvg;
            const scratch = mode === 'DOUBLES' ? 90 : 150;
            return Math.max(0, Math.floor((scratch - avg) * 0.9));
        }

        window.setMode = (m) => { mode = m; render(); };
        window.setTab = (t) => { 
            if (t === 'MANAGE' && !isUnlocked) {
                const pin = prompt("Enter Manage PIN:");
                if (pin === state.managePin) { isUnlocked = true; view = t; } 
                else { alert("Incorrect PIN"); return; }
            } else { view = t; }
            render(); 
        };

        window.toggleHcpLock = async () => {
            state.hcpLocked = !state.hcpLocked;
            await save(); render();
        };

        window.openExitModal = () => { document.getElementById('exitModal').style.display = 'flex'; };
        window.closeExitModal = () => { document.getElementById('exitModal').style.display = 'none'; };
        window.confirmExit = (choice) => {
            closeExitModal();
            if (choice === 'SUBMIT') endGame(true);
            else if (choice === 'DISCARD') { match.active = false; match.seriesBuffer = []; render(); }
        };

        window.editPlayer = (idx) => {
            if(mode === 'SINGLES') {
                let p = state.roster.SINGLES[idx];
                p.name = prompt("Full Name:", p.name) || p.name;
                p.startAvg = parseFloat(prompt("Start Avg:", p.startAvg)) || 0;
                p.currentHcp = parseInt(prompt("Manual HCP:", p.currentHcp || 0)) || 0;
            } else {
                let t = state.roster.DOUBLES[idx];
                t.teamName = prompt("Team Name:", t.teamName) || t.teamName;
                t.members.forEach((m, i) => {
                    m.name = prompt(`P${i+1} Name:`, m.name) || m.name;
                    m.startAvg = parseFloat(prompt(`P${i+1} Avg:`, m.startAvg)) || 0;
                    m.currentHcp = parseInt(prompt(`P${i+1} HCP:`, m.currentHcp || 0)) || 0;
                });
            }
            save(); render();
        };

        window.delR = (idx) => { if(confirm("Del?")) { state.roster[mode].splice(idx,1); save(); } };
        window.deleteS = (id) => { if(confirm("Del history?")) { state.sessions = state.sessions.filter(x => x.id !== id); state.history = state.history.filter(h => h.sessionId !== id); save(); } };
        window.resetSystem = async () => { if(prompt("PIN to RESET:") === state.managePin && confirm("Confirm Wipe?")) { state={roster:{SINGLES:[],DOUBLES:[]},history:[],sessions:[],managePin:state.managePin,hcpLocked:true}; await save(); } };
        window.updatePin = () => { state.managePin = document.getElementById('newPin').value; save(); alert("PIN Updated"); };

        window.pickLiveTeams = () => {
            match.t1Name = document.getElementById('lt1').value; match.t2Name = document.getElementById('lt2').value;
            if(!match.t1Name || !match.t2Name) return alert("Select teams");
            match.active = true; match.sessionAgg = { t1: 0, t2: 0 }; match.gameNum = 1; match.games = []; match.seriesBuffer = [];
            match.step = (mode === 'SINGLES') ? 'START_S' : 'PLAYERS';
            render();
        };

        window.startTheLiveGame = () => {
            if (mode === 'DOUBLES') {
                match.p1 = document.getElementById('sp1').value; match.p2 = document.getElementById('sp2').value;
                match.p3 = document.getElementById('sp3').value; match.p4 = document.getElementById('sp4').value;
            } else { match.p1 = match.t1Name; match.p3 = match.t2Name; }
            
            // Critical: Force handicap calculation at start of each game
            match.h1 = Number(getH(match.p1)); match.h2 = Number(getH(match.p2));
            match.h3 = Number(getH(match.p3)); match.h4 = Number(getH(match.p4));
            
            match.step = 'LIVE'; match.pitcherIdx = 0; match.currGameFrames = []; match.currF = { p1:null, p2:null, p3:null, p4:null };
            render();
        };

        window.addScore = (pts) => {
            const p = getPitcher();
            if (p === 'END') return;
            if (p === match.p1) match.currF.p1 = Number(pts); else if (p === match.p2) match.currF.p2 = Number(pts);
            else if (p === match.p3) match.currF.p3 = Number(pts); else if (p === match.p4) match.currF.p4 = Number(pts);
            match.pitcherIdx++;
            if (match.pitcherIdx >= (mode === 'DOUBLES' ? 4 : 2)) {
                match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
                match.currF = { p1:null, p2:null, p3:null, p4:null }; match.pitcherIdx = 0;
                if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) endGame();
            }
            render();
        };

        function getPitcher() {
            const f = match.currGameFrames.length + 1;
            const turn = (f % 2 !== 0) ? (mode==='SINGLES'?[match.p1,match.p3]:[match.p1,match.p3,match.p2,match.p4]) : (mode==='SINGLES'?[match.p3,match.p1]:[match.p3,match.p1,match.p4,match.p2]);
            let p = turn[match.pitcherIdx];
            if (cleanN(p) === 'bye' || cleanN(p) === 'dummy') {
                match.pitcherIdx++;
                if (match.pitcherIdx >= (mode === 'DOUBLES' ? 4 : 2)) {
                    match.currGameFrames.push({ ...match.currF, sh: (match.currGameFrames.length + 1) * 2 });
                    match.currF = { p1:null, p2:null, p3:null, p4:null }; match.pitcherIdx = 0;
                    if (match.currGameFrames.length >= (mode === 'DOUBLES' ? 15 : 25)) { endGame(); return 'END'; }
                }
                return getPitcher();
            }
            return p;
        }

        function endGame(isForcedExit = false) {
            const getScore = (n, raw) => cleanN(n) === 'dummy' ? 30 : Number(raw || 0);
            const getHandicap = (n, raw) => cleanN(n) === 'dummy' ? 54 : Number(raw || 0);

            const scratch1 = match.currGameFrames.reduce((s,f)=>s+getScore(match.p1, f.p1)+getScore(match.p2, f.p2),0);
            const scratch2 = match.currGameFrames.reduce((s,f)=>s+getScore(match.p3, f.p3)+getScore(match.p4, f.p4),0);
            const gTot1 = scratch1 + getHandicap(match.p1, match.h1) + getHandicap(match.p2, match.h2);
            const gTot2 = scratch2 + getHandicap(match.p3, match.h3) + getHandicap(match.p4, match.h4);
            
            match.sessionAgg.t1 += gTot1; match.sessionAgg.t2 += gTot2;
            const threshold = mode === 'DOUBLES' ? 162 : 135;
            let res1, res2;
            if (cleanN(match.t1Name) === 'bye') { res2 = gTot2 > threshold ? 'W' : 'L'; res1 = res2 === 'W' ? 'L' : 'W'; }
            else if (cleanN(match.t2Name) === 'bye') { res1 = gTot1 > threshold ? 'W' : 'L'; res2 = res1 === 'W' ? 'L' : 'W'; }
            else { res1 = gTot1 > gTot2 ? 'W' : (gTot1===gTot2?'T':'L'); res2 = res1 === 'W' ? 'L' : (res1==='T'?'T':'W'); }

            const sid = Date.now();
            const logG = (p, sc, r, res) => { if(cleanN(p)!=='bye' && cleanN(p)!=='dummy' && p) match.seriesBuffer.push({ sessionId: sid, player: p, score: Number(sc), ringers: Number(r), result: res, mode, date: sid, gameNum: match.gameNum }); };
            logG(match.p1, match.currGameFrames.reduce((s,f)=>s+getScore(match.p1, f.p1),0), match.currGameFrames.reduce((s,f)=>s+getR(f.p1),0), res1);
            if(mode==='DOUBLES') logG(match.p2, match.currGameFrames.reduce((s,f)=>s+getScore(match.p2, f.p2),0), match.currGameFrames.reduce((s,f)=>s+getR(f.p2),0), res1);
            logG(match.p3, match.currGameFrames.reduce((s,f)=>s+getScore(match.p3, f.p3),0), match.currGameFrames.reduce((s,f)=>s+getR(f.p3),0), res2);
            if(mode==='DOUBLES') logG(match.p4, match.currGameFrames.reduce((s,f)=>s+getScore(match.p4, f.p4),0), match.currGameFrames.reduce((s,f)=>s+getR(f.p4),0), res2);

            match.games.push({ gameNum: match.gameNum, p1: match.p1, p2: match.p2, p3: match.p3, p4: match.p4, h1: match.h1, h2: match.h2, h3: match.h3, h4: match.h4, frames: [...match.currGameFrames], s1: gTot1, s2: gTot2 });

            if (match.gameNum < 3 && !isForcedExit) { match.gameNum++; match.step = (mode === 'SINGLES') ? 'START_S' : 'PLAYERS'; render(); }
            else {
                const aggThresh = threshold * match.gameNum;
                let mW;
                if(cleanN(match.t1Name)==='bye') mW = match.sessionAgg.t2 > aggThresh ? match.t2Name : 'Bye';
                else if(cleanN(match.t2Name)==='bye') mW = match.sessionAgg.t1 > aggThresh ? match.t1Name : 'Bye';
                else mW = match.sessionAgg.t1 > match.sessionAgg.t2 ? match.t1Name : (match.sessionAgg.t1 < match.sessionAgg.t2 ? match.t2Name : 'Tie');
                
                state.history.push(...match.seriesBuffer);
                state.sessions.push({ id: sid, name: `${match.t1Name} vs ${match.t2Name}`, date: new Date().toLocaleDateString(), mode, matchWinner: mW, fullData: [...match.games], agg1: match.sessionAgg.t1, agg2: match.sessionAgg.t2 });
                match.active = false; view = 'STANDINGS'; save();
            }
        }

        window.importRoster = () => {
            const raw = document.getElementById('rosterInput').value; if(!raw) return;
            const lines = raw.split('\n').filter(l => l.trim().length > 0);
            let tempT = {}; let tempP = [];
            lines.forEach(line => {
                const p = line.split(/\t| {2,}/).map(x => x.trim()); if(p.length < 3) return;
                const obj = { name: p[1], startAvg: parseFloat(p[2])||0, division: p[3]||"Open", cardNo: p[4]||"", prevHighRinger: parseFloat(p[5])||0, currentHcp: Number(p[6]||0) };
                if(mode==='DOUBLES'){ if(!tempT[p[0]]) tempT[p[0]] = []; tempT[p[0]].push(obj); } else { tempP.push(obj); }
            });
            if(mode==='DOUBLES') {
                state.roster.DOUBLES = Object.keys(tempT).map(id => {
                    const firstNames = tempT[id].map(m => { const n = m.name; return n.includes(',') ? n.split(',')[1].trim().split(' ')[0] : n.trim().split(' ')[0]; }).join('/');
                    return { teamName: firstNames, members: tempT[id] };
                });
            } else { state.roster.SINGLES = tempP; }
            save(); alert("Cloud Updated!");
        };

        window.generateReport = (session) => {
            const area = document.getElementById('printArea');
            let html = `<div style="text-align:center;"><img src="logo.jpg" style="height:60px;"><h1>Match Summary</h1><h2>${session.name}</h2><p>${session.date}</p><h3>TOTAL: ${session.agg1} - ${session.agg2}</h3></div>`;
            (session.fullData || []).forEach(g => {
                html += `<h3>Game ${g.gameNum}: ${g.s1}-${g.s2}</h3><table class="report-table"><thead><tr><th>SH</th><th>P1</th><th>P1T</th><th>P2</th><th>P2T</th><th>T1</th><th>P3</th><th>P3T</th><th>P4</th><th>P4T</th><th>T2</th></tr></thead><tbody>`;
                g.frames.forEach((f, i) => {
                    const sl = g.frames.slice(0, i+1); const t1 = sl.reduce((s,x)=>s+Number(x.p1||0),0); const t2 = sl.reduce((s,x)=>s+Number(x.p2||0),0); const t3 = sl.reduce((s,x)=>s+Number(x.p3||0),0); const t4 = sl.reduce((s,x)=>s+Number(x.p4||0),0);
                    html += `<tr><td>${f.sh}</td><td>${getSym(f.p1)}</td><td>${t1}</td><td>${getSym(f.p2)}</td><td>${t2}</td><td>${t1+t2+g.h1+g.h2}</td><td>${getSym(f.p3)}</td><td>${t3}</td><td>${getSym(f.p4)}</td><td>${t4}</td><td>${t3+t4+g.h3+g.h4}</td></tr>`;
                });
                html += `</tbody></table>`;
            });
            area.innerHTML = html; window.print();
        };

        function render() {
            document.getElementById('modeS').className = mode === 'SINGLES' ? "mode-btn-active text-[10px] px-4 py-2 rounded transition" : "text-[10px] px-4 py-2 rounded transition";
            document.getElementById('modeD').className = mode === 'DOUBLES' ? "mode-btn-active text-[10px] px-4 py-2 rounded transition" : "text-[10px] px-4 py-2 rounded transition";
            ['STANDINGS', 'STATS', 'SCORER', 'NHPA', 'MANAGE'].forEach(t => { const el = document.getElementById('tab'+t); if(el) el.className = `flex-1 py-4 text-[9px] font-black uppercase tracking-widest ${view===t?'tab-active':'text-gray-400'}`; });
            const content = document.getElementById('viewContent');
            const history = state.history || [];
            const rList = (mode === 'SINGLES' ? state.roster.SINGLES : (state.roster.DOUBLES ? state.roster.DOUBLES.flatMap(t=>t.members) : []));

            if (view === 'SCORER') {
                if (!match.active) {
                    const opts = [...state.roster[mode].map(r=>`<option value="${r.teamName||r.name}">${r.teamName||r.name}</option>`), `<option value="BYE">BYE</option>`];
                    content.innerHTML = `<div class="p-6 bg-white rounded-2xl shadow max-w-md mx-auto mt-4"><h2 class="font-black text-center mb-6 uppercase text-sky-500 italic">Match Selection</h2><select id="lt1" class="w-full p-4 border rounded-xl mb-4 font-bold text-sm">${opts}</select><select id="lt2" class="w-full p-4 border rounded-xl mb-6 font-bold text-sm">${opts}</select><button onclick="pickLiveTeams()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase shadow-lg">Start Match</button></div>`;
                } else if (match.step === 'PLAYERS' || match.step === 'START_S') {
                    const getLineup = (name) => { if(cleanN(name)==='bye') return [{name:'BYE'}]; let t = state.roster.DOUBLES.find(x => x.teamName === name); return t ? [...t.members, {name:'DUMMY'}] : [{name:'DUMMY'}]; };
                    const t1 = getLineup(match.t1Name); const t2 = getLineup(match.t2Name);
                    content.innerHTML = `<div class="p-6 bg-white rounded-2xl max-w-md mx-auto mt-4"><h2 class="text-sky-500 font-black text-center mb-4 uppercase">G${match.gameNum} Lineup</h2><div class="space-y-4"><div class="p-3 bg-gray-50 border rounded-xl"><p class="text-[10px] font-black opacity-30 uppercase">${match.t1Name}</p><select id="sp1" class="w-full p-2 border mb-2 font-bold">${t1.map(m=>`<option value="${m.name}">${m.name}</option>`)}</select><select id="sp2" class="w-full p-2 border font-bold">${t1.map((m,i)=>`<option value="${m.name}" ${i===1?'selected':''}>${m.name}</option>`)}</select></div><div class="p-3 bg-gray-50 border rounded-xl"><p class="text-[10px] font-black opacity-30 uppercase">${match.t2Name}</p><select id="sp3" class="w-full p-2 border mb-2 font-bold">${t2.map(m=>`<option value="${m.name}">${m.name}</option>`)}</select><select id="sp4" class="w-full p-2 border font-bold">${t2.map((m,i)=>`<option value="${m.name}" ${i===1?'selected':''}>${m.name}</option>`)}</select></div><button onclick="startTheLiveGame()" class="w-full bg-black text-white p-5 rounded-2xl font-black uppercase shadow-lg">Start Game</button></div></div>`;
                } else {
                    const p = getPitcher();
                    const s1C = match.currGameFrames.reduce((s,f)=>s+Number(f.p1||0)+Number(f.p2||0),0) + Number(match.h1) + Number(match.h2);
                    const s2C = match.currGameFrames.reduce((s,f)=>s+Number(f.p3||0)+Number(f.p4||0),0) + Number(match.h3) + Number(match.h4);
                    content.innerHTML = `<div class="bg-black text-white p-3 rounded-t-xl flex justify-between px-6 text-[11px] font-black uppercase border-b border-zinc-800"><span>Match Total: ${match.sessionAgg.t1+s1C}</span><span>Game ${match.gameNum} / 3</span><span>Match Total: ${match.sessionAgg.t2+s2C}</span></div><div class="grid grid-cols-2 gap-1 mb-2"><div class="p-6 bg-white ${cleanN(p)===cleanN(match.p1)||cleanN(p)===cleanN(match.p2)?'pitching-card':''} text-center shadow-inner"><p class="text-[10px] font-black opacity-40 truncate uppercase">${match.t1Name}</p><p class="text-7xl font-black tracking-tighter">${s1C}</p><p class="text-[9px] font-black text-sky-600 mt-1 uppercase">+${match.h1+match.h2} HCP</p></div><div class="p-6 bg-white ${cleanN(p)===cleanN(match.p3)||cleanN(p)===cleanN(match.p4)?'pitching-card':''} text-center shadow-inner"><p class="text-[10px] font-black opacity-40 truncate uppercase">${match.t2Name}</p><p class="text-7xl font-black text-red-600 tracking-tighter">${s2C}</p><p class="text-[9px] font-black text-sky-600 mt-1 uppercase">+${match.h3+match.h4} HCP</p></div></div><div class="flex items-stretch gap-1 mb-2"><div class="bg-sky-500 text-white p-3 flex-1 text-center text-[12px] font-black uppercase italic tracking-widest shadow-lg shadow-sky-900/20">UP: ${p}</div><button onclick="openExitModal()" class="bg-red-600 text-white px-6 font-black text-[10px] uppercase rounded shadow-lg transition active:bg-red-800">Exit</button></div><div class="btn-score-grid">${[0,1,2,3,4,6].map(s=>`<button onclick="addScore(${s})" class="btn-score"><span class="num ${s>=3?'text-sky-500':''}">${s}</span><span class="sym">${getSym(s)}</span></button>`).join('')}</div><div class="micro-container mt-4"><table class="micro-table"><thead><tr><th class="c-sh">SH</th><th class="c-r">R</th><th class="c-p">P</th><th class="c-s">S</th><th class="c-r">R</th><th class="c-p">P</th><th class="c-s">S</th><th class="c-t">T1</th><th class="c-r">R</th><th class="c-p">P</th><th class="c-s">S</th><th class="c-r">R</th><th class="c-p">P</th><th class="c-s">S</th><th class="c-t">T2</th></tr></thead><tbody><tr class="curr-row"><td class="sh-cell">${(match.currGameFrames.length+1)*2}</td><td class="r-sym">${getSym(match.currF.p1)}</td><td>${match.currF.p1??''}</td><td></td><td class="r-sym">${getSym(match.currF.p2)}</td><td>${match.currF.p2??''}</td><td></td><td class="t1-cell"></td><td class="r-sym">${getSym(match.currF.p3)}</td><td>${match.currF.p3??''}</td><td></td><td class="r-sym">${getSym(match.currF.p4)}</td><td>${match.currF.p4??''}</td><td></td><td class="t2-cell"></td></tr>${match.currGameFrames.map((f, i) => { const sl = match.currGameFrames.slice(0,i+1); const t1 = sl.reduce((s,x)=>s+Number(x.p1||0),0); const t2 = sl.reduce((s,x)=>s+Number(x.p2||0),0); const t3 = sl.reduce((s,x)=>s+Number(x.p3||0),0); const t4 = sl.reduce((s,x)=>s+Number(x.p4||0),0); return `<tr><td class="sh-cell" onclick="window.editFrameScore(${i})">${f.sh}</td><td class="r-sym">${getSym(f.p1)}</td><td>${f.p1}</td><td>${t1}</td><td class="r-sym">${getSym(f.p2)}</td><td>${f.p2}</td><td>${t2}</td><td class="t1-cell">${t1+t2+match.h1+match.h2}</td><td class="r-sym">${getSym(f.p3)}</td><td>${f.p3}</td><td>${t3}</td><td class="r-sym">${getSym(f.p4)}</td><td>${f.p4}</td><td>${t4}</td><td class="t2-cell">${t3+t4+match.h3+match.h4}</td></tr>`; }).reverse().join('')}</tbody></table></div>`;
                }
            } else if (view === 'STANDINGS') {
                const sess = state.sessions || [];
                const rows = state.roster[mode].map(t => {
                    const name = t.teamName || t.name; let w=0, l=0, ti=0;
                    const teamG = history.filter(h => mode==='DOUBLES' ? t.members.some(m => cleanN(m.name) === cleanN(h.player)) : cleanN(t.name) === cleanN(h.player));
                    const seenG = new Set(); teamG.forEach(g => { const k = `${g.sessionId}-${g.gameNum}`; if(!seenG.has(k)) { seenG.add(k); if(g.result==='W') w++; else if(g.result==='L') l++; else if(g.result==='T') ti++; } });
                    const mp = sess.filter(s => cleanN(s.matchWinner) === cleanN(name)).length;
                    return { name, w, l, ti, mp, pts: (w*2)+ti+mp };
                }).sort((a,b)=>b.pts-a.pts).map(d => `<tr><td class="name-col font-black">${d.name}</td><td>${d.w}</td><td>${d.l}</td><td>${d.ti}</td><td>${d.mp}</td><td class="bg-zinc-900 text-sky-400 font-black pts-col">${d.pts}</td></tr>`).join('');
                content.innerHTML = `<div class="shadow overflow-x-auto"><table class="std-table"><thead><tr><th class="name-col">Team</th><th>W</th><th>L</th><th>T</th><th>MP</th><th class="pts-col">Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } else if (view === 'STATS') {
                const pNames = [...new Set(history.map(h => h.player))];
                const rows = pNames.map(pName => {
                    const g = history.filter(h => h.player === pName); const avg = g.slice(-9).reduce((s,x)=>s+x.score,0) / (g.slice(-9).length || 1); const sAvg = (rList.find(p => cleanN(p.name) === cleanN(pName)) || {startAvg: 0}).startAvg; const hiG = Math.max(...g.map(x=>x.score), 0);
                    return `<tr><td class="name-col font-black">${pName}</td><td>${getH(pName)}</td><td>${avg.toFixed(1)}</td><td>${hiG}</td><td>${(hiG-avg).toFixed(1)}</td><td>${Math.max(...g.map(x=>(x.ringers/(mode==='DOUBLES'?30:50))*100),0).toFixed(1)}%</td><td class="${(avg-sAvg)>=0?'text-green-400':'text-red-400'}">${(avg-sAvg).toFixed(1)}</td></tr>`;
                }).join('');
                content.innerHTML = `<div class="shadow overflow-x-auto"><table class="std-table"><thead><tr><th class="name-col">Player</th><th>HCP</th><th>Avg</th><th>HiG</th><th>Hi vs Avg</th><th>Hi Rng</th><th>Imp</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } else if (view === 'NHPA') {
                const pNames = [...new Set(history.map(h => h.player))];
                const shoes = mode === 'DOUBLES' ? 30 : 50;
                const rows = pNames.map(pName => {
                    const g = history.filter(h => h.player === pName); const p = rList.find(x => cleanN(x.name) === cleanN(pName)) || {}; const totP = g.reduce((s,x)=>s+x.score,0); const totS = g.length * shoes; const totR = g.reduce((s,x)=>s+x.ringers,0);
                    return `<tr><td style="width:25%; text-align:left; padding-left:4px;">${pName}</td><td>${p.division||'-'}</td><td>${p.cardNo||'-'}</td><td>${totP}</td><td>${Math.max(...g.map(x=>x.score),0)}</td><td>${totS}</td><td>${totR}</td><td>${p.prevHighRinger||'0'}%</td><td>${Math.max(...g.map(x=>(x.ringers/shoes)*100),0).toFixed(1)}%</td><td class="text-sky-400 font-black">${((totR/totS)*100||0).toFixed(1)}%</td></tr>`;
                }).join('');
                content.innerHTML = `<div class="action-bar"><button class="action-btn" onclick="window.print()">Print Official PDF</button></div><div class="bg-black p-1 rounded overflow-x-auto"><table class="std-table text-[0.5rem]"><thead><tr class="bg-zinc-800 text-sky-300"><th>Name</th><th>Div</th><th>Card</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } else if (view === 'MANAGE') {
                const rHTML = state.roster[mode].map((item, idx) => `<div class="bg-white p-3 rounded-xl shadow mb-2 flex justify-between items-center"><p class="font-black text-xs uppercase">${item.teamName || item.name}</p><div class="flex gap-2"><button onclick="editPlayer(${idx})" class="text-sky-500 border px-2 py-1 rounded font-black text-[10px] uppercase">Edit</button><button onclick="delR(${idx})" class="text-red-500 border px-2 py-1 rounded font-black text-[10px] uppercase">Del</button></div></div>`).join('');
                const sHTML = (state.sessions || []).filter(s => s.mode === mode).map(s => `<div class="bg-white p-2 rounded shadow mb-1 flex justify-between items-center text-[10px] font-bold"><span>${s.date} - ${s.name}</span><div class="flex gap-1"><button onclick='generateReport(${JSON.stringify(s)})' class="bg-sky-500 text-white px-2 py-1 rounded uppercase font-black text-[9px]">PDF</button><button onclick="deleteS(${s.id})" class="text-red-500 font-black px-2 text-[9px]">Del</button></div></div>`).join('');
                content.innerHTML = `<div class="p-4 space-y-4">
                    <button onclick="resetSystem()" class="w-full bg-red-600 text-white p-4 rounded-xl font-black uppercase text-xs shadow-xl">Wipe Cloud Data</button>
                    <button onclick="toggleHcpLock()" class="w-full p-4 rounded-xl font-black uppercase text-xs shadow-md transition ${state.hcpLocked ? 'bg-orange-500 text-white' : 'bg-green-500 text-white'}">${state.hcpLocked ? 'Unlock Handicaps (Rolling)' : 'Lock Current Handicaps'}</button>
                    <div class="bg-white p-6 rounded-2xl shadow border text-center"><h3 class="text-[10px] font-black uppercase mb-2 opacity-40">PIN SECURITY</h3><div class="flex gap-2"><input type="password" id="newPin" class="flex-1 border p-2 rounded text-xs" placeholder="New PIN"><button onclick="updatePin()" class="bg-black text-white px-4 py-2 rounded text-[10px] font-bold uppercase">Update</button></div></div>
                    <textarea id="rosterInput" class="w-full h-24 border p-3 rounded-xl text-xs" placeholder="ID [Tab] Name [Tab] Avg [Tab] Div [Tab] Card [Tab] PrevR [Tab] HCP"></textarea><button onclick="importRoster()" class="w-full bg-black text-white p-4 rounded-xl font-black mt-2 uppercase shadow-lg">Sync Roster</button>
                    <div><h3 class="text-[10px] font-black uppercase mb-2 opacity-40">Edit Roster (${mode})</h3>${rHTML}</div><div><h3 class="text-[10px] font-black uppercase mb-2 opacity-40">History</h3>${sHTML}</div></div>`;
            }
        }
    </script>
</body>
</html>
