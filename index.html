// --- ADDED: Add/Remove Players from DOUBLES Teams ---
window.addPlayerToTeam = async (teamIdx) => {
    const playerName = await window.smPrompt('Enter new player name:');
    if(playerName && playerName.trim() !== '') {
        if(state.roster.DOUBLES[teamIdx].members.some(m => m.name.trim().toLowerCase() === playerName.trim().toLowerCase())) {
            await window.smAlert("Player already on this team.");
            return;
        }
        state.roster.DOUBLES[teamIdx].members.push({ name: playerName.trim() });
        await save();
        render();
    }
};
window.removePlayerFromTeam = async (teamIdx, playerIdx) => {
    if(await window.smConfirm('Remove this player from the team?')) {
        state.roster.DOUBLES[teamIdx].members.splice(playerIdx, 1);
        await save();
        render();
    }
};
