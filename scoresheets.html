<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loon Pond - Professional Scoresheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');

        body { font-family: 'Arial', sans-serif; background: #f1f5f9; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .page-break { page-break-after: always; }
        }

        .sheet-page {
            width: 8.5in;
            height: 11in;
            margin: 0 auto;
            background: white;
            padding: 0.2in 0.4in;
            color: black;
            box-sizing: border-box;
        }

        .main-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .main-table th, .main-table td { border: 1px solid black; height: 24px; text-align: center; font-size: 8pt; padding: 0; }
        
        /* Column Widths */
        .col-stats { width: 45px; }
        .col-total { width: 55px; background-color: #f3f4f6; font-weight: bold; }
        .col-shoes { width: 50px; font-size: 12pt; font-weight: 900; border-left: 2px solid black !important; border-right: 2px solid black !important; }

        .gray-bg { background-color: #d1d5db !important; -webkit-print-color-adjust: exact; }
        
        .header-box { border: 2px solid black; padding: 5px; text-align: center; margin-bottom: 10px; }
        .court-box { border: 2px solid black; width: 120px; margin: 0 auto 10px; text-align: center; }
        
        .wlt-section { display: flex; justify-content: space-around; padding: 10px 0; border: 1px solid black; border-top: none; }
        .wlt-box { border: 2px solid black; width: 40px; height: 35px; line-height: 35px; font-size: 18pt; font-weight: 900; text-align: center; }

        .roster-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .roster-table th, .roster-table td { border: 1px solid black; padding: 4px; font-size: 9pt; height: 30px; }
        .roster-table th { background: #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="no-print p-6 bg-white border-b-4 border-sky-500 flex justify-between items-center shadow-xl">
        <div>
            <h1 class="text-2xl font-black italic uppercase">Scoresheet Entity</h1>
            <p class="text-xs text-gray-500 uppercase font-bold">Automatic Data Link Active</p>
        </div>
        <button onclick="window.print()" class="bg-red-600 text-white px-10 py-4 font-black uppercase text-lg hover:bg-red-700 shadow-lg">Print All Courts</button>
    </div>

    <div id="container"></div>

<script>
    const cleanN = (n) => n ? n.toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';

    function getPrintData() {
        const raw = localStorage.getItem('lphc_print_data');
        if (!raw) return null;
        return JSON.parse(raw);
    }

    function getPlyrAvg(state, pName) {
        const n = cleanN(pName); if(!pName || ['bye','dummy'].includes(n)) return 0;
        const rList = (state.roster.SINGLES || []).concat(state.roster.DOUBLES.flatMap(t => t.members));
        const p = rList.find(x => cleanN(x.name) === n);
        const hist = (state.history || []).filter(x => cleanN(x.player) === n && x.mode === 'DOUBLES').slice(-9);
        return hist.length ? Math.round(hist.reduce((s, g) => s + g.score, 0) / hist.length) : (p ? Number(p.startAvg) : 0);
    }

    function getH(state, pName) {
        const n = cleanN(pName); if(!pName || n === 'bye') return 0; if(n === 'dummy') return 54;
        const rList = (state.roster.SINGLES || []).concat(state.roster.DOUBLES.flatMap(t => t.members));
        const p = rList.find(x => cleanN(x.name) === n);
        if (state.hcpLocked && state.hcpLocked['DOUBLES']) return Number(p?.currentHcp || 0);
        const avg = getPlyrAvg(state, pName);
        return Math.max(0, Math.floor((90 - avg) * 0.9));
    }

    function generate() {
        const state = getPrintData();
        if (!state) {
            document.getElementById('container').innerHTML = `<div class="p-20 text-center font-bold text-red-500">NO DATA FOUND. Open this from the main app using the "Generate Sheets" button.</div>`;
            return;
        }

        const lineupRaw = state.weeklyLineup['DOUBLES'].rawPaste;
        const courts = [];
        lineupRaw.split('\n').forEach(line => {
            const match = line.match(/^(\d+)\s+(.*)/);
            if (match) {
                const teams = match[2].split(/\s+vs\s+/gi);
                courts.push({ court: match[1], t1: teams[0].trim(), t2: teams[1].trim() });
            }
        });

        let html = '';
        courts.forEach(c => {
            for (let g = 1; g <= 3; g++) {
                html += renderSheet(state, c, g);
            }
        });
        document.getElementById('container').innerHTML = html;
    }

    function renderSheet(state, court, gameNum) {
        const t1 = (state.roster.DOUBLES || []).find(x => x.teamName === court.t1);
        const t2 = (state.roster.DOUBLES || []).find(x => x.teamName === court.t2);
        
        let grid = '';
        for (let i = 2; i <= 30; i += 2) {
            const rowIndex = (i / 2);
            let shoeClass = '';
            
            // Shading Logic
            // G1 & G3: Start Gray (2, 6, 10...)
            // G2: Start White (4, 8, 12...)
            if (gameNum === 1 || gameNum === 3) {
                if (rowIndex % 2 !== 0) shoeClass = 'gray-bg';
            } else {
                if (rowIndex % 2 === 0) shoeClass = 'gray-bg';
            }

            grid += `
                <tr>
                    <td></td><td></td><td></td><td></td><td></td><td></td><td class="col-total"></td>
                    <td class="col-shoes ${shoeClass}">${i}</td>
                    <td></td><td></td><td></td><td></td><td></td><td></td><td class="col-total"></td>
                </tr>`;
        }

        const getMemberRows = (team) => {
            if (!team) return Array(3).fill('<tr><td>&nbsp;</td><td></td><td></td></tr>').join('');
            let rows = team.members.map(m => `
                <tr>
                    <td style="text-align:left; padding-left:10px; font-weight:bold;">${m.name}</td>
                    <td style="text-align:center;">${getH(state, m.name)}</td>
                    <td style="text-align:center;">${getPlyrAvg(state, m.name)}</td>
                </tr>
            `).join('');
            while(team.members.length < 3) { rows += '<tr><td>&nbsp;</td><td></td><td></td></tr>'; team.members.push({}); }
            return rows;
        };

        return `
        <div class="sheet-page page-break">
            <div style="text-align:center; font-weight:900; font-size:16pt; text-decoration:underline;">LOON POND HORSESHOE CLUB</div>
            <div style="text-align:center; font-size:9pt; font-weight:bold; margin-bottom:5px;">
                1 = 1 pt. 2 = 2 pts. 0 = 1 ringer 3 pts. O' = 1 ringer 4 pts. 00 = 2 ringers 6 pts.
            </div>

            <div class="court-box">
                <div style="font-size:8pt; border-bottom:1px solid black; background:#eee; font-weight:bold;">Court</div>
                <div style="font-size:20pt; font-weight:900;">${court.court}</div>
            </div>

            <table class="main-table">
                <thead>
                    <tr>
                        <th colspan="3" style="font-size:10pt;">Team: ${court.t1}</th>
                        <th colspan="3"></th>
                        <th class="col-total" style="background:white; font-size:12pt;">Game</th>
                        <th class="col-shoes" style="background:white;">${gameNum}</th>
                        <th colspan="3" style="font-size:10pt;">Team: ${court.t2}</th>
                        <th colspan="3"></th>
                        <th class="col-total" style="background:white; font-size:12pt;"></th>
                    </tr>
                    <tr style="height:35px; background:#eee;">
                        <th class="col-stats">Ringers</th><th class="col-stats">Points</th><th class="col-stats">Score</th>
                        <th class="col-stats">Ringers</th><th class="col-stats">Points</th><th class="col-stats">Score</th>
                        <th class="col-total">Total</th>
                        <th class="col-shoes" style="background:black; color:white; font-size:10pt;">VS</th>
                        <th class="col-stats">Ringers</th><th class="col-stats">Points</th><th class="col-stats">Score</th>
                        <th class="col-stats">Ringers</th><th class="col-stats">Points</th><th class="col-stats">Score</th>
                        <th class="col-total">Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${grid}
                    <tr style="height:30px; font-weight:bold;">
                        <td colspan="6" style="text-align:right; padding-right:10px;">Points:</td><td class="col-total"></td>
                        <td class="col-shoes"></td>
                        <td colspan="6" style="text-align:right; padding-right:10px;">Points:</td><td class="col-total"></td>
                    </tr>
                    <tr style="height:30px; font-weight:bold;">
                        <td colspan="6" style="text-align:right; padding-right:10px;">Total Hcap:</td><td class="col-total"></td>
                        <td class="col-shoes"></td>
                        <td colspan="6" style="text-align:right; padding-right:10px;">Total Hcap:</td><td class="col-total"></td>
                    </tr>
                    <tr style="height:30px; font-weight:bold;">
                        <td colspan="6" style="text-align:right; padding-right:10px;">Total:</td><td class="col-total"></td>
                        <td class="col-shoes"></td>
                        <td colspan="6" style="text-align:right; padding-right:10px;">Total:</td><td class="col-total"></td>
                    </tr>
                    <tr style="height:30px; font-weight:bold;">
                        <td colspan="6" style="text-align:right; padding-right:10px;">Ringers:</td><td class="col-total"></td>
                        <td class="col-shoes"></td>
                        <td colspan="6" style="text-align:right; padding-right:10px;">Ringers:</td><td class="col-total"></td>
                    </tr>
                </tbody>
            </table>

            <div class="wlt-section">
                <div style="display:flex; gap:10px;"><div class="wlt-box">W</div><div class="wlt-box">L</div><div class="wlt-box">T</div></div>
                <div style="display:flex; gap:10px;"><div class="wlt-box">W</div><div class="wlt-box">L</div><div class="wlt-box">T</div></div>
            </div>

            <div style="display:flex; gap:20px;">
                <table class="roster-table" style="flex:1;">
                    <thead><tr><th>Name</th><th>Handicap</th><th>Point Avg</th></tr></thead>
                    <tbody>${getMemberRows(t1)}</tbody>
                </table>
                <table class="roster-table" style="flex:1;">
                    <thead><tr><th>Name</th><th>Handicap</th><th>Point Avg</th></tr></thead>
                    <tbody>${getMemberRows(t2)}</tbody>
                </table>
            </div>
        </div>`;
    }

    generate();
</script>
</body>
</html>
